<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A1628">
<title>Biorise SFA</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh;overscroll-behavior:none}
:root{--navy:#0A1628;--gold:#C9A84C;--green:#38a169;--red:#e53e3e;--blue:#1a56db}

/* ---- LOGIN ---- */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#0A1628 0%,#1a3a6b 100%);padding:20px}
.login-box{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:340px;box-shadow:0 24px 64px rgba(0,0,0,0.35)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo-mark{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;background:#0A1628;border-radius:14px;margin-bottom:10px}
.login-logo-mark span{color:#C9A84C;font-size:32px;font-weight:900;font-family:Arial}
.login-title{font-size:20px;font-weight:800;color:#0A1628;text-align:center}
.login-sub{font-size:12px;color:#718096;text-align:center;margin-top:4px;margin-bottom:24px}
.gold-line{height:3px;background:linear-gradient(90deg,#C9A84C,#e8d08a,#C9A84C);border-radius:2px;margin-bottom:20px}
.form-lbl{font-size:11px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;display:block}
.form-inp{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;color:#1a202c;background:#fff;margin-bottom:14px}
.form-inp:focus{border-color:#0A1628;box-shadow:0 0 0 3px rgba(10,22,40,0.08)}
.btn-login{width:100%;padding:13px;background:#0A1628;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:0.3px;margin-top:4px}
.btn-login:active{background:#1a3a6b}
.login-err{background:#fff5f5;color:#c53030;border:1px solid #feb2b2;border-radius:7px;padding:9px 12px;font-size:12px;margin-top:10px;display:none;text-align:center;font-weight:600}
.login-footer{text-align:center;font-size:10px;color:#a0aec0;margin-top:20px}

/* ---- APP SHELL ---- */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#0A1628;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.25)}
.topbar-brand{font-size:17px;font-weight:900;letter-spacing:0.3px}
.topbar-brand em{color:#C9A84C;font-style:normal}
.topbar-info{font-size:11px;opacity:0.7;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.golive-btn{background:#C9A84C;color:#0A1628;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap}
.golive-btn.active{background:#38a169;color:#fff}
.golive-btn.end{background:#e53e3e;color:#fff}
.btn-sm-out{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px}

/* ---- STATUS BAR ---- */
.status-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:6px 14px;display:flex;align-items:center;gap:12px;font-size:11px;color:#4a5568;overflow-x:auto;white-space:nowrap}
.status-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;display:inline-block;margin-right:4px}
.status-dot.live{background:#38a169;box-shadow:0 0 6px #38a169}

/* ---- BOTTOM NAV ---- */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,0.08)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;color:#a0aec0;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;transition:color 0.15s}
.bnav-item .ico{font-size:20px;margin-bottom:2px;line-height:1}
.bnav-item.active{color:#0A1628}
.bnav-item.active .ico-bar{background:#C9A84C;height:3px;border-radius:2px;width:24px;margin:0 auto 4px}
.bnav-more{position:relative}
.more-menu{display:none;position:absolute;bottom:58px;right:0;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);border:1px solid #e2e8f0;min-width:160px;overflow:hidden;z-index:300}
.more-menu.show{display:block}
.more-item{padding:12px 16px;font-size:13px;font-weight:600;color:#1a202c;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f4f8}
.more-item:last-child{border-bottom:none}
.more-item:hover{background:#f7fafc}

/* ---- CONTENT ---- */
.content{flex:1;padding:14px;padding-bottom:74px;max-width:600px;margin:0 auto;width:100%}

/* ---- CARDS ---- */
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,0.07)}
.card-hd{font-size:14px;font-weight:800;color:#0A1628;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f4f8;display:flex;align-items:center;justify-content:space-between}
.card-hd-title{display:flex;align-items:center;gap:6px}

/* ---- STATS ---- */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:#fff;border-radius:10px;padding:12px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.07);border-top:3px solid #e2e8f0}
.stat-box.gold{border-top-color:#C9A84C}
.stat-box.green{border-top-color:#38a169}
.stat-box.red{border-top-color:#e53e3e}
.stat-box.blue{border-top-color:#1a56db}
.stat-box.navy{border-top-color:#0A1628}
.stat-val{font-size:18px;font-weight:900;color:#0A1628;line-height:1}
.stat-lbl{font-size:9px;color:#718096;margin-top:3px;text-transform:uppercase;letter-spacing:0.4px;font-weight:600}

/* ---- PROGRESS ---- */
.prog-wrap{margin:10px 0}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#4a5568;margin-bottom:4px;font-weight:600}
.prog-bar{background:#e2e8f0;border-radius:20px;height:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#C9A84C,#e8a020);border-radius:20px;transition:width 0.6s ease}
.prog-fill.gn{background:linear-gradient(90deg,#38a169,#68d391)}

/* ---- FORMS ---- */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:700;color:#4a5568;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;background:#fff;color:#1a202c;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#0A1628;box-shadow:0 0 0 3px rgba(10,22,40,0.07)}
.fg textarea{resize:vertical;min-height:70px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.form-note{font-size:11px;color:#718096;margin-top:3px}

/* ---- BUTTONS ---- */
.btn{padding:11px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:active{opacity:0.85}
.btn-navy{background:#0A1628;color:#fff}
.btn-gold{background:#C9A84C;color:#0A1628}
.btn-green{background:#38a169;color:#fff}
.btn-red{background:#e53e3e;color:#fff}
.btn-outline{background:#fff;color:#0A1628;border:1.5px solid #0A1628}
.btn-ghost{background:#f0f4f8;color:#4a5568;border:none}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-xs{padding:5px 10px;font-size:11px}

/* ---- TABLE ---- */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e2e8f0}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
th{background:#0A1628;color:#fff;padding:9px 10px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}

/* ---- BADGES ---- */
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bg-green{background:#c6f6d5;color:#276749}
.bg-yellow{background:#fefcbf;color:#975a16}
.bg-red{background:#fed7d7;color:#9b2c2c}
.bg-blue{background:#bee3f8;color:#2a69ac}
.bg-gray{background:#e2e8f0;color:#4a5568}
.bg-orange{background:#feebc8;color:#9c4221}
.bg-navy{background:#0A1628;color:#C9A84C}

/* ---- SEARCH ---- */
.search-wrap{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap input,.search-wrap select{padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;background:#fff;flex:1;min-width:100px;-webkit-appearance:none}
.search-wrap input:focus,.search-wrap select:focus{border-color:#0A1628}

/* ---- PRODUCT CARDS ---- */
.prod-card{border:1.5px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;background:#fff}
.prod-card:active{background:#f7fafc}
.prod-card.in-cart{border-color:#C9A84C;background:#fffbf0}
.prod-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.prod-name{font-size:13px;font-weight:700;color:#0A1628;line-height:1.3}
.prod-meta{font-size:10px;color:#718096;margin-top:3px}
.prod-price{font-weight:800;color:#C9A84C;font-size:14px;white-space:nowrap}
.qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:8px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #0A1628;background:#fff;color:#0A1628;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-num{font-size:14px;font-weight:700;color:#0A1628;min-width:24px;text-align:center}

/* ---- CART SUMMARY ---- */
.cart-summary{background:linear-gradient(135deg,#0A1628,#1a3a6b);border-radius:12px;padding:14px;margin-bottom:14px;color:#fff}
.cart-summary-title{font-size:12px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.cart-item-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.cart-item-row:last-child{border-bottom:none}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(201,168,76,0.4)}
.cart-total-lbl{font-size:13px;font-weight:700;color:#C9A84C}
.cart-total-val{font-size:18px;font-weight:900;color:#C9A84C}

/* ---- VISIT / GPS ---- */
.gps-capture{background:#f0fff4;border:1.5px solid #9ae6b4;border-radius:10px;padding:14px;text-align:center;margin:10px 0}
.gps-capture p{font-size:12px;color:#276749;margin-bottom:8px;font-weight:600}
.gps-coords{font-size:11px;color:#276749;background:#c6f6d5;padding:6px 10px;border-radius:6px;margin-top:6px;font-family:monospace}
.gps-fail{background:#fff5f5;border:1.5px solid #feb2b2;border-radius:10px;padding:12px;font-size:12px;color:#c53030;text-align:center}

/* ---- PHOTO CAPTURE ---- */
.photo-wrap{border:2px dashed #e2e8f0;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.photo-wrap:active{background:#f7fafc}
.photo-wrap.has-photo{border-color:#38a169;border-style:solid}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;display:none}
.photo-label{font-size:13px;color:#718096;margin-top:6px}
.photo-input{position:absolute;inset:0;opacity:0;cursor:pointer}

/* ---- JOURNEY STATUS ---- */
.journey-card{background:linear-gradient(135deg,#0A1628,#1a3a6b);border-radius:12px;padding:16px;margin-bottom:14px;color:#fff}
.journey-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#C9A84C;margin-bottom:6px}
.journey-time{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
.journey-meta{font-size:11px;opacity:0.7}
.journey-leg{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:11px}
.journey-leg:last-child{border-bottom:none}
.leg-dot{width:8px;height:8px;border-radius:50%;background:#C9A84C;flex-shrink:0}

/* ---- ALERT TOAST ---- */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.2);max-width:300px;text-align:center;transition:opacity 0.3s}
.toast-success{background:#38a169;color:#fff}
.toast-error{background:#e53e3e;color:#fff}
.toast-info{background:#0A1628;color:#C9A84C}

/* ---- MODAL ---- */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;align-items:flex-end;justify-content:center;padding:0}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal-hd{font-size:15px;font-weight:800;color:#0A1628;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#718096;padding:0;line-height:1}

/* ---- DIVIDER ---- */
.divider{height:1px;background:#f0f4f8;margin:14px 0}

/* ---- EMPTY STATE ---- */
.empty{text-align:center;padding:32px 16px;color:#a0aec0}
.empty-ico{font-size:40px;margin-bottom:8px}
.empty-txt{font-size:13px;font-weight:600}

/* ---- FOOTER ---- */
.app-footer{text-align:center;font-size:10px;color:#a0aec0;padding:12px;background:#fff;border-top:1px solid #f0f4f8}

.hidden{display:none!important}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.text-right{text-align:right}
.fw7{font-weight:700}
.fw9{font-weight:900}
.text-gold{color:#C9A84C}
.text-green{color:#38a169}
.text-red{color:#e53e3e}
.text-navy{color:#0A1628}
.text-gray{color:#718096}
.f11{font-size:11px}
.f12{font-size:12px}
.f13{font-size:13px}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
<div class="login-box">
  <div class="login-logo">
    <div class="login-logo-mark"><span>B</span></div>
    <div class="login-title">Biorise SFA</div>
    <div class="login-sub">Sales Force Automation &mdash; Officer Portal</div>
  </div>
  <div class="gold-line"></div>
  <label class="form-lbl">Username</label>
  <input class="form-inp" type="text" id="lu" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <label class="form-lbl">Password</label>
  <input class="form-inp" type="password" id="lp" autocomplete="off">
  <button class="btn-login" onclick="doLogin()">Login</button>
  <div class="login-err" id="lerr">Invalid username or password.</div>
  <div class="login-footer">Biorise Pharmaceuticals &copy; 2026 &middot; Multan, Pakistan</div>
</div>
</div>

<!-- ===== APP ===== -->
<div id="app">

<div class="topbar">
  <div>
    <div class="topbar-brand">Bio<em>rise</em> SFA</div>
    <div class="topbar-info" id="topbar-info">Officer Portal</div>
  </div>
  <div class="topbar-right">
    <button class="golive-btn" id="golive-btn" onclick="handleGoLive()">Go Live</button>
    <button class="btn-sm-out" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="status-bar" id="status-bar">
  <span><span class="status-dot" id="live-dot"></span><span id="live-status">Offline</span></span>
  <span id="status-time"></span>
  <span id="status-visits"></span>
  <span id="status-km"></span>
</div>

<div class="content" id="main-content"></div>

<div class="app-footer">Developed by Muhammad Mazhar ul Hassan &middot; All Legal Rights Reserved &copy; 2026 &middot; Biorise Pharmaceuticals</div>

<nav class="bottom-nav">
  <button class="bnav-item active" id="tab-dashboard" onclick="showTab('dashboard',this)">
    <div class="ico-bar"></div>
    <span class="ico">&#9636;</span>Dashboard
  </button>
  <button class="bnav-item" id="tab-order" onclick="showTab('order',this)">
    <div class="ico-bar" style="display:none"></div>
    <span class="ico">&#43;</span>Order
  </button>
  <button class="bnav-item" id="tab-recovery" onclick="showTab('recovery',this)">
    <div class="ico-bar" style="display:none"></div>
    <span class="ico">&#8635;</span>Recovery
  </button>
  <button class="bnav-item" id="tab-visits" onclick="showTab('visits',this)">
    <div class="ico-bar" style="display:none"></div>
    <span class="ico">&#128205;</span>Visits
  </button>
  <button class="bnav-item bnav-more" id="tab-more" onclick="toggleMore()">
    <div class="ico-bar" style="display:none"></div>
    <span class="ico">&#8942;</span>More
    <div class="more-menu" id="more-menu">
      <div class="more-item" onclick="showTab('expenses',this);toggleMore()">&#128176; Expenses</div>
      <div class="more-item" onclick="showTab('stock',this);toggleMore()">&#128230; My Stock</div>
      <div class="more-item" onclick="showTab('apps',this);toggleMore()">&#128221; Applications</div>
      <div class="more-item" onclick="showTab('report',this);toggleMore()">&#128196; Daily Report</div>
    </div>
  </button>
</nav>
</div>

<script>
// ============================================================
// GLOBALS
// ============================================================
var PRODUCTS  = JSON.parse(document.getElementById('d-products').textContent);
var CUSTOMERS = JSON.parse(document.getElementById('d-customers').textContent);
var USERS     = JSON.parse(document.getElementById('d-users').textContent);

var CU = null; // current user
var MY_CUSTS = [];
var ACTIVE_TAB = 'dashboard';
var CART = [];
var CART_CUST = null;
var PHOTO_DATA = null;
var VISIT_GPS = null;
var CHECKIN_GPS = null;
var CHECKIN_TIME = null;

// IndexedDB
var DB = null;
var DB_NAME = 'BioriseSFA';
var DB_VER  = 1;
var STORES  = ['orders','recoveries','visits','expenses','apps','journey','settings'];

function initDB(cb) {
  var req = indexedDB.open(DB_NAME, DB_VER);
  req.onupgradeneeded = function(e) {
    var db = e.target.result;
    for (var i = 0; i < STORES.length; i++) {
      if (!db.objectStoreNames.contains(STORES[i])) {
        db.createObjectStore(STORES[i], {keyPath:'id'});
      }
    }
  };
  req.onsuccess = function(e) { DB = e.target.result; if (cb) cb(); };
  req.onerror   = function()  { if (cb) cb(); };
}

function dbGetAll(store, cb) {
  if (!DB) { cb([]); return; }
  var tx  = DB.transaction(store,'readonly');
  var req = tx.objectStore(store).getAll();
  req.onsuccess = function() { cb(req.result || []); };
  req.onerror   = function() { cb([]); };
}

function dbPut(store, obj, cb) {
  if (!DB) { if (cb) cb(); return; }
  var tx  = DB.transaction(store,'readwrite');
  var req = tx.objectStore(store).put(obj);
  req.onsuccess = function() { if (cb) cb(); };
  req.onerror   = function() { if (cb) cb(); };
}

function dbDelete(store, id, cb) {
  if (!DB) { if (cb) cb(); return; }
  var tx  = DB.transaction(store,'readwrite');
  tx.objectStore(store).delete(id);
  tx.oncomplete = function() { if (cb) cb(); };
}

function dbGetSetting(key, cb) {
  if (!DB) { cb(null); return; }
  var tx  = DB.transaction('settings','readonly');
  var req = tx.objectStore('settings').get(key);
  req.onsuccess = function() { cb(req.result ? req.result.val : null); };
  req.onerror   = function() { cb(null); };
}

function dbSetSetting(key, val) {
  dbPut('settings', {id: key, val: val});
}

// ============================================================
// UTILITIES
// ============================================================
function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2,8); }

function fmtPKR(n) {
  var num = parseFloat(n) || 0;
  return 'PKR ' + num.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function fmtDate(d) {
  if (!d) return '-';
  var dt = new Date(d);
  return dt.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'}) +
         ' ' + dt.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function todayStr() { return new Date().toISOString().slice(0,10); }

function fiscalQuarter() {
  var now = new Date();
  var m = now.getMonth(); // 0-indexed
  var y = now.getFullYear();
  // Fiscal year: Jul=Q1, Oct=Q2, Jan=Q3, Apr=Q4
  var qEnd, qLabel;
  if (m >= 6 && m <= 8)      { qEnd = new Date(y,9,1);   qLabel = 'Q1 (Jul-Sep)'; }
  else if (m >= 9 && m <= 11){ qEnd = new Date(y+1,0,1); qLabel = 'Q2 (Oct-Dec)'; }
  else if (m >= 0 && m <= 2) { qEnd = new Date(y,3,1);   qLabel = 'Q3 (Jan-Mar)'; }
  else                        { qEnd = new Date(y,6,1);   qLabel = 'Q4 (Apr-Jun)'; }
  var daysLeft = Math.max(1, Math.ceil((qEnd - now) / 86400000));
  return {label: qLabel, daysLeft: daysLeft, endDate: qEnd};
}

function compressImage(dataUrl, maxKB, cb) {
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var maxW = 800; var maxH = 800;
    var w = img.width; var h = img.height;
    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    var q = 0.7;
    var result = canvas.toDataURL('image/jpeg', q);
    // Reduce quality until under maxKB
    while (result.length > maxKB * 1024 * 1.33 && q > 0.2) {
      q -= 0.1;
      result = canvas.toDataURL('image/jpeg', q);
    }
    cb(result);
  };
  img.src = dataUrl;
}

function getGPS(cb) {
  if (!navigator.geolocation) { cb(null, 'GPS not supported'); return; }
  navigator.geolocation.getCurrentPosition(
    function(p) { cb({lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy}); },
    function(e) { cb(null, e.message || 'GPS unavailable'); },
    {timeout: 12000, enableHighAccuracy: true, maximumAge: 0}
  );
}

function gpsDistance(p1, p2) {
  // Haversine formula — returns km
  var R = 6371;
  var dLat = (p2.lat - p1.lat) * Math.PI / 180;
  var dLng = (p2.lng - p1.lng) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(p1.lat * Math.PI/180) * Math.cos(p2.lat * Math.PI/180) *
          Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function showToast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'info');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() {
    el.style.opacity = '0';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, 3000);
}

function toggleMore() {
  var m = document.getElementById('more-menu');
  if (m) m.classList.toggle('show');
}

document.addEventListener('click', function(e) {
  var more = document.getElementById('more-menu');
  var btn  = document.getElementById('tab-more');
  if (more && !btn.contains(e.target)) more.classList.remove('show');
});

// ============================================================
// LOGIN / LOGOUT
// ============================================================
function doLogin() {
  var u = document.getElementById('lu').value.trim().toLowerCase();
  var p = document.getElementById('lp').value.trim();
  var found = null;
  for (var i = 0; i < USERS.length; i++) {
    if (USERS[i].username.toLowerCase() === u &&
        USERS[i].password === p &&
        USERS[i].role === 'officer') {
      found = USERS[i]; break;
    }
  }
  if (!found) {
    document.getElementById('lerr').style.display = 'block';
    return;
  }
  CU = found;
  document.getElementById('lerr').style.display = 'none';
  MY_CUSTS = [];
  for (var j = 0; j < CUSTOMERS.length; j++) {
    if (CUSTOMERS[j].salesMan === CU.name) MY_CUSTS.push(CUSTOMERS[j]);
  }
  document.getElementById('topbar-info').textContent = CU.name + ' · ' + CU.region;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  initDB(function() {
    loadJourneyState();
    showTab('dashboard', document.getElementById('tab-dashboard'));
  });
}

function doLogout() {
  CU = null; CART = []; CART_CUST = null; PHOTO_DATA = null; VISIT_GPS = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
}

document.getElementById('lp').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ============================================================
// JOURNEY / GO LIVE
// ============================================================
var JOURNEY = null; // current day journey object

function loadJourneyState() {
  dbGetAll('journey', function(rows) {
    var today = todayStr();
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].officerUsername === CU.username && rows[i].date === today) {
        JOURNEY = rows[i]; break;
      }
    }
    updateGoLiveBtn();
    updateStatusBar();
  });
}

function updateGoLiveBtn() {
  var btn = document.getElementById('golive-btn');
  var dot = document.getElementById('live-dot');
  var ls  = document.getElementById('live-status');
  if (!btn) return;
  if (!JOURNEY) {
    btn.textContent = 'Go Live';
    btn.className = 'golive-btn';
    if (dot) dot.className = 'status-dot';
    if (ls)  ls.textContent = 'Offline';
  } else if (JOURNEY.endTime) {
    btn.textContent = 'Day Ended';
    btn.className = 'golive-btn';
    btn.style.background = '#718096';
    if (dot) dot.className = 'status-dot';
    if (ls)  ls.textContent = 'Day ended ' + JOURNEY.date;
  } else {
    btn.textContent = 'End My Day';
    btn.className = 'golive-btn end';
    if (dot) dot.className = 'status-dot live';
    if (ls)  ls.textContent = 'Live since ' + new Date(JOURNEY.startTime).toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',hour12:true});
  }
}

function updateStatusBar() {
  var timeEl   = document.getElementById('status-time');
  var visitsEl = document.getElementById('status-visits');
  var kmEl     = document.getElementById('status-km');
  if (!timeEl) return;
  timeEl.textContent = new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',hour12:true});
  if (JOURNEY) {
    visitsEl.textContent = (JOURNEY.waypoints ? JOURNEY.waypoints.length : 0) + ' stops';
    if (JOURNEY.endTime && JOURNEY.gpsKm) {
      kmEl.textContent = JOURNEY.gpsKm.toFixed(1) + ' km';
    }
  }
}

function handleGoLive() {
  if (!JOURNEY) {
    showGoLiveModal();
  } else if (!JOURNEY.endTime) {
    showEndDayModal();
  }
}

function showGoLiveModal() {
  var html = '<div class="modal show" id="golive-modal">';
  html += '<div class="modal-box">';
  html += '<div class="modal-hd">Start My Day <button class="modal-close" onclick="closeModal('golive-modal')">&#10005;</button></div>';
  html += '<div class="fg"><label>Odometer Start (km)</label><input type="number" id="odo-start" placeholder="e.g. 45230"></div>';
  html += '<div class="fg"><label>Starting From</label><select id="start-from"><option>Home</option><option>Hotel / Rest House</option><option>Office</option><option>Other</option></select></div>';
  html += '<div class="gps-capture"><p>&#128205; Your GPS location will be captured automatically</p></div>';
  html += '<button class="btn btn-navy btn-full mt-12" onclick="submitGoLive()">&#9654; Go Live Now</button>';
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function submitGoLive() {
  var odo = document.getElementById('odo-start') ? document.getElementById('odo-start').value : '';
  var from = document.getElementById('start-from') ? document.getElementById('start-from').value : 'Home';
  if (!odo || parseFloat(odo) <= 0) { showToast('Enter odometer reading', 'error'); return; }

  var btn = document.querySelector('#golive-modal .btn-navy');
  if (btn) { btn.textContent = 'Capturing GPS...'; btn.disabled = true; }

  getGPS(function(gps, err) {
    var journey = {
      id: uid(),
      officerUsername: CU.username,
      officerName: CU.name,
      region: CU.region,
      date: todayStr(),
      startTime: new Date().toISOString(),
      startFrom: from,
      odoStart: parseFloat(odo),
      startGPS: gps,
      waypoints: [],
      gpsKm: 0,
      endTime: null,
      odoEnd: null,
      endGPS: null,
      fuelClaim: null
    };
    JOURNEY = journey;
    dbPut('journey', journey, function() {
      closeModal('golive-modal');
      updateGoLiveBtn();
      updateStatusBar();
      showToast('You are now Live! Good luck today, ' + CU.name.split(' ')[0] + '.', 'success');
      if (ACTIVE_TAB === 'dashboard') showTab('dashboard', null);
    });
  });
}

function showEndDayModal() {
  var html = '<div class="modal show" id="endday-modal">';
  html += '<div class="modal-box">';
  html += '<div class="modal-hd">End My Day <button class="modal-close" onclick="closeModal('endday-modal')">&#10005;</button></div>';
  
  var gpsKm = JOURNEY.gpsKm ? JOURNEY.gpsKm.toFixed(1) : '0.0';
  html += '<div class="journey-card" style="margin-bottom:14px">';
  html += '<div class="journey-status">Today's Journey Summary</div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-top:8px">';
  html += '<span>Stops logged</span><strong>' + (JOURNEY.waypoints ? JOURNEY.waypoints.length : 0) + '</strong></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-top:6px">';
  html += '<span>GPS Distance</span><strong>' + gpsKm + ' km (system calculated)</strong></div>';
  html += '</div>';
  
  html += '<div class="fg"><label>Odometer End (km)</label><input type="number" id="odo-end" placeholder="e.g. 45385"></div>';
  html += '<div class="gps-capture"><p>&#128205; End location GPS will be captured automatically</p></div>';
  html += '<button class="btn btn-red btn-full mt-12" onclick="submitEndDay()">End My Day</button>';
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function submitEndDay() {
  var odo = document.getElementById('odo-end') ? document.getElementById('odo-end').value : '';
  if (!odo || parseFloat(odo) <= 0) { showToast('Enter odometer reading', 'error'); return; }

  var btn = document.querySelector('#endday-modal .btn-red');
  if (btn) { btn.textContent = 'Capturing GPS...'; btn.disabled = true; }

  getGPS(function(gps) {
    var odoEnd = parseFloat(odo);
    var odoStart = JOURNEY.odoStart || 0;
    var odoKm = Math.max(0, odoEnd - odoStart);
    var gpsKm = JOURNEY.gpsKm || 0;
    var variance = Math.abs(odoKm - gpsKm);
    var variancePct = odoKm > 0 ? (variance / odoKm * 100) : 0;

    JOURNEY.endTime = new Date().toISOString();
    JOURNEY.odoEnd  = odoEnd;
    JOURNEY.endGPS  = gps;
    JOURNEY.odoKm   = odoKm;
    JOURNEY.variance = variance;
    JOURNEY.variancePct = variancePct;
    JOURNEY.flagged = variancePct > 15;

    // Auto-create fuel expense (will be finalized when admin sets petrol rate)
    JOURNEY.fuelPending = true;

    dbPut('journey', JOURNEY, function() {
      closeModal('endday-modal');
      updateGoLiveBtn();
      updateStatusBar();
      showToast('Day ended. Well done today!', 'success');
      if (ACTIVE_TAB === 'dashboard') showTab('dashboard', null);
    });
  });
}

// ============================================================
function showTab(tab, el) {
  ACTIVE_TAB = tab;
  var btns = document.querySelectorAll('.bnav-item');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
    var bar = btns[i].querySelector('.ico-bar');
    if (bar) bar.style.display = 'none';
  }
  var btnId = 'tab-' + tab;
  var activeBtn = document.getElementById(btnId) || el;
  if (activeBtn && activeBtn.classList.contains('bnav-item')) {
    activeBtn.classList.add('active');
    var bar = activeBtn.querySelector('.ico-bar');
    if (bar) bar.style.display = 'block';
  }
  var c = document.getElementById('main-content');
  c.innerHTML = '<div style="text-align:center;padding:40px 0;color:#a0aec0;font-size:13px">Loading...</div>';
  if (tab === 'dashboard') renderDashboard(c);
  else if (tab === 'order') renderOrder(c);
  else if (tab === 'recovery') renderRecovery(c);
  else if (tab === 'visits') renderVisits(c);
  else if (tab === 'expenses') renderExpenses(c);
  else if (tab === 'stock') renderStock(c);
  else if (tab === 'apps') renderApps(c);
  else if (tab === 'report') renderReport(c);
}

// ============================================================
function renderDashboard(c) {
  dbGetAll('orders', function(orders) {
  dbGetAll('recoveries', function(recs) {
  dbGetAll('visits', function(visits) {
    var myOrders = orders.filter(function(o) { return o.officerUsername === CU.username; });
    var myRecs   = recs.filter(function(r)   { return r.officerUsername === CU.username; });
    var myVisits = visits.filter(function(v) { return v.officerUsername === CU.username && v.date === todayStr(); });

    var totalBooked = 0;
    for (var i = 0; i < myOrders.length; i++) totalBooked += (myOrders[i].total || 0);
    var totalRec = 0;
    for (var i = 0; i < myRecs.length; i++) totalRec += (myRecs[i].amount || 0);

    dbGetSetting('target_' + CU.username, function(qTarget) {
      qTarget = parseFloat(qTarget) || 0;
      var Q = fiscalQuarter();
      var remaining = Math.max(0, qTarget - totalBooked);
      var dailyNeeded = Q.daysLeft > 0 ? Math.round(remaining / Q.daysLeft) : 0;
      var pct = qTarget > 0 ? Math.min(100, Math.round(totalBooked / qTarget * 100)) : 0;
      var recPct = qTarget > 0 ? Math.min(100, Math.round(totalRec / qTarget * 100)) : 0;

      var html = '';

      // Journey card if live
      if (JOURNEY && !JOURNEY.endTime) {
        html += '<div class="journey-card">';
        html += '<div class="journey-status">&#9679; You are Live</div>';
        var st = new Date(JOURNEY.startTime);
        var elapsed = Math.round((Date.now() - st.getTime()) / 60000);
        var hrs = Math.floor(elapsed/60); var mins = elapsed % 60;
        html += '<div class="journey-time">' + (hrs > 0 ? hrs + 'h ' : '') + mins + 'm in field</div>';
        html += '<div class="journey-meta">Started from ' + JOURNEY.startFrom + ' &middot; ' + (JOURNEY.waypoints.length) + ' stops logged</div>';
        html += '</div>';
      }

      // Stats
      html += '<div class="stat-row">';
      html += '<div class="stat-box gold"><div class="stat-val">' + myOrders.length + '</div><div class="stat-lbl">Orders</div></div>';
      html += '<div class="stat-box green"><div class="stat-val">' + myVisits.length + '</div><div class="stat-lbl">Visits Today</div></div>';
      html += '<div class="stat-box red"><div class="stat-val">' + Q.daysLeft + '</div><div class="stat-lbl">Days Left</div></div>';
      html += '</div>';
      html += '<div class="stat-row">';
      html += '<div class="stat-box navy"><div class="stat-val" style="font-size:13px">' + (fmtPKR(totalBooked).replace('PKR ','')) + '</div><div class="stat-lbl">Sales PKR</div></div>';
      html += '<div class="stat-box"><div class="stat-val" style="font-size:13px">' + (fmtPKR(totalRec).replace('PKR ','')) + '</div><div class="stat-lbl">Recovery PKR</div></div>';
      html += '<div class="stat-box blue"><div class="stat-val" style="font-size:13px">' + (fmtPKR(dailyNeeded).replace('PKR ','')) + '</div><div class="stat-lbl">Daily Need</div></div>';
      html += '</div>';

      // Target progress
      html += '<div class="card">';
      html += '<div class="card-hd"><span class="card-hd-title">&#127919; ' + Q.label + ' Target</span></div>';
      if (qTarget > 0) {
        html += '<div class="prog-wrap"><div class="prog-labels"><span>Sales ' + pct + '%</span><span>' + fmtPKR(totalBooked) + ' / ' + fmtPKR(qTarget) + '</span></div>';
        html += '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div></div>';
        html += '<div class="prog-wrap"><div class="prog-labels"><span>Recovery ' + recPct + '%</span><span>' + fmtPKR(totalRec) + '</span></div>';
        html += '<div class="prog-bar"><div class="prog-fill gn" style="width:' + recPct + '%"></div></div></div>';
        html += '<div class="f11 text-gray mt-8">Remaining: <strong class="text-navy">' + fmtPKR(remaining) + '</strong> &middot; Need <strong class="text-red">' + fmtPKR(dailyNeeded) + '/day</strong></div>';
      } else {
        html += '<div class="empty"><div class="empty-ico">&#127919;</div><div class="empty-txt">No target set yet</div></div>';
      }
      html += '</div>';

      // Recent orders
      html += '<div class="card"><div class="card-hd"><span class="card-hd-title">&#128203; Recent Orders</span></div>';
      var recent = myOrders.slice().reverse().slice(0,5);
      if (recent.length === 0) {
        html += '<div class="empty"><div class="empty-ico">&#128203;</div><div class="empty-txt">No orders yet</div></div>';
      } else {
        html += '<div class="tbl-wrap"><table><thead><tr><th>Customer</th><th>Amount</th><th>Status</th></tr></thead><tbody>';
        for (var i = 0; i < recent.length; i++) {
          var o = recent[i];
          var bc = o.status==='Approved'?'bg-green':o.status==='Rejected'?'bg-red':'bg-yellow';
          html += '<tr><td>' + o.customerName + '<div class="f11 text-gray">' + fmtDate(o.createdAt) + '</div></td>';
          html += '<td class="fw7">' + fmtPKR(o.total) + '</td>';
          html += '<td><span class="badge ' + bc + '">' + (o.status||'Pending') + '</span></td></tr>';
        }
        html += '</tbody></table></div>';
      }
      html += '</div>';

      // My customers
      html += '<div class="card"><div class="card-hd"><span class="card-hd-title">&#128101; My Customers (' + MY_CUSTS.length + ')</span></div>';
      if (MY_CUSTS.length === 0) {
        html += '<div class="empty"><div class="empty-ico">&#128101;</div><div class="empty-txt">No customers assigned</div></div>';
      } else {
        html += '<div class="tbl-wrap"><table><thead><tr><th>#</th><th>Customer</th><th>City</th></tr></thead><tbody>';
        for (var i = 0; i < Math.min(MY_CUSTS.length, 10); i++) {
          html += '<tr><td class="text-gray">' + (i+1) + '</td><td>' + MY_CUSTS[i].name + '</td><td>' + MY_CUSTS[i].city + '</td></tr>';
        }
        if (MY_CUSTS.length > 10) html += '<tr><td colspan="3" class="text-center text-gray f11">+ ' + (MY_CUSTS.length-10) + ' more customers</td></tr>';
        html += '</tbody></table></div>';
      }
      html += '</div>';

      c.innerHTML = html;
    });
  });
  });
  });
}

function renderOrder(c) {
  dbGetAll('orders', function(orders) {
    var myOrders = orders.filter(function(o) { return o.officerUsername === CU.username; });
    // Build recent product frequency map
    var freq = {};
    for (var i = 0; i < myOrders.length; i++) {
      var items = myOrders[i].items || [];
      for (var j = 0; j < items.length; j++) {
        freq[items[j].productId] = (freq[items[j].productId] || 0) + 1;
      }
    }

    var html = '';

    // Cart summary at TOP
    if (CART.length > 0) {
      html += '<div class="cart-summary">';
      html += '<div class="cart-summary-title">&#128722; Cart (' + CART.length + ' items)</div>';
      var cartTotal = 0;
      for (var i = 0; i < CART.length; i++) {
        var ci = CART[i];
        var amt = ci.price * ci.qty;
        cartTotal += amt;
        html += '<div class="cart-item-row"><span>' + ci.name + ' x' + ci.qty + '</span><span>' + fmtPKR(amt) + '</span></div>';
      }
      html += '<div class="cart-total"><span class="cart-total-lbl">Total</span><span class="cart-total-val">' + fmtPKR(cartTotal) + '</span></div>';
      html += '</div>';
    }

    // Customer selector
    html += '<div class="card"><div class="card-hd"><span class="card-hd-title">&#128203; New Order</span></div>';
    html += '<div class="fg"><label>Customer</label><select id="ord-cust" onchange="orderCustChange()">';
    html += '<option value="">-- Select Customer --</option>';
    for (var i = 0; i < MY_CUSTS.length; i++) {
      var sel = CART_CUST && CART_CUST.id === MY_CUSTS[i].id ? ' selected' : '';
      html += '<option value="' + MY_CUSTS[i].id + '"' + sel + '>' + MY_CUSTS[i].name + ' · ' + MY_CUSTS[i].city + '</option>';
    }
    html += '</select></div>';

    // Search and filters
    html += '<div class="search-wrap">';
    html += '<input type="search" id="prod-search" placeholder="&#128269; Search product..." oninput="renderProductList()" style="flex:2">';
    html += '<select id="prod-cat" onchange="renderProductList()">';
    html += '<option value="">All</option><option value="INJECTION">Injections</option><option value="ORAL LIQUID">Oral Drench</option><option value="ORAL POWDER">Powders</option>';
    html += '</select>';
    html += '</div>';

    html += '<div id="prod-list-wrap"></div>';
    html += '</div>';

    // Submit section
    if (CART.length > 0) {
      html += '<div class="card"><div class="card-hd"><span class="card-hd-title">&#9989; Confirm Order</span></div>';
      html += '<div class="fg"><label>Notes (optional)</label><textarea id="ord-notes" placeholder="Special instructions..."></textarea></div>';
      html += '<button class="btn btn-green btn-full" onclick="submitOrder()">&#9989; Submit Order</button>';
      html += '</div>';
    }

    // Past orders
    if (myOrders.length > 0) {
      html += '<div class="card"><div class="card-hd"><span class="card-hd-title">&#128203; My Orders</span></div>';
      html += '<div class="tbl-wrap"><table><thead><tr><th>Customer</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>';
      var recentOrders = myOrders.slice().reverse().slice(0,10);
      for (var i = 0; i < recentOrders.length; i++) {
        var o = recentOrders[i];
        var bc = o.status==='Approved'?'bg-green':o.status==='Rejected'?'bg-red':'bg-yellow';
        var canDel = o.status === 'Pending';
        html += '<tr><td>' + o.customerName + '<div class="f11 text-gray">' + fmtDate(o.createdAt) + '</div></td>';
        html += '<td class="fw7">' + fmtPKR(o.total) + '</td>';
        html += '<td><span class="badge ' + bc + '">' + (o.status||'Pending') + '</span></td>';
        html += '<td>';
        if (canDel) html += '<button class="btn btn-red btn-xs" onclick="deleteOrder('' + o.id + '')">&#128465;</button>';
        html += '</td></tr>';
      }
      html += '</tbody></table></div></div>';
    }

    c.innerHTML = html;

    // Render product list with frequency sort
    CART_FREQ = freq;
    renderProductList();
  });
}

var CART_FREQ = {};

function orderCustChange() {
  var sel = document.getElementById('ord-cust');
  var id  = parseInt(sel.value);
  CART_CUST = null;
  for (var i = 0; i < MY_CUSTS.length; i++) {
    if (MY_CUSTS[i].id === id) { CART_CUST = MY_CUSTS[i]; break; }
  }
}

function renderProductList() {
  var wrap = document.getElementById('prod-list-wrap');
  if (!wrap) return;
  var search = (document.getElementById('prod-search') ? document.getElementById('prod-search').value : '').toLowerCase();
  var cat    = document.getElementById('prod-cat') ? document.getElementById('prod-cat').value : '';

  var filtered = [];
  for (var i = 0; i < PRODUCTS.length; i++) {
    var p = PRODUCTS[i];
    if (search && p.name.toLowerCase().indexOf(search) === -1 && p.sku.toLowerCase().indexOf(search) === -1 && p.brand.toLowerCase().indexOf(search) === -1) continue;
    if (cat && p.category !== cat) continue;
    filtered.push(p);
  }

  // Sort: in-cart first, then by frequency (recent orders), then alphabetical
  filtered.sort(function(a, b) {
    var aCart = 0; var bCart = 0;
    for (var i = 0; i < CART.length; i++) {
      if (CART[i].productId === a.id) aCart = 1;
      if (CART[i].productId === b.id) bCart = 1;
    }
    if (aCart !== bCart) return bCart - aCart;
    var af = CART_FREQ[a.id] || 0;
    var bf = CART_FREQ[b.id] || 0;
    if (af !== bf) return bf - af;
    return a.name.localeCompare(b.name);
  });

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var p = filtered[i];
    var cartItem = null;
    for (var j = 0; j < CART.length; j++) {
      if (CART[j].productId === p.id) { cartItem = CART[j]; break; }
    }
    var freq = CART_FREQ[p.id] || 0;
    html += '<div class="prod-card' + (cartItem ? ' in-cart' : '') + '">';
    html += '<div class="prod-card-top">';
    html += '<div style="flex:1">';
    html += '<div class="prod-name">' + p.name + (freq > 0 ? ' <span class="badge bg-blue" style="font-size:9px">&#128257; ' + freq + 'x</span>' : '') + '</div>';
    html += '<div class="prod-meta">' + p.sku + ' &middot; ' + p.brand + ' &middot; ' + p.category + '</div>';
    html += '</div>';
    html += '<div class="prod-price">' + fmtPKR(p.price) + '</div>';
    html += '</div>';
    if (cartItem) {
      html += '<div class="qty-ctrl">';
      html += '<button class="qty-btn" onclick="changeQty(' + p.id + ',-1)">&#8722;</button>';
      html += '<span class="qty-num">' + cartItem.qty + '</span>';
      html += '<button class="qty-btn" onclick="changeQty(' + p.id + ',1)">&#43;</button>';
      html += '<span class="f11 text-gold" style="margin-left:6px">' + fmtPKR(cartItem.price * cartItem.qty) + '</span>';
      html += '<button class="btn btn-red btn-xs" style="margin-left:auto" onclick="removeFromCart(' + p.id + ')">Remove</button>';
      html += '</div>';
    } else {
      html += '<button class="btn btn-navy btn-sm mt-8" onclick="addToCart(' + p.id + ')">Add to Order</button>';
    }
    html += '</div>';
  }
  if (filtered.length === 0) html = '<div class="empty"><div class="empty-ico">&#128270;</div><div class="empty-txt">No products found</div></div>';
  wrap.innerHTML = html;
}

function addToCart(pid) {
  if (!CART_CUST) { showToast('Select a customer first', 'error'); return; }
  for (var i = 0; i < CART.length; i++) {
    if (CART[i].productId === pid) { CART[i].qty++; refreshOrderPage(); return; }
  }
  var prod = null;
  for (var i = 0; i < PRODUCTS.length; i++) { if (PRODUCTS[i].id === pid) { prod = PRODUCTS[i]; break; } }
  if (!prod) return;
  CART.push({productId: pid, name: prod.name, sku: prod.sku, brand: prod.brand, price: prod.price, qty: 1});
  refreshOrderPage();
}

function changeQty(pid, delta) {
  for (var i = 0; i < CART.length; i++) {
    if (CART[i].productId === pid) {
      CART[i].qty += delta;
      if (CART[i].qty <= 0) { CART.splice(i, 1); }
      refreshOrderPage();
      return;
    }
  }
}

function removeFromCart(pid) {
  for (var i = 0; i < CART.length; i++) {
    if (CART[i].productId === pid) { CART.splice(i, 1); refreshOrderPage(); return; }
  }
}

function refreshOrderPage() {
  var c = document.getElementById('main-content');
  if (c) renderOrder(c);
}

function submitOrder() {
  if (!CART_CUST) { showToast('Select a customer', 'error'); return; }
  if (CART.length === 0) { showToast('Add at least one product', 'error'); return; }
  var total = 0;
  for (var i = 0; i < CART.length; i++) total += CART[i].price * CART[i].qty;

  var order = {
    id: uid(),
    officerUsername: CU.username,
    officerName: CU.name,
    region: CU.region,
    customerId: CART_CUST.id,
    customerName: CART_CUST.name,
    customerCity: CART_CUST.city,
    customerMobile: CART_CUST.mobile || '',
    customerAddress: CART_CUST.address || '',
    items: CART.slice(),
    total: total,
    notes: document.getElementById('ord-notes') ? document.getElementById('ord-notes').value : '',
    status: 'Pending',
    createdAt: new Date().toISOString()
  };

  dbPut('orders', order, function() {
    CART = [];
    CART_CUST = null;
    showToast('Order submitted!', 'success');
    var c = document.getElementById('main-content');
    if (c) renderOrder(c);
    // Show PDF option
    setTimeout(function() { showOrderPDF(order); }, 500);
  });
}

function deleteOrder(oid) {
  if (!confirm('Cancel this order?')) return;
  dbDelete('orders', oid, function() {
    showToast('Order cancelled', 'info');
    var c = document.getElementById('main-content');
    if (c) renderOrder(c);
  });
}

function showOrderPDF(order) {
  var items = order.items || [];
  var tbl = '';
  tbl += '<table style="width:100%;border-collapse:collapse;margin:16px 0">';
  tbl += '<tr style="background:#0A1628;color:#fff"><th style="padding:8px">Product</th><th style="padding:8px">SKU</th><th style="padding:8px">Qty</th><th style="padding:8px">Price</th><th style="padding:8px">Amount</th></tr>';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    tbl += '<tr style="border-bottom:1px solid #e2e8f0"><td style="padding:7px">' + it.name + '</td><td style="padding:7px;font-size:11px">' + it.sku + '</td><td style="padding:7px;text-align:center">' + it.qty + '</td><td style="padding:7px">' + fmtPKR(it.price) + '</td><td style="padding:7px;font-weight:700">' + fmtPKR(it.price * it.qty) + '</td></tr>';
  }
  tbl += '<tr style="background:#f0f4f8"><td colspan="4" style="padding:8px;font-weight:700;text-align:right">GRAND TOTAL</td><td style="padding:8px;font-weight:900;font-size:16px;color:#C9A84C">' + fmtPKR(order.total) + '</td></tr>';
  tbl += '</table>';

  var info = '<table style="border-collapse:collapse;margin-bottom:16px;font-size:13px"><tr><td style="padding:4px 12px 4px 0;color:#718096">Order ID</td><td style="padding:4px 0;font-weight:700">' + order.id + '</td></tr>';
  info += '<tr><td style="padding:4px 12px 4px 0;color:#718096">Date</td><td>' + fmtDate(order.createdAt) + '</td></tr>';
  info += '<tr><td style="padding:4px 12px 4px 0;color:#718096">Customer</td><td style="font-weight:700">' + order.customerName + '</td></tr>';
  info += '<tr><td style="padding:4px 12px 4px 0;color:#718096">City</td><td>' + order.customerCity + '</td></tr>';
  info += '<tr><td style="padding:4px 12px 4px 0;color:#718096">Officer</td><td>' + order.officerName + '</td></tr>';
  info += '<tr><td style="padding:4px 12px 4px 0;color:#718096">Region</td><td>' + order.region + '</td></tr>';
  if (order.notes) info += '<tr><td style="padding:4px 12px 4px 0;color:#718096">Notes</td><td>' + order.notes + '</td></tr>';
  info += '</table>';

  pdfExport('Sale Order #' + order.id.slice(-8).toUpperCase(), info + tbl);
}

function submitRecovery() {
  var custId = parseInt(document.getElementById('rec-cust').value);
  var amt    = parseFloat(document.getElementById('rec-amt').value);
  if (!custId) { showToast('Select a customer', 'error'); return; }
  if (!amt || amt <= 0) { showToast('Enter valid amount', 'error'); return; }
  var cust = null;
  for (var i = 0; i < MY_CUSTS.length; i++) { if (MY_CUSTS[i].id === custId) { cust = MY_CUSTS[i]; break; } }
  var rec = {
    id: uid(),
    officerUsername: CU.username,
    officerName: CU.name,
    region: CU.region,
    customerId: custId,
    customerName: cust ? cust.name : '',
    amount: amt,
    method: document.getElementById('rec-method').value,
    ref: document.getElementById('rec-ref').value,
    notes: document.getElementById('rec-notes').value,
    verified: false,
    createdAt: new Date().toISOString()
  };
  dbPut('recoveries', rec, function() {
    showToast('Recovery posted!', 'success');
    renderRecovery(document.getElementById('main-content'));
  });
}

function renderVisits(c) {
  dbGetAll('visits', function(visits) {
    var myVisits = visits.filter(function(v) { return v.officerUsername === CU.username; });

function captureVisitGPS() {
  var btn = document.querySelector('#vis-gps-wrap button');
  if (btn) { btn.textContent = 'Getting GPS...'; btn.disabled = true; }
  getGPS(function(gps, err) {
    var el = document.getElementById('vis-gps-status');
    if (gps) {
      VISIT_GPS = gps;
      if (el) el.innerHTML = '<div class="gps-coords">&#128205; ' + gps.lat.toFixed(5) + ', ' + gps.lng.toFixed(5) + ' (acc: ' + Math.round(gps.acc) + 'm)</div>';
      if (btn) { btn.textContent = '&#10003; Location Captured'; btn.style.background = '#c6f6d5'; btn.style.color = '#276749'; }
    } else {
      VISIT_GPS = null;
      if (el) el.innerHTML = '<div class="gps-fail">GPS unavailable. Visit will be flagged for manual review.</div>';
      if (btn) { btn.textContent = 'GPS Unavailable'; btn.disabled = false; }
    }
  });
}

function triggerPhoto() {
  document.getElementById('photo-input').click();
}

function handlePhoto(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    compressImage(e.target.result, 400, function(compressed) {
      PHOTO_DATA = compressed;
      var preview = document.getElementById('photo-preview');
      var placeholder = document.getElementById('photo-placeholder');
      var wrap = document.getElementById('photo-wrap');
      if (preview) { preview.src = compressed; preview.style.display = 'block'; }
      if (placeholder) placeholder.style.display = 'none';
      if (wrap) wrap.classList.add('has-photo');
    });
  };
  reader.readAsDataURL(input.files[0]);
}

function togglePhotoDecline() {
  var el = document.getElementById('photo-decline-wrap');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function submitVisit(forceNoPhoto) {
  var custId = parseInt(document.getElementById('vis-cust') ? document.getElementById('vis-cust').value : '');
  if (!custId) { showToast('Select a customer', 'error'); return; }

  var photoDeclined = document.getElementById('photo-decline-wrap') && document.getElementById('photo-decline-wrap').style.display !== 'none';
  var declineReason = document.getElementById('photo-decline-reason') ? document.getElementById('photo-decline-reason').value.trim() : '';

  if (!PHOTO_DATA && !photoDeclined) {
    showToast('Photo is required. Tap the camera or use No Photo.', 'error');
    return;
  }
  if (photoDeclined && declineReason.length < 20) {
    showToast('Explain why customer declined (min 20 chars)', 'error');
    return;
  }
  if (!VISIT_GPS) {
    if (!confirm('No GPS captured. Visit will be flagged for review. Continue?')) return;
  }

  var cust = null;
  for (var i = 0; i < MY_CUSTS.length; i++) { if (MY_CUSTS[i].id === custId) { cust = MY_CUSTS[i]; break; } }

  var visit = {
    id: uid(),
    officerUsername: CU.username,
    officerName: CU.name,
    region: CU.region,
    customerId: custId,
    customerName: cust ? cust.name : '',
    customerCity: cust ? cust.city : '',
    purpose: document.getElementById('vis-purpose').value,
    outcome: document.getElementById('vis-outcome').value,
    remarks: document.getElementById('vis-remarks').value,
    checkinGPS: VISIT_GPS,
    photo: photoDeclined ? null : PHOTO_DATA,
    photoDeclined: photoDeclined,
    photoDeclineReason: declineReason,
    flagged: !VISIT_GPS || photoDeclined,
    date: todayStr(),
    createdAt: new Date().toISOString()
  };

  // Add waypoint to journey
  if (JOURNEY && !JOURNEY.endTime && VISIT_GPS) {
    var wps = JOURNEY.waypoints || [];
    if (wps.length > 0) {
      var prev = wps[wps.length - 1];
      var dist = gpsDistance(prev, VISIT_GPS);
      JOURNEY.gpsKm = (JOURNEY.gpsKm || 0) + dist * 1.10;
    } else if (JOURNEY.startGPS) {
      var dist = gpsDistance(JOURNEY.startGPS, VISIT_GPS);
      JOURNEY.gpsKm = (JOURNEY.gpsKm || 0) + dist * 1.10;
    }
    wps.push({lat: VISIT_GPS.lat, lng: VISIT_GPS.lng, time: new Date().toISOString(), customer: cust ? cust.name : ''});
    JOURNEY.waypoints = wps;
    dbPut('journey', JOURNEY);
    updateStatusBar();
  }

  dbPut('visits', visit, function() {
    VISIT_GPS = null;
    PHOTO_DATA = null;
    showToast('Visit logged!', 'success');
    renderVisits(document.getElementById('main-content'));
  });
}

  var type = document.getElementById('exp-type') ? document.getElementById('exp-type').value : '';

    if (manualSec) manualSec.style.display = 'none';
  } else {
    if (fuelSec) fuelSec.style.display = 'none';
    if (manualSec) manualSec.style.display = 'block';
  }
}

function submitExpense() {

  var exp = {
    id: uid(),
    officerUsername: CU.username,
    officerName: CU.name,
    region: CU.region,
    receiptNo: rcpt,
    type: type,
    amount: amt,
    date: document.getElementById('exp-date').value,
    description: document.getElementById('exp-desc') ? document.getElementById('exp-desc').value : '',
    isFuelAuto: isFuel,
    managerApproved: false,

  };

function exportReportPDF() {
  dbGetAll('orders', function(orders) {
  dbGetAll('recoveries', function(recs) {
  dbGetAll('visits', function(visits) {
    var today = todayStr();
    var tOrders = orders.filter(function(o) { return o.officerUsername === CU.username && o.createdAt && o.createdAt.indexOf(today) === 0; });
    var tRecs   = recs.filter(function(r)   { return r.officerUsername === CU.username && r.createdAt && r.createdAt.indexOf(today) === 0; });
    var tVisits = visits.filter(function(v) { return v.officerUsername === CU.username && v.date === today; });

    var totSales = 0; for (var i = 0; i < tOrders.length; i++) totSales += (tOrders[i].total||0);
    var totRec   = 0; for (var i = 0; i < tRecs.length; i++)   totRec   += (tRecs[i].amount||0);

    var tbl = '';
    tbl += '<table style="width:100%;border-collapse:collapse;margin-bottom:16px">';
    tbl += '<tr style="background:#0A1628;color:#fff"><td style="padding:8px;font-weight:700">Summary</td><td style="padding:8px"></td></tr>';
    tbl += '<tr><td style="padding:6px;border-bottom:1px solid #e2e8f0;color:#718096">Officer</td><td style="padding:6px;border-bottom:1px solid #e2e8f0;font-weight:700">' + CU.name + '</td></tr>';
    tbl += '<tr><td style="padding:6px;border-bottom:1px solid #e2e8f0;color:#718096">Region</td><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + CU.region + '</td></tr>';
    tbl += '<tr><td style="padding:6px;border-bottom:1px solid #e2e8f0;color:#718096">Date</td><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + today + '</td></tr>';
    tbl += '<tr><td style="padding:6px;border-bottom:1px solid #e2e8f0;color:#718096">Orders</td><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + tOrders.length + ' (' + fmtPKR(totSales) + ')</td></tr>';
    tbl += '<tr><td style="padding:6px;border-bottom:1px solid #e2e8f0;color:#718096">Recovery</td><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + fmtPKR(totRec) + '</td></tr>';
    tbl += '<tr><td style="padding:6px;color:#718096">Visits</td><td style="padding:6px">' + tVisits.length + '</td></tr>';
    tbl += '</table>';

    if (tOrders.length > 0) {
      tbl += '<h3 style="color:#0A1628;margin-bottom:8px">Orders</h3>';
      tbl += '<table style="width:100%;border-collapse:collapse;margin-bottom:16px">';
      tbl += '<tr style="background:#0A1628;color:#fff"><th style="padding:8px">Customer</th><th style="padding:8px">Amount</th></tr>';
      for (var i = 0; i < tOrders.length; i++) tbl += '<tr><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + tOrders[i].customerName + '</td><td style="padding:6px;border-bottom:1px solid #e2e8f0;font-weight:700">' + fmtPKR(tOrders[i].total) + '</td></tr>';
      tbl += '</table>';
    }

    if (tVisits.length > 0) {
      tbl += '<h3 style="color:#0A1628;margin-bottom:8px">Visits</h3>';
      tbl += '<table style="width:100%;border-collapse:collapse;margin-bottom:16px">';
      tbl += '<tr style="background:#0A1628;color:#fff"><th style="padding:8px">Customer</th><th style="padding:8px">Purpose</th><th style="padding:8px">Outcome</th></tr>';
      for (var i = 0; i < tVisits.length; i++) tbl += '<tr><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + tVisits[i].customerName + '</td><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + tVisits[i].purpose + '</td><td style="padding:6px;border-bottom:1px solid #e2e8f0">' + tVisits[i].outcome + '</td></tr>';
      tbl += '</table>';
    }

    pdfExport('Daily Field Report - ' + CU.name + ' - ' + today, tbl);
  });
  });
  });
}

// ============================================================
// PDF EXPORT
// ============================================================
function pdfExport(title, bodyHTML) {
  var w = window.open('', '_blank');
  if (!w) { showToast('Allow popups to export PDF', 'error'); return; }
  var dt = new Date().toLocaleString('en-PK');
  var waUrl = 'https://wa.me/?text=' + encodeURIComponent(title + ' - Biorise Pharmaceuticals - ' + dt);

  var h = '<!DOCTYPE html><html><head><meta charset=UTF-8><title>' + title + '<' + '/title>';
  h += '<style>body{font-family:Arial,sans-serif;padding:20px;color:#1a202c}';
  h += '.header{border-bottom:3px solid #C9A84C;padding-bottom:12px;margin-bottom:16px}';
  h += '.logo-text{font-size:24px;font-weight:900;color:#0A1628}.logo-text em{color:#C9A84C;font-style:normal}';
  h += '.meta{font-size:12px;color:#718096;margin-top:4px}';
  h += '@media print{.no-print{display:none}}<' + '/style><' + '/head><body>';
  h += '<div class="header"><div class="logo-text">Bio<em>rise</em> Pharmaceuticals<' + '/div>';
  h += '<div class="meta">19-KM Lahore Road, Multan, Pakistan &middot; Generated: ' + dt + '<' + '/div><' + '/div>';
  h += '<h2 style="color:#0A1628;margin-bottom:16px">' + title + '<' + '/h2>';
  h += bodyHTML;
  h += '<div class="no-print" style="margin-top:20px;border-top:1px solid #e2e8f0;padding-top:16px">';
  h += '<button onclick="window.print()" style="padding:10px 22px;background:#0A1628;color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;margin-right:10px">&#128196; Print / Save PDF<' + '/button>';
  h += '<a href="' + waUrl + '" target="_blank" style="padding:10px 22px;background:#25D366;color:#fff;border-radius:7px;font-size:14px;font-weight:700;text-decoration:none">&#128233; Share WhatsApp<' + '/a>';
  h += '<' + '/div><' + '/body><' + '/html>';
  w.document.write(h);
  w.document.close();
}
