<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>Biorise SFA - Field Officer</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a1628;--navy2:#0f2040;--navy3:#162a52;--blue:#1a3a6b;
  --accent:#e8a020;--accent2:#f5b942;--green:#22c55e;--red:#ef4444;
  --text:#e8edf5;--text2:#a0aec0;--card:#0f2040;--border:#1e3a6e;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{background:var(--navy);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#0a1628 0%,#0f2040 50%,#0a1628 100%)}
.login-logo-wrap{margin-bottom:8px;text-align:center}
.login-logo-wrap img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);box-shadow:0 0 32px rgba(232,160,32,0.3)}
.login-brand{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:1px;margin-bottom:2px}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:28px;letter-spacing:2px;text-transform:uppercase}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text);text-align:center}
.field-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.field-input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:16px;transition:border 0.2s}
.field-input:focus{border-color:var(--accent)}
.btn-login{width:100%;background:var(--accent);color:#0a1628;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:0.5px;transition:background 0.2s}
.btn-login:active{background:var(--accent2)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
#app-shell{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}
.topbar-info{display:flex;flex-direction:column}
.topbar-name{font-size:14px;font-weight:700;color:var(--text)}
.topbar-role{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:6px;display:inline-block}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.offline{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}
.btn-logout:active{background:var(--red);color:#fff;border-color:var(--red)}
.nav-tabs{background:var(--navy2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:none;padding:10px 16px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s,border-color 0.2s}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content-area{flex:1;padding:16px;padding-bottom:80px;max-width:600px;margin:0 auto;width:100%}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.card-title{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:18px;font-weight:800;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.prog-wrap{margin:8px 0 4px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.prog-track{background:var(--navy3);border-radius:99px;height:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.6s}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.form-input,.form-select,.form-textarea{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:border 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-select option{background:var(--navy2)}
.form-textarea{resize:vertical;min-height:80px}
.btn{border:none;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.1s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#0a1628}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--blue);color:var(--text)}
.btn-block{width:100%}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-gold{background:var(--accent);color:#0a1628}
.btn-whatsapp{background:#25d366;color:#fff}
.btn-pdf{background:var(--red);color:#fff}
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px}
.search-input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:11px 13px 11px 36px;color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.pill{flex:none;padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--navy3);color:var(--text2);transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.pill.active{background:var(--accent);color:#0a1628;border-color:var(--accent)}
.prod-item{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.prod-info{flex:1}
.prod-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.prod-meta{font-size:11px;color:var(--text2)}
.prod-price{font-size:14px;font-weight:800;color:var(--accent);white-space:nowrap;margin-left:10px}
.prod-qty-wrap{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{background:var(--blue);color:var(--text);border:none;border-radius:6px;width:30px;height:30px;font-size:18px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.qty-input{width:50px;text-align:center;background:var(--navy3);border:1px solid var(--border);border-radius:6px;padding:4px;color:var(--text);font-size:14px;font-weight:700;outline:none}
.cart-banner{background:linear-gradient(90deg,var(--blue),var(--navy3));border:1px solid var(--accent);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.cart-banner-left{font-size:13px;font-weight:700;color:var(--accent)}
.cart-banner-count{font-size:11px;color:var(--text2);margin-top:2px}
.cart-total{font-size:16px;font-weight:800;color:var(--accent2)}
.cart-item{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.cart-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cart-item-name{font-size:13px;font-weight:700;color:var(--text);flex:1;margin-right:8px}
.cart-item-subtotal{font-size:13px;font-weight:800;color:var(--accent);white-space:nowrap}
.cart-item-meta{font-size:11px;color:var(--text2)}
.cart-remove{background:var(--red);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-weight:700;margin-left:auto}
.gps-box{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;text-align:center}
.gps-coords{font-size:13px;color:var(--green);font-weight:700;margin-top:6px}
.exp-category-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.exp-cat-btn{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);transition:all 0.2s;text-transform:uppercase}
.exp-cat-btn.active{background:rgba(232,160,32,0.15);border-color:var(--accent);color:var(--accent)}
.hist-table{width:100%;border-collapse:collapse;font-size:12px}
.hist-table th{background:var(--navy3);color:var(--text2);padding:8px 10px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
.hist-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
.hist-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.badge-pending{background:rgba(232,160,32,0.15);color:var(--accent)}
.badge-approved{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-rejected{background:rgba(239,68,68,0.15);color:var(--red)}
.report-section{background:var(--navy3);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.report-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.report-row:last-child{border-bottom:none}
.report-key{color:var(--text2)}
.report-val{font-weight:700;color:var(--text)}
.golive-bar{background:linear-gradient(90deg,var(--navy3),var(--blue));border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.golive-status{font-size:13px;font-weight:700;color:var(--text)}
.golive-time{font-size:11px;color:var(--text2);margin-top:2px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state-icon{font-size:40px;margin-bottom:12px}
.empty-state-text{font-size:14px}
.pay-methods{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pay-method{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:10px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);transition:all 0.2s;text-transform:uppercase}
.pay-method.active{background:rgba(232,160,32,0.15);border-color:var(--accent);color:var(--accent)}
.copyright-footer{text-align:center;padding:16px;font-size:10px;color:var(--text2);letter-spacing:0.3px;border-top:1px solid var(--border);margin-top:8px}
.action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.action-row .btn{flex:1;min-width:110px}
.notice{background:rgba(232,160,32,0.08);border:1px solid rgba(232,160,32,0.3);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--accent);margin-bottom:12px}
.photo-upload-area{background:var(--navy3);border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:12px;transition:border-color 0.2s}
.photo-upload-area.has-photo{border-color:var(--green);border-style:solid}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:8px}
.odo-display{background:linear-gradient(135deg,var(--navy3),var(--blue));border:1px solid var(--accent);border-radius:10px;padding:14px;margin-bottom:12px;text-align:center}
.odo-val{font-size:28px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.odo-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.loader-overlay{position:fixed;inset:0;background:rgba(10,22,40,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998}
.spinner{width:40px;height:40px;border:4px solid var(--navy3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{margin-top:14px;font-size:13px;color:var(--text2)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy2);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);z-index:9999;opacity:0;pointer-events:none;transition:all 0.3s;white-space:nowrap;border:1px solid var(--border);max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-success{border-color:var(--green);color:var(--green)}
#toast.toast-error{border-color:var(--red);color:var(--red)}
</style>
</head>

// ============================================================
// DATA LAYER -- Firebase source of truth + localStorage cache
// ============================================================
function cacheKey(coll) { return 'br_' + coll + '_' + CU.username; }

function loadFromCache(coll) {
  try { var v = localStorage.getItem(cacheKey(coll)); return v ? JSON.parse(v) : []; } catch(e) { return []; }
}

function saveToCache(coll, arr) {
  try { localStorage.setItem(cacheKey(coll), JSON.stringify(arr)); } catch(e) {}
}

// Load all collections from Firebase, filtered to current officer
function loadAllDataFromFirebase(done) {
  // First load from cache for instant display
  DATA.orders = loadFromCache('orders');
  DATA.recoveries = loadFromCache('recoveries');
  DATA.visits = loadFromCache('visits');
  DATA.expenses = loadFromCache('expenses');
  DATA.apps = loadFromCache('apps');
  DATA.stock = loadFromCache('stock');
  DATA.golive = loadFromCache('golive');

  if (typeof fetch === 'undefined') { done(); return; }
  setSyncDot('syncing');

  var collections = ['orders','recoveries','visits','expenses','apps','stock','golive'];
  var pending = collections.length;
  var anyError = false;

  function checkDone() {
    pending--;
    if (pending <= 0) {
      if (anyError) setSyncDot('offline'); else setSyncDot('ok');
      done();
    }
  }

  for (var i = 0; i < collections.length; i++) {
    (function(coll) {
      // Query collection filtered by officer field
      var url = FB_BASE + coll + '?key=' + FIREBASE_API_KEY + '&pageSize=300';
      fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(resp) {
          if (resp && resp.documents) {
            var arr = [];
            for (var d = 0; d < resp.documents.length; d++) {
              var obj = parseFirestoreDoc(resp.documents[d]);
              if (obj && obj.officer === CU.username) arr.push(obj);
            }
            // Sort by createdAt
            arr.sort(function(a,b){ return (a.createdAt||'').localeCompare(b.createdAt||''); });
            DATA[coll] = arr;
            saveToCache(coll, arr);
          }
          checkDone();
        })
        .catch(function() { anyError = true; checkDone(); });
    })(collections[i]);
  }
}

// Parse a Firestore REST document into a plain object
function parseFirestoreDoc(doc) {
  if (!doc || !doc.fields) return null;
  var obj = {};
  obj._docName = doc.name; // full path for updates
  for (var key in doc.fields) {
    if (!doc.fields.hasOwnProperty(key)) continue;
    var f = doc.fields[key];
    if (f.stringValue !== undefined) obj[key] = f.stringValue;
    else if (f.doubleValue !== undefined) obj[key] = f.doubleValue;
    else if (f.integerValue !== undefined) obj[key] = parseFloat(f.integerValue);
    else if (f.booleanValue !== undefined) obj[key] = f.booleanValue;
    else if (f.nullValue !== undefined) obj[key] = null;
    else obj[key] = '';
  }
  // Decode JSON-encoded fields (items array etc)
  if (obj.items && typeof obj.items === 'string') {
    try { obj.items = JSON.parse(obj.items); } catch(e) { obj.items = []; }
  }
  if (obj.gps && typeof obj.gps === 'string') {
    try { obj.gps = JSON.parse(obj.gps); } catch(e) { obj.gps = null; }
  }
  return obj;
}

// Write a record to Firebase + update local DATA + cache
function pushRecord(coll, record, done) {
  // 1. Optimistic local update
  DATA[coll].push(record);
  saveToCache(coll, DATA[coll]);
  // 2. Write to Firebase
  if (typeof fetch === 'undefined') { if (done) done(); return; }
  setSyncDot('syncing');
  var url = FB_BASE + coll + '?key=' + FIREBASE_API_KEY;
  var fields = toFirestoreFields(record);
  fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fields:fields})})
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (resp && resp.name) {
        record._docName = resp.name;
        saveToCache(coll, DATA[coll]);
      }
      setSyncDot('ok');
      if (done) done();
    })
    .catch(function() { setSyncDot('offline'); if (done) done(); });
}

function toFirestoreFields(data) {
  var fields = {};
  for (var key in data) {
    if (!data.hasOwnProperty(key)) continue;
    if (key === '_docName') continue;
    var val = data[key];
    if (typeof val === 'string') fields[key] = {stringValue: val};
    else if (typeof val === 'number') fields[key] = {doubleValue: val};
    else if (typeof val === 'boolean') fields[key] = {booleanValue: val};
    else if (val === null || val === undefined) fields[key] = {nullValue: null};
    else fields[key] = {stringValue: JSON.stringify(val)};
  }
  return fields;
}

function fmtPKR(n){ var num=parseFloat(n)||0; return 'PKR ' + num.toLocaleString('en-PK',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d){ if(!d) return ''; var dt=new Date(d); return dt.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(d){ if(!d) return ''; var dt=new Date(d); return dt.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'}); }
function today(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function captureGPS(callback){
  if (!navigator.geolocation){ callback(null,'GPS not supported'); return; }
  navigator.geolocation.getCurrentPosition(
    function(pos){ GPS_LAT=pos.coords.latitude; GPS_LNG=pos.coords.longitude; callback(pos.coords,null); },
    function(err){ callback(null, err.message||'GPS unavailable'); },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}

// Haversine distance in KM between two lat/lng points
function haversineKM(lat1,lng1,lat2,lng2){
  var R=6371; var dLat=(lat2-lat1)*Math.PI/180; var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// DASHBOARD -- Recovery target. Meter moves on POST.
// Achievement = all posted recoveries EXCEPT admin-rejected.
// Order status pending/approved shown.
// ============================================================
function renderDashboard(el) {
  var orders = getMyOrders();
  var recoveries = getMyRecoveries();
  var visits = getMyVisits();
  var target = getTarget();

  // Recovery achievement: count all EXCEPT admin-rejected
  var achievedRec = 0; var rejectedRec = 0; var pendingRec = 0; var approvedRec = 0;
  for (var i = 0; i < recoveries.length; i++) {
    var r = recoveries[i];
    var adm = r.adminStatus || 'pending';
    if (adm === 'rejected') { rejectedRec += (r.amount || 0); }
    else {
      achievedRec += (r.amount || 0);
      if (adm === 'approved') approvedRec += (r.amount || 0);
      else pendingRec += (r.amount || 0);
    }
  }
  var pct = target > 0 ? Math.min(100, (achievedRec / target * 100)) : 0;

  // Order status counts
  var ordPending = 0; var ordApproved = 0; var ordRejected = 0; var ordTotal = 0;
  for (var j = 0; j < orders.length; j++) {
    var st = orders[j].status || 'pending';
    if (st === 'approved') ordApproved++;
    else if (st === 'rejected') ordRejected++;
    else ordPending++;
    ordTotal += (orders[j].total || 0);
  }

  var h = [];
  // Go Live bar
  var glState = getGoLiveState();
  h.push('<div class="golive-bar">');
  h.push('<div><div class="golive-status" id="gl-status">' + glState.statusText + '</div>');
  h.push('<div class="golive-time" id="gl-time">' + glState.timeText + '</div></div>');
  if (glState.showGoLive) h.push('<button class="btn btn-sm btn-primary" onclick="doGoLive()">Go Live</button>');
  else if (glState.showEndDay) h.push('<button class="btn btn-sm btn-danger" onclick="doEndDay()">End Day</button>');
  else h.push('<span class="badge badge-approved">Done</span>');
  h.push('</div>');

  // Recovery Target
  h.push('<div class="card">');
  h.push('<div class="card-title">Recovery Target Achievement</div>');
  h.push('<div class="prog-wrap">');
  h.push('<div class="prog-label"><span>Achievement</span><span>' + pct.toFixed(1) + '%</span></div>');
  h.push('<div class="prog-track"><div class="prog-fill" style="width:' + pct.toFixed(1) + '%"></div></div>');
  h.push('</div>');
  h.push('<div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px">');
  h.push('<span style="color:var(--text2)">Achieved: <strong style="color:var(--green)">' + fmtPKR(achievedRec) + '</strong></span>');
  h.push('<span style="color:var(--text2)">Target: <strong style="color:var(--accent)">' + fmtPKR(target) + '</strong></span>');
  h.push('</div>');
  if (rejectedRec > 0) h.push('<div style="font-size:11px;color:var(--red);margin-top:6px">Rejected (deducted): ' + fmtPKR(rejectedRec) + '</div>');
  h.push('</div>');

  // Recovery stat grid
  h.push('<div class="stat-grid">');
  h.push('<div class="stat-card"><div class="stat-val">' + fmtPKR(approvedRec) + '</div><div class="stat-lbl">Approved Recovery</div></div>');
  h.push('<div class="stat-card"><div class="stat-val">' + fmtPKR(pendingRec) + '</div><div class="stat-lbl">Pending Recovery</div></div>');
  h.push('</div>');

  // Order status grid
  h.push('<div class="card">');
  h.push('<div class="card-title">Order Status</div>');
  h.push('<div class="stat-grid" style="margin-bottom:0">');
  h.push('<div class="stat-card"><div class="stat-val">' + ordPending + '</div><div class="stat-lbl">Pending</div></div>');
  h.push('<div class="stat-card"><div class="stat-val" style="color:var(--green)">' + ordApproved + '</div><div class="stat-lbl">Approved</div></div>');
  h.push('</div>');
  h.push('<div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text2)">Total Order Value: <strong style="color:var(--accent)">' + fmtPKR(ordTotal) + '</strong></div>');
  h.push('</div>');

  // Quick actions
  h.push('<div class="card">');
  h.push('<div class="card-title">Quick Actions</div>');
  h.push('<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">');
  h.push('<button class="btn btn-primary btn-block" onclick="navOrder()">+ Book Order</button>');
  h.push('<button class="btn btn-success btn-block" onclick="navRecovery()">Post Recovery</button>');
  h.push('<button class="btn btn-secondary btn-block" onclick="navVisit()">Log Visit</button>');
  h.push('<button class="btn btn-gold btn-block" onclick="showPriceList()">Price List PDF</button>');
  h.push('</div>');
  h.push('</div>');

  h.push('<div class="card">');
  h.push('<div class="card-title">Recent Recoveries</div>');
  if (recoveries.length === 0) {
    h.push('<div class="empty-state" style="padding:16px 0"><div class="empty-state-icon">&#128176;</div><div class="empty-state-text">No recoveries yet</div></div>');

  el.innerHTML = h.join('');

// ============================================================
// GO LIVE -- both states + odometer validation
// ============================================================
function getGoLiveState() {
  var raw = localStorage.getItem('br_golive_' + CU.username);
  var todayRec = null;
  if (raw) { try { var gl = JSON.parse(raw); if (gl.date === today()) todayRec = gl; } catch(e) {} }
  if (!todayRec) {
    return { showGoLive:true, showEndDay:false, statusText:'Tap to Go Live', timeText:'Attendance not marked today' };
  }
  if (!todayRec.ended) {
    return { showGoLive:false, showEndDay:true, statusText:'You are Live', timeText:'Started: ' + fmtTime(todayRec.startTime) + ' | Odo: ' + todayRec.startOdo };
  }
  return { showGoLive:false, showEndDay:false, statusText:'Day Ended', timeText:'Start: ' + fmtTime(todayRec.startTime) + ' | End: ' + fmtTime(todayRec.endTime) + ' | KM: ' + (todayRec.kmTravelled||0).toFixed(0) };
}

function getLastOdometer() {
  // Find most recent odometer value across all golive records
  var maxOdo = 0;
  for (var i = 0; i < DATA.golive.length; i++) {
    var g = DATA.golive[i];
    if (g.endOdo && g.endOdo > maxOdo) maxOdo = g.endOdo;
    if (g.startOdo && g.startOdo > maxOdo) maxOdo = g.startOdo;
  }
  // Also check local
  var raw = localStorage.getItem('br_lastodo_' + CU.username);
  if (raw) { var v = parseFloat(raw); if (v > maxOdo) maxOdo = v; }
  return maxOdo;
}

function doGoLive() {
  var lastOdo = getLastOdometer();
  captureGPS(function(coords, err) {
    var prompt_msg = 'Enter START odometer reading (KM):';
    if (lastOdo > 0) prompt_msg += '\n(Last recorded: ' + lastOdo + ' - cannot be lower)';
    var startKm = prompt(prompt_msg);
    if (startKm === null) return;
    var sk = parseFloat(startKm);
    if (isNaN(sk)) { showToast('Enter a valid number', 'error'); return; }
    if (lastOdo > 0 && sk < lastOdo) {
      showToast('Start odometer cannot be less than last reading (' + lastOdo + ')', 'error');
      return;
    }
    var entry = {
      id: genId(), date: today(), createdAt: nowISO(),
      officer: CU.username, officerName: CU.name, region: CU.region,
      startTime: nowISO(), startOdo: sk,
      startLat: coords ? coords.latitude : null, startLng: coords ? coords.longitude : null,
      ended: false
    };
    localStorage.setItem('br_golive_' + CU.username, JSON.stringify(entry));
    localStorage.setItem('br_lastodo_' + CU.username, sk.toString());
    showToast('You are now Live!', 'success');
    renderDashboard(document.getElementById('content-area'));
  });
}

function doEndDay() {
  var raw = localStorage.getItem('br_golive_' + CU.username);
  if (!raw) { showToast('No active session', 'error'); return; }
  var gl = null;
  try { gl = JSON.parse(raw); } catch(e) { showToast('Session error', 'error'); return; }
  if (gl.date !== today() || gl.ended) { showToast('No active session to end', 'error'); return; }
  var endKm = prompt('Enter END odometer reading (KM):\n(Start was: ' + gl.startOdo + ' - must be higher)');
  if (endKm === null) return;
  var ek = parseFloat(endKm);
  if (isNaN(ek)) { showToast('Enter a valid number', 'error'); return; }
  if (ek < gl.startOdo) {
    showToast('End odometer (' + ek + ') cannot be less than start (' + gl.startOdo + ')', 'error');
    return;
  }
  gl.endOdo = ek; gl.endTime = nowISO(); gl.ended = true;
  gl.kmTravelled = ek - gl.startOdo;
  localStorage.setItem('br_golive_' + CU.username, JSON.stringify(gl));
  localStorage.setItem('br_lastodo_' + CU.username, ek.toString());
  // Persist to Firebase
  pushRecord('golive', gl, null);
  showToast('Day ended. KM travelled: ' + gl.kmTravelled.toFixed(0), 'success');
  renderDashboard(document.getElementById('content-area'));
}

// Safe print window -- no auto-print (fixes PC freeze)
function openPrintWindow(htmlContent) {
  var win = window.open('', '_blank');

  win.document.write(htmlContent);
  win.document.close();
}

function renderOrder(el) {
  var myCustomers = getMyCustomers();
  var cartTotal = 0;
  for (var x = 0; x < CART.length; x++) cartTotal += CART[x].qty * CART[x].price;
  var h = [];
  h.push('<div class="cart-banner">');
  h.push('<div><div class="cart-banner-left">&#128722; Order Cart</div>');
  h.push('<div class="cart-banner-count" id="cart-count">' + CART.length + ' item(s)</div></div>');
  h.push('<div class="cart-total" id="cart-grand-total">' + fmtPKR(cartTotal) + '</div>');
  h.push('</div>');
  if (CART.length > 0) {
    for (var ci = 0; ci < CART.length; ci++) {
      var it = CART[ci];
      h.push('<div class="cart-item"><div class="cart-item-top">');
      h.push('<div class="cart-item-name">' + it.name + '</div>');
      h.push('<div class="cart-item-subtotal" id="cart-sub-' + it.id + '">' + fmtPKR(it.qty*it.price) + '</div></div>');
      h.push('<div class="cart-item-meta">' + it.sku + ' &middot; ' + fmtPKR(it.price) + ' each</div>');
      h.push('<div class="prod-qty-wrap">');
      h.push('<button class="qty-btn" onclick="changeCartQty(' + it.id + ',-1)">-</button>');
      h.push('<input class="qty-input" type="number" id="qty-' + it.id + '" value="' + it.qty + '" min="1" oninput="setCartQty(' + it.id + ',this.value)">');
      h.push('<button class="qty-btn" onclick="changeCartQty(' + it.id + ',1)">+</button>');
      h.push('<button class="cart-remove" onclick="removeFromCart(' + ci + ')">Remove</button>');
      h.push('</div></div>');
    }
    h.push('<div class="form-group"><div class="form-label">Select Customer *</div>');
    h.push('<select class="form-select" id="order-cust-select" onchange="setOrderCustomer(this.value)">');
    h.push('<option value="">-- Select Customer --</option>');
    for (var mc = 0; mc < myCustomers.length; mc++) {
      var sel = (ORDER_CUST_ID == myCustomers[mc].id) ? ' selected' : '';
      h.push('<option value="' + myCustomers[mc].id + '"' + sel + '>' + myCustomers[mc].name + ' (' + myCustomers[mc].city + ')</option>');
    }
    h.push('</select></div>');
    if (myCustomers.length === 0) h.push('<div class="notice">No customers assigned to you. Contact admin.</div>');
    h.push('<div class="form-group"><div class="form-label">Remarks</div>');
    h.push('<textarea class="form-textarea" id="order-remarks" placeholder="Special instructions..."></textarea></div>');
    h.push('<div class="action-row" style="margin-bottom:12px">');
    h.push('<button class="btn btn-success" onclick="submitOrder()">Submit Order</button>');
    h.push('<button class="btn btn-pdf" onclick="exportOrderPDF()">Order PDF</button>');
    h.push('<button class="btn btn-whatsapp" onclick="shareOrderWhatsApp()">WhatsApp</button>');
    h.push('</div>');
  }
  h.push('<div class="filter-row">');
  var cats = ['ALL','INJECTION','ORAL LIQUID','ORAL POWDER'];
  for (var fi = 0; fi < cats.length; fi++) {
    var ac = ORDER_CAT_FILTER === cats[fi] ? ' active' : '';
    h.push('<div class="pill' + ac + '" data-cat="' + cats[fi] + '" onclick="pickOrderCat(this)">' + cats[fi] + '</div>');
  }
  h.push('</div>');
  h.push('<div class="search-wrap"><span class="search-icon">&#128269;</span>');
  h.push('<input class="search-input" id="order-search" placeholder="Search products..." value="' + ORDER_SEARCH + '" oninput="orderSearch(this.value)"></div>');
  h.push('<div id="product-list">' + buildProductList() + '</div>');
  el.innerHTML = h.join('');
}

function buildProductList() {
  var h = []; var filtered = [];
  for (var i = 0; i < PRODUCTS.length; i++) {
    var p = PRODUCTS[i];
    var matchCat = ORDER_CAT_FILTER === 'ALL' || p.category === ORDER_CAT_FILTER;
    var s = ORDER_SEARCH.toLowerCase();
    var matchSearch = !s || p.name.toLowerCase().indexOf(s)!==-1 || p.sku.toLowerCase().indexOf(s)!==-1 || p.brand.toLowerCase().indexOf(s)!==-1;
    if (matchCat && matchSearch) filtered.push(p);
  }
  if (filtered.length === 0) return '<div class="empty-state"><div class="empty-state-icon">&#128269;</div><div class="empty-state-text">No products found</div></div>';
  for (var j = 0; j < filtered.length; j++) {
    var prod = filtered[j]; var inCart = getCartQty(prod.id);
    h.push('<div class="prod-item"><div class="prod-info">');
    h.push('<div class="prod-name">' + prod.name + '</div>');
    h.push('<div class="prod-meta">' + prod.sku + ' &middot; ' + prod.brand + ' &middot; ' + prod.category + '</div>');
    if (inCart > 0) {
      h.push('<div class="prod-qty-wrap">');
      h.push('<button class="qty-btn" onclick="changeCartQty(' + prod.id + ',-1)">-</button>');
      h.push('<input class="qty-input" type="number" id="qty-' + prod.id + '" value="' + inCart + '" min="1" oninput="setCartQty(' + prod.id + ',this.value)">');
      h.push('<button class="qty-btn" onclick="changeCartQty(' + prod.id + ',1)">+</button></div>');
    }
    h.push('</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">');
    h.push('<div class="prod-price">' + fmtPKR(prod.price) + '</div>');
    if (inCart === 0) h.push('<button class="btn btn-sm btn-primary" onclick="addToCart(' + prod.id + ')">Add</button>');
    else h.push('<span style="font-size:11px;color:var(--green);font-weight:700">In Cart</span>');
    h.push('</div></div>');
  }
  return h.join('');
}

function getCartQty(prodId){ for(var i=0;i<CART.length;i++){ if(CART[i].id===prodId) return CART[i].qty; } return 0; }
function addToCart(prodId) {
  for (var i = 0; i < PRODUCTS.length; i++) {
    if (PRODUCTS[i].id === prodId) {
      for (var j = 0; j < CART.length; j++) { if (CART[j].id === prodId) { CART[j].qty++; renderOrder(document.getElementById('content-area')); return; } }
      CART.push({id:prodId,name:PRODUCTS[i].name,sku:PRODUCTS[i].sku,price:PRODUCTS[i].price,qty:1,category:PRODUCTS[i].category,brand:PRODUCTS[i].brand});
      showToast(PRODUCTS[i].name + ' added', 'success');
      renderOrder(document.getElementById('content-area')); return;
    }
  }
}
function changeCartQty(prodId, delta) {
  for (var i = 0; i < CART.length; i++) { if (CART[i].id === prodId) { CART[i].qty = Math.max(1, CART[i].qty + delta); renderOrder(document.getElementById('content-area')); return; } }
}
function setCartQty(prodId, val) {
  var q = parseInt(val) || 1; if (q < 1) q = 1;
  for (var i = 0; i < CART.length; i++) { if (CART[i].id === prodId) { CART[i].qty = q; updateCartDisplay(); return; } }
}
function updateCartDisplay() {
  var total = 0;
  for (var i = 0; i < CART.length; i++) total += CART[i].qty * CART[i].price;
  var gt = document.getElementById('cart-grand-total'); if (gt) gt.textContent = fmtPKR(total);
  var cc = document.getElementById('cart-count'); if (cc) cc.textContent = CART.length + ' item(s)';
  for (var j = 0; j < CART.length; j++) {
    var sub = document.getElementById('cart-sub-' + CART[j].id);
    if (sub) sub.textContent = fmtPKR(CART[j].qty * CART[j].price);
  }
}
function removeFromCart(idx){ CART.splice(idx,1); renderOrder(document.getElementById('content-area')); }
function setOrderCat(cat) {
  ORDER_CAT_FILTER = cat;
  var pl = document.getElementById('product-list'); if (pl) pl.innerHTML = buildProductList();
  var pills = document.querySelectorAll('.pill'); var cats = ['ALL','INJECTION','ORAL LIQUID','ORAL POWDER'];
  for (var i = 0; i < pills.length; i++) { pills[i].className = (cats[i]===cat) ? 'pill active' : 'pill'; }
}
function orderSearch(val){ ORDER_SEARCH = val; var pl = document.getElementById('product-list'); if (pl) pl.innerHTML = buildProductList(); }
function setOrderCustomer(custId) {
  ORDER_CUST_ID = parseInt(custId) || null;
  for (var i = 0; i < CUSTOMERS.length; i++) { if (CUSTOMERS[i].id === ORDER_CUST_ID) { ORDER_CUST_NAME = CUSTOMERS[i].name; break; } }
}
function submitOrder() {
  if (CART.length === 0) { showToast('Cart is empty', 'error'); return; }
  if (!ORDER_CUST_ID) { showToast('Select a customer', 'error'); return; }
  var total = 0;
  for (var i = 0; i < CART.length; i++) total += CART[i].qty * CART[i].price;
  var remEl = document.getElementById('order-remarks');
  var order = {
    id: genId(), date: today(), createdAt: nowISO(),
    officer: CU.username, officerName: CU.name, region: CU.region,
    customerId: ORDER_CUST_ID, customerName: ORDER_CUST_NAME,
    items: CART.slice(), total: total,
    remarks: remEl ? remEl.value : '', status: 'pending'
  };
  pushRecord('orders', order, null);
  CART = []; ORDER_CUST_ID = null; ORDER_CUST_NAME = '';
  showToast('Order submitted!', 'success');
  renderOrder(document.getElementById('content-area'));
}

function renderRecovery(el) {
  var myCustomers = getMyCustomers();
  var recoveries = getMyRecoveries();
  var h = [];
  h.push('<div class="card"><div class="card-title">Post Recovery</div>');
  h.push('<div class="form-group"><div class="form-label">Customer *</div>');
  h.push('<select class="form-select" id="rec-cust" onchange="setRecCust(this.value)">');
  h.push('<option value="">-- Select Customer --</option>');
  for (var i = 0; i < myCustomers.length; i++) h.push('<option value="' + myCustomers[i].id + '">' + myCustomers[i].name + ' (' + myCustomers[i].city + ')</option>');
  h.push('</select></div>');
  if (myCustomers.length === 0) h.push('<div class="notice">No customers assigned to you. Contact admin.</div>');
  h.push('<div class="form-group"><div class="form-label">Amount (PKR) *</div>');
  h.push('<input class="form-input" type="number" id="rec-amount" placeholder="0" min="1"></div>');
  h.push('<div class="form-label" style="margin-bottom:8px">Payment Method *</div><div class="pay-methods">');
  var payMethods = ['Cash','Cheque','Bank Transfer','Mobile Money','Other'];
  for (var pm = 0; pm < payMethods.length; pm++) {
    var ac = REC_PAY_METHOD === payMethods[pm] ? ' active' : '';
    h.push('<div class="pay-method' + ac + '" data-method="' + payMethods[pm] + '" onclick="pickPayMethod(this)">' + payMethods[pm] + '</div>');
  }
  h.push('</div>');
  h.push('<div class="form-group"><div class="form-label">Reference / Cheque No.</div>');
  h.push('<input class="form-input" id="rec-ref" placeholder="Ref #, Cheque #, TRX ID"></div>');
  h.push('<div class="form-group"><div class="form-label">Remarks</div>');
  h.push('<input class="form-input" id="rec-remarks" placeholder="Optional notes"></div>');
  h.push('<button class="btn btn-success btn-block" onclick="submitRecovery()">Post Recovery</button></div>');
  h.push('<div class="card"><div class="card-title">Recovery History</div>');
  if (recoveries.length === 0) {
    h.push('<div class="empty-state" style="padding:16px 0"><div class="empty-state-icon">&#128176;</div><div class="empty-state-text">No recoveries yet</div></div>');
  } else {
    h.push('<table class="hist-table"><thead><tr><th>Date</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead><tbody>');
    var recList = recoveries.slice().reverse();
    for (var ri = 0; ri < recList.length; ri++) {
      var r = recList[ri]; var adm = r.adminStatus || 'pending';
      var badge = adm === 'approved' ? 'approved' : (adm === 'rejected' ? 'rejected' : 'pending');
      h.push('<tr><td>' + fmtDate(r.date) + '</td><td>' + (r.customerName||'-') + '</td><td>' + fmtPKR(r.amount) + '</td><td><span class="badge badge-' + badge + '">' + adm + '</span></td></tr>');
    }
    h.push('</tbody></table>');
  }
  h.push('</div>');
  el.innerHTML = h.join('');
}
function setRecCust(val){ REC_CUST_ID = parseInt(val) || null; }
function setPayMethod(method) {
  REC_PAY_METHOD = method;
  var btns = document.querySelectorAll('.pay-method'); var methods = ['Cash','Cheque','Bank Transfer','Mobile Money','Other'];
  for (var i = 0; i < btns.length; i++) { btns[i].className = (methods[i]===method) ? 'pay-method active' : 'pay-method'; }
}
function submitRecovery() {
  var amtEl = document.getElementById('rec-amount');
  var refEl = document.getElementById('rec-ref');
  var remEl = document.getElementById('rec-remarks');
  if (!REC_CUST_ID) { showToast('Select a customer', 'error'); return; }
  var amt = parseFloat(amtEl ? amtEl.value : 0);
  if (!amt || amt <= 0) { showToast('Enter a valid amount', 'error'); return; }
  var custName = '';
  for (var i = 0; i < CUSTOMERS.length; i++) { if (CUSTOMERS[i].id === REC_CUST_ID) { custName = CUSTOMERS[i].name; break; } }
  var rec = {
    id: genId(), date: today(), createdAt: nowISO(),
    officer: CU.username, officerName: CU.name, region: CU.region,
    customerId: REC_CUST_ID, customerName: custName, amount: amt,
    payMethod: REC_PAY_METHOD, ref: refEl ? refEl.value : '',
    remarks: remEl ? remEl.value : '',
    managerStatus: 'pending', adminStatus: 'pending'
  };

// Calculate straight-line distance chain x 1.1 road factor
function calcVisitDistance(visitList) {
  var sorted = visitList.slice().sort(function(a,b){ return (a.createdAt||'').localeCompare(b.createdAt||''); });
  var straightKM = 0;
  var prev = null;
  for (var i = 0; i < sorted.length; i++) {
    var v = sorted[i];
    if (v.gps && v.gps.lat && v.gps.lng) {
      if (prev) straightKM += haversineKM(prev.lat, prev.lng, v.gps.lat, v.gps.lng);
      prev = v.gps;
    }
  }
  return { straightKM: straightKM, roadKM: straightKM * 1.1 };
}

function captureVisitGPS() {
  var textEl = document.getElementById('visit-gps-text');
  if (textEl) textEl.textContent = 'Capturing...';
  captureGPS(function(coords, err) {
    if (err || !coords) { if (textEl) textEl.textContent = 'GPS failed: ' + (err||'unknown'); showToast('GPS capture failed', 'error'); return; }
    VISIT_GPS_DATA = {lat: coords.latitude, lng: coords.longitude, accuracy: coords.accuracy};
    if (textEl) textEl.textContent = coords.latitude.toFixed(5) + ', ' + coords.longitude.toFixed(5);
    showToast('GPS captured!', 'success');
  });
}
function takePhotoCamera(){ var i = document.getElementById('photo-input-camera'); if (i) i.click(); }
function uploadPhotoFile(){ var i = document.getElementById('photo-input-file'); if (i) i.click(); }
function handlePhotoUpload(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var maxW = 800; var maxH = 600; var w = img.width; var h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      VISIT_PHOTO_DATA = canvas.toDataURL('image/jpeg', 0.7);
      var preview = document.getElementById('photo-preview');
      var area = document.getElementById('photo-area');
      var status = document.getElementById('photo-status');
      if (preview) { preview.src = VISIT_PHOTO_DATA; preview.style.display = 'block'; }
      if (area) area.className = 'photo-upload-area has-photo';
      if (status) status.style.display = 'block';
      showToast('Photo added!', 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function getDateRange(period) {
  var now = new Date(); var todayStr = now.toISOString().slice(0,10);
  if (period === 'today') return {from: todayStr, to: todayStr};
  if (period === 'week') {
    var day = now.getDay(); var diff = now.getDate() - day + (day === 0 ? -6 : 1);
    var mon = new Date(new Date().setDate(diff));
    return {from: mon.toISOString().slice(0,10), to: todayStr};
  }
  if (period === 'month') {
    var yr = now.getFullYear(); var mo = now.getMonth();
    return {from: yr + '-' + ('0'+(mo+1)).slice(-2) + '-01', to: todayStr};
  }
  if (period === 'quarter') {
    var qStarts = [0,3,6,9]; var qStart = qStarts[Math.floor(now.getMonth()/3)];
    return {from: now.getFullYear() + '-' + ('0'+(qStart+1)).slice(-2) + '-01', to: todayStr};
  }
  return {from: '2000-01-01', to: todayStr};
}
function filterByRange(arr, dateField, range) {
  var out = [];
  for (var i = 0; i < arr.length; i++) {
    var d = (arr[i][dateField] || '').slice(0,10);
    if (d >= range.from && d <= range.to) out.push(arr[i]);
  }
  return out;
}
function renderReportPeriod(el, period) {
  var orders = getMyOrders(); var recoveries = getMyRecoveries();
  var visits = getMyVisits(); var expenses = getMyExpenses();
  var target = getTarget();
  var petrolRate = parseFloat(localStorage.getItem('br_petrol_rate') || '375');
  var range = getDateRange(period);
  var pOrders = filterByRange(orders, 'date', range);
  var pRec = filterByRange(recoveries, 'date', range);
  var pVisits = filterByRange(visits, 'date', range);
  var pExp = filterByRange(expenses, 'date', range);
  var periodSales = 0;
  for (var i = 0; i < pOrders.length; i++) periodSales += (pOrders[i].total || 0);
  var periodRecTotal = 0; var periodRecApproved = 0;
  for (var j = 0; j < pRec.length; j++) {
    if (pRec[j].adminStatus !== 'rejected') periodRecTotal += (pRec[j].amount || 0);
    if (pRec[j].adminStatus === 'approved') periodRecApproved += (pRec[j].amount || 0);
  }
  var periodExp = 0; var periodFuelKM = 0;
  for (var k = 0; k < pExp.length; k++) {
    periodExp += (pExp[k].amount || 0);
    if (pExp[k].category === 'Travel/Fuel') periodFuelKM += (pExp[k].km || 0);
  }
  var fuelAllowed = periodFuelKM * 0.02 * petrolRate;
  var distInfo = calcVisitDistance(pVisits);

  // Quarter recovery achievement (meter logic: all except rejected)
  var qRange = getDateRange('quarter');
  var qRecs = filterByRange(recoveries, 'date', qRange);
  var qAchieved = 0;
  for (var m = 0; m < qRecs.length; m++) { if (qRecs[m].adminStatus !== 'rejected') qAchieved += (qRecs[m].amount || 0); }
  var pct = target > 0 ? Math.min(100, (qAchieved / target * 100)) : 0;

  var pLabels = {today:'Today',week:'This Week',month:'This Month',quarter:'This Quarter'};
  var pLabel = pLabels[period] || period;
  var h = [];
  h.push('<div class="filter-row">');
  var periods = ['today','week','month','quarter']; var plbls = ['Today','Week','Month','Quarter'];
  for (var pi = 0; pi < periods.length; pi++) {
    var ac = period === periods[pi] ? ' active' : '';

  }
  h.push('</div>');
  h.push('<div class="card"><div class="card-title">' + pLabel + ' (' + range.from + (range.from !== range.to ? ' to ' + range.to : '') + ')</div>');
  h.push('<div class="report-section">');
  h.push('<div class="report-row"><span class="report-key">Orders Booked</span><span class="report-val">' + pOrders.length + ' (' + fmtPKR(periodSales) + ')</span></div>');
  h.push('<div class="report-row"><span class="report-key">Recovery Posted</span><span class="report-val">' + fmtPKR(periodRecTotal) + '</span></div>');
  h.push('<div class="report-row"><span class="report-key">Recovery Approved</span><span class="report-val" style="color:var(--green)">' + fmtPKR(periodRecApproved) + '</span></div>');
  h.push('<div class="report-row"><span class="report-key">Visits</span><span class="report-val">' + pVisits.length + '</span></div>');
  h.push('<div class="report-row"><span class="report-key">Expenses</span><span class="report-val">' + fmtPKR(periodExp) + '</span></div>');
  h.push('<div class="report-row"><span class="report-key">Fuel KM (claimed)</span><span class="report-val">' + periodFuelKM.toFixed(0) + ' KM = ' + fmtPKR(fuelAllowed) + '</span></div>');
  h.push('</div></div>');

  // Field Visit Distance Report
  h.push('<div class="card"><div class="card-title">Field Visit Report</div>');
  h.push('<div class="report-section">');
  h.push('<div class="report-row"><span class="report-key">Customers Visited</span><span class="report-val">' + pVisits.length + '</span></div>');
  h.push('<div class="report-row"><span class="report-key">GPS Straight Distance</span><span class="report-val">' + distInfo.straightKM.toFixed(1) + ' KM</span></div>');
  h.push('<div class="report-row"><span class="report-key">Road Distance (x1.1)</span><span class="report-val" style="color:var(--accent)">' + distInfo.roadKM.toFixed(1) + ' KM</span></div>');
  h.push('</div>');
  if (pVisits.length > 0) {
    h.push('<table class="hist-table" style="margin-top:8px"><thead><tr><th>Customer</th><th>Purpose</th><th>GPS</th></tr></thead><tbody>');
    for (var vi = 0; vi < pVisits.length; vi++) {
      var v = pVisits[vi];
      var gpsTxt = (v.gps && v.gps.lat) ? v.gps.lat.toFixed(3) + ',' + v.gps.lng.toFixed(3) : 'No GPS';
      h.push('<tr><td>' + (v.customerName||'-') + '</td><td>' + (v.purpose||'-') + '</td><td style="font-size:10px">' + gpsTxt + '</td></tr>');

  h.push('<div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px">');
  h.push('<span style="color:var(--text2)">Achieved: <strong style="color:var(--green)">' + fmtPKR(qAchieved) + '</strong></span>');
  h.push('<span style="color:var(--text2)">Target: <strong style="color:var(--accent)">' + fmtPKR(target) + '</strong></span>');
  h.push('</div></div>');
  h.push('<div class="action-row">');
  h.push('<button class="btn btn-pdf" onclick="exportPDF()">Export PDF</button>');
  h.push('<button class="btn btn-whatsapp" onclick="shareWhatsApp()">WhatsApp</button>');
  h.push('<button class="btn btn-gold" onclick="showPriceList()">Price List</button>');
  h.push('</div>');
  h.push('<div class="copyright-footer">Developed by Muhammad Mazhar ul Hassan &middot; All Legal Rights Reserved &copy; 2026 &middot; Biorise Pharmaceuticals</div>');
  el.innerHTML = h.join('');
