<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>Biorise SFA - Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a1628;--navy2:#0f2040;--navy3:#162a52;--blue:#1a3a6b;
  --accent:#e8a020;--accent2:#f5b942;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --text:#e8edf5;--text2:#a0aec0;--card:#0f2040;--border:#1e3a6e;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{background:var(--navy);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#0a1628 0%,#0f2040 50%,#0a1628 100%)}
.login-logo-wrap img{width:90px;height:90px;border-radius:50%;border:3px solid var(--accent);box-shadow:0 0 32px rgba(232,160,32,0.3)}
.login-brand{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:1px;margin:8px 0 2px}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:28px;letter-spacing:2px;text-transform:uppercase}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}
.field-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase}
.field-input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:16px}
.field-input:focus{border-color:var(--accent)}
.btn-login{width:100%;background:var(--accent);color:#0a1628;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:800;cursor:pointer}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
#app-shell{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:36px;height:36px;border-radius:50%;border:2px solid var(--accent)}
.topbar-name{font-size:14px;font-weight:700}
.topbar-role{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.offline{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}
.nav-tabs{background:var(--navy2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:none;padding:10px 16px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content-area{flex:1;padding:16px;padding-bottom:80px;max-width:700px;margin:0 auto;width:100%}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.card-title{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:18px;font-weight:800;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.prog-wrap{margin:8px 0 4px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.prog-track{background:var(--navy3);border-radius:99px;height:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.6s}
.btn{border:none;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:transform 0.1s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#0a1628}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--blue);color:var(--text)}
.btn-block{width:100%}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-gold{background:var(--accent);color:#0a1628}
.btn-whatsapp{background:#25d366;color:#fff}
.btn-pdf{background:var(--red);color:#fff}
.hist-table{width:100%;border-collapse:collapse;font-size:12px}
.hist-table th{background:var(--navy3);color:var(--text2);padding:8px 10px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase}
.hist-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
.hist-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-pending{background:rgba(232,160,32,0.15);color:var(--accent)}
.badge-approved{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-rejected{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-verified{background:rgba(34,197,94,0.15);color:var(--green)}
.filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.pill{flex:none;padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--navy3);color:var(--text2);text-transform:uppercase}
.pill.active{background:var(--accent);color:#0a1628;border-color:var(--accent)}
.search-input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.search-input:focus{border-color:var(--accent)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase}
.form-input,.form-select{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select option{background:var(--navy2)}
.officer-card{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.officer-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.officer-name{font-size:14px;font-weight:700}
.officer-meta{font-size:11px;color:var(--text2);margin-top:2px}
.report-section{background:var(--navy3);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.report-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.report-row:last-child{border-bottom:none}
.report-key{color:var(--text2)}
.report-val{font-weight:700}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state-icon{font-size:40px;margin-bottom:12px}
.copyright-footer{text-align:center;padding:16px;font-size:10px;color:var(--text2);border-top:1px solid var(--border);margin-top:8px}
.insight{background:rgba(232,160,32,0.06);border-left:3px solid var(--accent);border-radius:6px;padding:12px 14px;margin-bottom:10px;font-size:13px}
.insight.warn{background:rgba(239,68,68,0.06);border-left-color:var(--red)}
.insight.good{background:rgba(34,197,94,0.06);border-left-color:var(--green)}
.insight-title{font-weight:700;margin-bottom:3px}
.insight-body{color:var(--text2);font-size:12px}
.spinner{width:40px;height:40px;border:4px solid var(--navy3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy2);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);z-index:9999;opacity:0;pointer-events:none;transition:all 0.3s;border:1px solid var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-success{border-color:var(--green);color:var(--green)}
#toast.toast-error{border-color:var(--red);color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:var(--radius);padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:var(--accent);margin-bottom:16px}
</style>
</head>

<script>
// ============================================================
// BIORISE SFA MANAGER APP - ENGINE
// Manager sees ALL customers + ALL officers in their region
// ============================================================
var USERS=[]; var PRODUCTS=[]; var CUSTOMERS=[];
var CU=null; var CURRENT_TAB='dashboard';
var SESSION_KEY='br_mgr_s'; var LOGO_SRC='';
var DATA_LOADED=false;
var MY_ANNOUNCEMENTS=[];

// Team data (all officers in manager's region)
var TEAM={ orders:[], recoveries:[], visits:[], expenses:[], apps:[], stock:[], golive:[] };

var FIREBASE_PROJECT='biorise-sfa';
var FIREBASE_API_KEY='AIzaSyCKy-BH2UrvBN3tpBuHlrt0MTWd0Wxg8O0';
var FB_BASE='https://firestore.googleapis.com/v1/projects/'+FIREBASE_PROJECT+'/databases/(default)/documents/';

function bootApp(){
  var pEl=document.getElementById('d-products');
  var cEl=document.getElementById('d-customers');
  var uEl=document.getElementById('d-users');
  if (pEl){ try{ PRODUCTS=JSON.parse(pEl.textContent); }catch(e){} }
  if (cEl){ try{ CUSTOMERS=JSON.parse(cEl.textContent); }catch(e){} }
  if (uEl){ try{ USERS=JSON.parse(uEl.textContent); }catch(e){} }
  LOGO_SRC=document.getElementById('logo-img').src;
  document.getElementById('login-logo-img').src=LOGO_SRC;
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState==='visible' && CU && DATA_LOADED) renderModule(CURRENT_TAB);
  });
  loadMasterDataFromFirebase(function(){ checkSession(); });
}

function loadMasterDataFromFirebase(done){
  if (typeof fetch==='undefined'){ done(); return; }
  var pending=3;
  function step(){ pending--; if(pending<=0) done(); }
  fetch(FB_BASE+'users?key='+FIREBASE_API_KEY+'&pageSize=300').then(function(r){return r.json();}).then(function(resp){
    if (resp&&resp.documents&&resp.documents.length>0){ var arr=[]; for(var i=0;i<resp.documents.length;i++){ var o=parseFirestoreDoc(resp.documents[i]); if(o&&o.username) arr.push(o); } if(arr.length>0) USERS=arr; } step();
  }).catch(function(){ step(); });
  fetch(FB_BASE+'customers?key='+FIREBASE_API_KEY+'&pageSize=400').then(function(r){return r.json();}).then(function(resp){
    if (resp&&resp.documents&&resp.documents.length>0){ var arr=[]; for(var i=0;i<resp.documents.length;i++){ var o=parseFirestoreDoc(resp.documents[i]); if(o&&o.name) arr.push(o); } if(arr.length>0) CUSTOMERS=arr; } step();
  }).catch(function(){ step(); });
  fetch(FB_BASE+'products?key='+FIREBASE_API_KEY+'&pageSize=400').then(function(r){return r.json();}).then(function(resp){
    if (resp&&resp.documents&&resp.documents.length>0){ var arr=[]; for(var i=0;i<resp.documents.length;i++){ var o=parseFirestoreDoc(resp.documents[i]); if(o&&o.name) arr.push(o); } if(arr.length>0) PRODUCTS=arr; } step();
  }).catch(function(){ step(); });
}

// AUTH -- manager only
function doLogin(){
  var u=(document.getElementById('login-user').value||'').trim().toLowerCase();
  var p=(document.getElementById('login-pass').value||'').trim();
  var errEl=document.getElementById('login-err'); errEl.textContent='';
  if (!u||!p){ errEl.textContent='Enter username and password.'; return; }
  var found=null;
  for (var i=0;i<USERS.length;i++){ if(USERS[i].username===u && USERS[i].password===p && USERS[i].role==='manager'){ found=USERS[i]; break; } }
  if (!found){ errEl.textContent='Invalid credentials or not a manager account.'; return; }
  CU=found;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(CU));
  launchApp();
}
function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  CU=null; DATA_LOADED=false;
  TEAM={ orders:[], recoveries:[], visits:[], expenses:[], apps:[], stock:[], golive:[] };
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-shell').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').textContent='';
  CURRENT_TAB='dashboard';
}
function checkSession(){
  var raw=sessionStorage.getItem(SESSION_KEY);
  if (raw){
    try { var u=JSON.parse(raw); var valid=false;
      for (var i=0;i<USERS.length;i++){ if(USERS[i].username===u.username && USERS[i].role==='manager'){ valid=true; break; } }
      if (valid){ CU=u; launchApp(); return; }
    } catch(e){}
  }
}
function launchApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  document.getElementById('app-shell').style.flexDirection='column';
  document.getElementById('topbar-name').textContent=CU.name;
  document.getElementById('topbar-region').textContent=CU.region+' Region Manager';
  document.getElementById('app-logo-img').src=LOGO_SRC;
  var el=document.getElementById('content-area');
  el.innerHTML='<div class="empty-state"><div class="spinner"></div><div style="margin-top:14px">Loading your team data...</div></div>';
  loadTeamData(function(){ DATA_LOADED=true; setSyncDot('ok'); navTo('dashboard'); loadMyAnnouncements(null); });
  syncSettingsFromFirebase();
}
function setSyncDot(state){
  var dot=document.getElementById('sync-dot'); if(!dot) return;
  if (state==='syncing') dot.className='sync-dot syncing';
  else if (state==='offline') dot.className='sync-dot offline';
  else dot.className='sync-dot';
}

// ============================================================
// TEAM SCOPE -- officers + customers in manager's region
// ============================================================
function getMyOfficers(){
  var mine=[];
  for (var i=0;i<USERS.length;i++){ if(USERS[i].role==='officer' && USERS[i].region===CU.region) mine.push(USERS[i]); }
  mine.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  return mine;
}
function getMyTeamCustomers(){
  // ALL customers in manager's region
  var mine=[];
  for (var i=0;i<CUSTOMERS.length;i++){ if(CUSTOMERS[i].region===CU.region) mine.push(CUSTOMERS[i]); }
  mine.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  return mine;
}
function isMyTeamUsername(uname){
  for (var i=0;i<USERS.length;i++){ if(USERS[i].username===uname && USERS[i].role==='officer' && USERS[i].region===CU.region) return true; }
  return false;
}

// Load all team data filtered to manager's region
function loadTeamData(done){
  TEAM={ orders:[], recoveries:[], visits:[], expenses:[], apps:[], stock:[], golive:[] };
  if (typeof fetch==='undefined'){ done(); return; }
  setSyncDot('syncing');
  var colls=['orders','recoveries','visits','expenses','apps','stock','golive'];
  var pending=colls.length; var anyErr=false;
  function check(){ pending--; if(pending<=0){ setSyncDot(anyErr?'offline':'ok'); done(); } }
  for (var i=0;i<colls.length;i++){
    (function(coll){
      fetch(FB_BASE+coll+'?key='+FIREBASE_API_KEY+'&pageSize=1000').then(function(r){return r.json();}).then(function(resp){
        var arr=[];
        if (resp&&resp.documents){
          for (var d=0;d<resp.documents.length;d++){
            var o=parseFirestoreDoc(resp.documents[d]);
            // Include if officer is in my region OR record region matches
            if (o && (o.region===CU.region || isMyTeamUsername(o.officer))) arr.push(o);
          }
        }
        arr.sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
        TEAM[coll]=arr;
        check();
      }).catch(function(){ anyErr=true; check(); });
    })(colls[i]);
  }
}

function parseFirestoreDoc(doc){
  if (!doc||!doc.fields) return null;
  var obj={}; obj._docName=doc.name;
  for (var key in doc.fields){
    if (!doc.fields.hasOwnProperty(key)) continue;
    var f=doc.fields[key];
    if (f.stringValue!==undefined) obj[key]=f.stringValue;
    else if (f.doubleValue!==undefined) obj[key]=f.doubleValue;
    else if (f.integerValue!==undefined) obj[key]=parseFloat(f.integerValue);
    else if (f.booleanValue!==undefined) obj[key]=f.booleanValue;
    else if (f.nullValue!==undefined) obj[key]=null;
    else obj[key]='';
  }
  if (obj.items && typeof obj.items==='string'){ try{ obj.items=JSON.parse(obj.items); }catch(e){ obj.items=[]; } }
  if (obj.gps && typeof obj.gps==='string'){ try{ obj.gps=JSON.parse(obj.gps); }catch(e){ obj.gps=null; } }
  return obj;
}
function toFirestoreFields(data){
  var fields={};
  for (var key in data){
    if (!data.hasOwnProperty(key)) continue;
    if (key==='_docName') continue;
    var val=data[key];
    if (typeof val==='string') fields[key]={stringValue:val};
    else if (typeof val==='number') fields[key]={doubleValue:val};
    else if (typeof val==='boolean') fields[key]={booleanValue:val};
    else if (val===null||val===undefined) fields[key]={nullValue:null};
    else fields[key]={stringValue:JSON.stringify(val)};
  }
  return fields;
}
function fbUpdate(record, fieldsToUpdate, done){
  if (typeof fetch==='undefined' || !record._docName){ if(done) done(false); return; }
  setSyncDot('syncing');
  var mask='';
  for (var k in fieldsToUpdate){ if(fieldsToUpdate.hasOwnProperty(k)){ mask+=(mask?'&':'')+'updateMask.fieldPaths='+k; } }
  var url='https://firestore.googleapis.com/v1/'+record._docName+'?key='+FIREBASE_API_KEY+'&'+mask;
  fetch(url, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toFirestoreFields(fieldsToUpdate)})})
    .then(function(){ setSyncDot('ok'); if(done) done(true); }).catch(function(){ setSyncDot('offline'); if(done) done(false); });
}

function syncSettingsFromFirebase(){
  if (typeof fetch==='undefined') return;
  fetch(FB_BASE+'settings/petrol_rate?key='+FIREBASE_API_KEY).then(function(r){return r.json();}).then(function(d){
    if (d&&d.fields&&d.fields.value){ var rate=parseFloat(d.fields.value.doubleValue||d.fields.value.integerValue||d.fields.value.stringValue||'375'); if(!isNaN(rate)&&rate>0) localStorage.setItem('br_petrol_rate', rate.toString()); }
  }).catch(function(){});
}

// HELPERS
function fmtPKR(n){ var num=parseFloat(n)||0; return 'PKR '+num.toLocaleString('en-PK',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d){ if(!d) return ''; var dt=new Date(d); return dt.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(d){ if(!d) return ''; var dt=new Date(d); return dt.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'}); }
function today(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }
function getTargetFor(username){ var raw=localStorage.getItem('br_target_'+username); return raw?parseFloat(raw):583152; }
function daysBetween(d1,d2){ var a=new Date(d1); var b=new Date(d2); return Math.floor((b-a)/(1000*60*60*24)); }

var toastTimer=null;
function showToast(msg,type){
  var el=document.getElementById('toast'); el.textContent=msg;
  el.className='show'+(type?' toast-'+type:'');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.className=''; },3000);
}
function openModal(html){ document.getElementById('modal-box').innerHTML=html; document.getElementById('modal-overlay').className='modal-overlay show'; }
function closeModal(){ document.getElementById('modal-overlay').className='modal-overlay'; }

function haversineKM(lat1,lng1,lat2,lng2){
  var R=6371; var dLat=(lat2-lat1)*Math.PI/180; var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getDateRange(period){
  var now=new Date(); var todayStr=now.toISOString().slice(0,10);
  if (period==='today') return {from:todayStr,to:todayStr};
  if (period==='week'){ var day=now.getDay(); var diff=now.getDate()-day+(day===0?-6:1); var mon=new Date(new Date().setDate(diff)); return {from:mon.toISOString().slice(0,10),to:todayStr}; }
  if (period==='month'){ var yr=now.getFullYear(); var mo=now.getMonth(); return {from:yr+'-'+('0'+(mo+1)).slice(-2)+'-01',to:todayStr}; }
  if (period==='quarter'){ var qs=[0,3,6,9]; var qStart=qs[Math.floor(now.getMonth()/3)]; return {from:now.getFullYear()+'-'+('0'+(qStart+1)).slice(-2)+'-01',to:todayStr}; }
  return {from:'2000-01-01',to:todayStr};
}
function filterByRange(arr, dateField, range){
  var out=[];
  for (var i=0;i<arr.length;i++){ var d=(arr[i][dateField]||'').slice(0,10); if(d>=range.from && d<=range.to) out.push(arr[i]); }
  return out;
}

// NAV
function navTo(tab){
  CURRENT_TAB=tab;
  var tabs=document.querySelectorAll('.nav-tab');
  var tabNames=['dashboard','team','customers','recovery','visits','reports','announce'];
  for (var i=0;i<tabs.length;i++){
    if (tabNames[i]===tab){ tabs[i].className='nav-tab active'; tabs[i].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
    else tabs[i].className='nav-tab';
  }
  renderModule(tab);
}
function renderModule(tab){
  var el=document.getElementById('content-area'); if(!el) return;
  if (tab==='dashboard') renderDashboard(el);
  else if (tab==='team') renderTeam(el);
  else if (tab==='customers') renderCustomers(el);
  else if (tab==='recovery') renderRecovery(el);
  else if (tab==='visits') renderVisits(el);
  else if (tab==='reports') renderReports(el);
  else if (tab==='announce') renderAnnounce(el);
}
function pickFilter(el, fn){ var v=el.getAttribute('data-v'); if(v) fn(v); }

function buildOfficerStats(){
  var officers=getMyOfficers();
  var rows=[];
  for (var i=0;i<officers.length;i++){
    var off=officers[i]; var posted=0, approved=0, orders=0, visits=0, expenses=0;
    for (var j=0;j<TEAM.recoveries.length;j++){
      if (TEAM.recoveries[j].officer===off.username && TEAM.recoveries[j].adminStatus!=='rejected') posted+=(TEAM.recoveries[j].amount||0);
      if (TEAM.recoveries[j].officer===off.username && TEAM.recoveries[j].adminStatus==='approved') approved+=(TEAM.recoveries[j].amount||0);
    }
    for (var k=0;k<TEAM.orders.length;k++){ if(TEAM.orders[k].officer===off.username) orders++; }
    for (var v=0;v<TEAM.visits.length;v++){ if(TEAM.visits[v].officer===off.username) visits++; }
    for (var e=0;e<TEAM.expenses.length;e++){ if(TEAM.expenses[e].officer===off.username && TEAM.expenses[e].status==='approved') expenses+=(TEAM.expenses[e].amount||0); }
    var target=getTargetFor(off.username);
    var pct=target>0?(posted/target*100):0;
    rows.push({name:off.name, username:off.username, posted:posted, approved:approved, target:target, pct:pct, orders:orders, visits:visits, expenses:expenses});
  }
  rows.sort(function(a,b){ return b.pct-a.pct; });
  return rows;
}

}

function verifyRec(elm){
  var id=elm.getAttribute('data-id');
  var rec=null;
  for (var i=0;i<TEAM.recoveries.length;i++){ if(TEAM.recoveries[i].id===id){ rec=TEAM.recoveries[i]; break; } }
  if (!rec) return;
  rec.managerStatus='verified';
  renderRecovery(document.getElementById('content-area'));
  showToast('Recovery verified','success');
  fbUpdate(rec, {managerStatus:'verified'}, null);
}

function shareRegionWhatsApp(){
  var regRec=0;
  for (var i=0;i<TEAM.recoveries.length;i++){ if(TEAM.recoveries[i].adminStatus!=='rejected') regRec+=(TEAM.recoveries[i].amount||0); }
  var officers=getMyOfficers(); var regTarget=getTargetFor(CU.username);
  for (var t=0;t<officers.length;t++) regTarget+=getTargetFor(officers[t].username);
  var pct=regTarget>0?(regRec/regTarget*100).toFixed(1):0;
  var NL=String.fromCharCode(10);
  var msg='BIORISE '+CU.region.toUpperCase()+' REGION'+NL;
  msg+='Manager: '+CU.name+NL+'Date: '+today()+NL+'---'+NL;
  msg+='Target: '+fmtPKR(regTarget)+NL;
  msg+='Achieved: '+fmtPKR(regRec)+NL;
  msg+='Achievement: '+pct+'%'+NL;
  msg+='Officers: '+officers.length+NL+'--- Biorise Pharmaceuticals';
  window.open('https://wa.me/?text='+encodeURIComponent(msg), '_blank');
}

// ============================================================
// ANNOUNCEMENTS (Manager view) -- read + acknowledge
// ============================================================
function loadMyAnnouncements(done){
  if (typeof fetch==='undefined'){ if(done) done(); return; }
  fetch(FB_BASE+'announcements?key='+FIREBASE_API_KEY+'&pageSize=200').then(function(r){return r.json();}).then(function(resp){
    var arr=[];
    if (resp&&resp.documents){ for(var i=0;i<resp.documents.length;i++){ var a=parseFirestoreDoc(resp.documents[i]); if(a&&announcementForMe(a)) arr.push(a); } }
    arr.sort(function(x,y){ return (y.createdAt||'').localeCompare(x.createdAt||''); });
    MY_ANNOUNCEMENTS=arr; updateAnnounceBadge(); if(done) done();
  }).catch(function(){ if(done) done(); });
}
function announcementForMe(a){
  if (a.targetType==='all') return true;
  if (a.targetType==='region') return a.targetValue===CU.region;
  if (a.targetType==='officer') return a.targetValue===CU.username;
  return false;
}
function hasAcked(a){
  var ackList=[];
  if (a.acks){ try{ ackList=typeof a.acks==='string'?JSON.parse(a.acks):a.acks; }catch(e){ ackList=[]; } }
  if (!ackList) ackList=[];
  for (var i=0;i<ackList.length;i++){ if(ackList[i].username===CU.username) return true; }
  return false;
}
function countUnread(){ var c=0; for(var i=0;i<MY_ANNOUNCEMENTS.length;i++){ if(!hasAcked(MY_ANNOUNCEMENTS[i])) c++; } return c; }
function updateAnnounceBadge(){
  var tab=document.getElementById('tab-announce'); if(!tab) return;
  var unread=countUnread();
  tab.innerHTML=unread>0?'Announcements <span style="background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:4px">'+unread+'</span>':'Announcements';
}
function renderAnnounce(el){
  var h=[];
  h.push('<div class="card"><div class="card-title">Company Announcements</div>');
  if (MY_ANNOUNCEMENTS.length===0){
    h.push('<div class="empty-state" style="padding:30px 0"><div class="empty-state-icon">&#128226;</div><div>No announcements yet</div></div>');
  } else {
    for (var i=0;i<MY_ANNOUNCEMENTS.length;i++){
      var a=MY_ANNOUNCEMENTS[i]; var acked=hasAcked(a);
      var borderColor=acked?'var(--border)':'var(--accent)';
      h.push('<div style="background:var(--navy3);border:1px solid '+borderColor+';border-radius:10px;padding:14px;margin-bottom:10px">');
      if (!acked) h.push('<div style="font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:6px">New</div>');
      h.push('<div style="font-size:14px;line-height:1.5;margin-bottom:8px">'+a.message+'</div>');
      h.push('<div style="font-size:11px;color:var(--text2);margin-bottom:10px">'+fmtDate(a.createdAt)+' '+fmtTime(a.createdAt)+(a.sentBy?' &middot; '+a.sentBy:'')+'</div>');
      if (acked) h.push('<div style="font-size:12px;color:var(--green);font-weight:700">&#10003; Acknowledged</div>');
      else h.push('<button class="btn btn-sm btn-primary" data-id="'+a.id+'" onclick="acknowledgeAnn(this)">Acknowledge</button>');
      h.push('</div>');
    }
  }
  h.push('</div>');
  el.innerHTML=h.join('');
}
function acknowledgeAnn(elm){
  var id=elm.getAttribute('data-id'); var ann=null;
  for (var i=0;i<MY_ANNOUNCEMENTS.length;i++){ if(MY_ANNOUNCEMENTS[i].id===id){ ann=MY_ANNOUNCEMENTS[i]; break; } }
  if (!ann) return;
  var ackList=[];
  if (ann.acks){ try{ ackList=typeof ann.acks==='string'?JSON.parse(ann.acks):ann.acks; }catch(e){ ackList=[]; } }
  if (!ackList) ackList=[];
  for (var j=0;j<ackList.length;j++){ if(ackList[j].username===CU.username) return; }
  ackList.push({username:CU.username, name:CU.name, at:nowISO()});
  ann.acks=JSON.stringify(ackList);
  if (ann._docName && typeof fetch!=='undefined'){
    var url='https://firestore.googleapis.com/v1/'+ann._docName+'?key='+FIREBASE_API_KEY+'&updateMask.fieldPaths=acks';
    fetch(url, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{acks:{stringValue:ann.acks}}})})
      .then(function(){ showToast('Acknowledged','success'); }).catch(function(){ showToast('Saved','success'); });
  }
  updateAnnounceBadge();
  renderAnnounce(document.getElementById('content-area'));
}
