function renderAnnouncements(el) {
  var officers=getOfficers();
  var regions=['South Punjab','Upper Punjab','Sindh','MD Direct'];
  var h=[];
  h.push('<div class="page-title">Announcements</div>');
  h.push('<div class="page-sub">Broadcast messages to your team. Track who has acknowledged.</div>');

  // Compose
  h.push('<div class="card"><div class="card-title">New Announcement</div>');
  h.push('<div class="form-group"><div class="form-label">Message *</div>');
  h.push('<textarea class="form-textarea" id="ann-msg" placeholder="Type your announcement..." style="min-height:90px"></textarea></div>');
  h.push('<div class="form-row">');
  h.push('<div class="form-group"><div class="form-label">Send To *</div><select class="form-select" id="ann-target" onchange="onAnnTargetChange()">');
  h.push('<option value="all">Everyone (all officers + managers)</option>');
  h.push('<option value="region">Specific Region</option>');
  h.push('<option value="officer">Specific Officer</option>');
  h.push('</select></div>');
  h.push('<div class="form-group" id="ann-sub-wrap" style="display:none"><div class="form-label" id="ann-sub-label">Region</div>');
  h.push('<select class="form-select" id="ann-sub"></select></div>');
  h.push('</div>');
  h.push('<button class="btn btn-primary" onclick="sendAnnouncement()">Send Announcement</button></div>');

  // History with acknowledgment tracking
  h.push('<div class="card"><div class="card-title">Sent Announcements</div>');
  var anns=ALL.announcements||[];
  anns=anns.slice().sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
  if (anns.length===0){
    h.push('<div class="empty-state"><div class="empty-state-icon">&#128226;</div><div>No announcements sent yet</div></div>');
  } else {
    for (var i=0;i<anns.length;i++){
      var a=anns[i];
      // Count acknowledgments
      var ackList=[];
      if (a.acks){ try{ ackList=typeof a.acks==='string'?JSON.parse(a.acks):a.acks; }catch(e){ ackList=[]; } }
      if (!ackList) ackList=[];
      // Determine target audience size
      var audience=getAnnouncementAudience(a);
      h.push('<div style="background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px">');
      h.push('<div style="font-size:14px;margin-bottom:8px">'+a.message+'</div>');
      h.push('<div style="font-size:11px;color:var(--text2);margin-bottom:8px">'+fmtDate(a.createdAt)+' '+fmtTime(a.createdAt)+' &middot; To: '+a.targetLabel+'</div>');
      h.push('<div style="display:flex;justify-content:space-between;align-items:center">');
      h.push('<div style="font-size:12px;color:var(--green)">Acknowledged: '+ackList.length+' of '+audience.length+'</div>');
      h.push('<button class="btn btn-sm btn-secondary" data-id="'+a.id+'" onclick="viewAcks(this)">View Status</button>');
      h.push('</div></div>');
    }
  }
  h.push('</div>');
  el.innerHTML=h.join('');
  onAnnTargetChange();
}

function onAnnTargetChange() {
  var target=document.getElementById('ann-target');
  if (!target) return;
  var wrap=document.getElementById('ann-sub-wrap');
  var label=document.getElementById('ann-sub-label');
  var sub=document.getElementById('ann-sub');
  if (target.value==='all'){ if(wrap) wrap.style.display='none'; return; }
  if (wrap) wrap.style.display='block';
  var h=[];
  if (target.value==='region'){
    if (label) label.textContent='Region';
    var regions=['South Punjab','Upper Punjab','Sindh','MD Direct'];
    for (var i=0;i<regions.length;i++) h.push('<option value="'+regions[i]+'">'+regions[i]+'</option>');
  } else {
    if (label) label.textContent='Officer';
    var officers=getOfficers();
    for (var j=0;j<officers.length;j++) h.push('<option value="'+officers[j].username+'">'+officers[j].name+' ('+officers[j].region+')</option>');
  }
  if (sub) sub.innerHTML=h.join('');
}

function sendAnnouncement() {
  var msgEl=document.getElementById('ann-msg');
  var targetEl=document.getElementById('ann-target');
  var subEl=document.getElementById('ann-sub');
  var msg=(msgEl?msgEl.value:'').trim();
  if (!msg){ showToast('Enter a message','error'); return; }
  var target=targetEl?targetEl.value:'all';
  var targetVal=''; var targetLabel='Everyone';
  if (target==='region'){ targetVal=subEl?subEl.value:''; targetLabel='Region: '+targetVal; }
  else if (target==='officer'){ targetVal=subEl?subEl.value:''; var on=''; var offs=getOfficers(); for(var i=0;i<offs.length;i++){ if(offs[i].username===targetVal) on=offs[i].name; } targetLabel='Officer: '+on; }
  var ann={
    id: genId(), createdAt: nowISO(), date: today(),
    message: msg, targetType: target, targetValue: targetVal, targetLabel: targetLabel,
    sentBy: CU.name, acks: '[]'
  };
  fbCreate('announcements', ann, function(ok){
    if (!ALL.announcements) ALL.announcements=[];
    ALL.announcements.push(ann);
    showToast(ok?'Announcement sent':'Saved locally (sync pending)', ok?'success':'error');
    if (msgEl) msgEl.value='';
    renderAnnouncements(document.getElementById('main-content'));
  });
}

function getAnnouncementAudience(ann) {
  // Returns list of usernames who should receive this
  var aud=[];
  var officers=getOfficers(); var managers=getManagers();
  var all=officers.concat(managers);
  if (ann.targetType==='all'){ for(var i=0;i<all.length;i++) aud.push(all[i].username); }
  else if (ann.targetType==='region'){ for(var j=0;j<all.length;j++){ if(all[j].region===ann.targetValue) aud.push(all[j].username); } }
  else if (ann.targetType==='officer'){ aud.push(ann.targetValue); }
  return aud;
}

function viewAcks(elm) {
  var id=elm.getAttribute('data-id');
  var ann=null;
  for (var i=0;i<ALL.announcements.length;i++){ if(ALL.announcements[i].id===id){ ann=ALL.announcements[i]; break; } }
  if (!ann) return;
  var ackList=[];
  if (ann.acks){ try{ ackList=typeof ann.acks==='string'?JSON.parse(ann.acks):ann.acks; }catch(e){ ackList=[]; } }
  if (!ackList) ackList=[];
  var ackMap={};
  for (var a=0;a<ackList.length;a++){ ackMap[ackList[a].username]=ackList[a]; }
  var audience=getAnnouncementAudience(ann);
  var h=[];
  h.push('<div class="modal-title">Acknowledgment Status</div>');
  h.push('<div style="font-size:13px;margin-bottom:12px;color:var(--text2)">'+ann.message+'</div>');
  h.push('<div style="max-height:300px;overflow-y:auto"><table><thead><tr><th>Person</th><th>Status</th></tr></thead><tbody>');
  var allUsers=getOfficers().concat(getManagers());
  for (var u=0;u<audience.length;u++){
    var uname=audience[u]; var name=uname;
    for (var x=0;x<allUsers.length;x++){ if(allUsers[x].username===uname){ name=allUsers[x].name; break; } }
    if (ackMap[uname]){
      h.push('<tr><td>'+name+'</td><td><span class="badge badge-approved">Read '+fmtDate(ackMap[uname].at)+'</span></td></tr>');
    } else {
      h.push('<tr><td>'+name+'</td><td><span class="badge badge-pending">Not read</span></td></tr>');
    }
  }
  h.push('</tbody></table></div>');
  h.push('<button class="btn btn-secondary btn-block" style="margin-top:14px" onclick="closeModal()">Close</button>');
  openModal(h.join(''));
}

function buildExportRows() {

    orderRows.push([fmtDate(o.date),fmtTime(o.createdAt),o.officerName||'',o.region||'',o.customerName||'',itemStr,o.total||0,o.status||'pending',o.remarks||'']);

  }
  sheets['Visits']=visitRows;
  // Expenses
  var expRows=[['Date','Officer','Region','Category','Amount','KM','Receipt','Status','Description']];

    var e=ALL.expenses[m];
    expRows.push([fmtDate(e.date),e.officerName||'',e.region||'',e.category||'',e.amount||0,e.km||0,e.receipt||'',e.status||'pending',e.description||'']);
  }
  sheets['Expenses']=expRows;
  // Applications

  }
  sheets['Applications']=appRows;
  // Stock
  var stockRows=[['Date','Officer','Region','Product','Qty','Purpose','Status','Remarks']];

  }
  sheets['Stock Requests']=stockRows;
  // Samples
  var sampleRows=[['Date','Officer','Region','Product','Qty','Unit Price','Value','Notes','Entered By']];
  for (var sp=0;sp<ALL.samples.length;sp++){
    var sm=ALL.samples[sp];
    var sval=(parseFloat(sm.price)||0)*(parseFloat(sm.qty)||0);

  }
  sheets['Samples']=sampleRows;

  var odoRows=[['Date','Officer','Region','Start Odo','End Odo','KM Travelled','Start Time','End Time']];
  for (var q=0;q<ALL.golive.length;q++){
    var g=ALL.golive[q];
    odoRows.push([fmtDate(g.date),g.officerName||'',g.region||'',g.startOdo||0,g.endOdo||0,g.kmTravelled||0,fmtTime(g.startTime),g.endTime?fmtTime(g.endTime):'']);
  }
  sheets['Odometer']=odoRows;
  // Summary -- officer-wise
  var sumRows=[['Officer','Region','Orders','Order Value','Recovery Posted','Recovery Approved','Expenses','Visits']];
  var officers=getOfficers();
  for (var of=0;of<officers.length;of++){
    var off=officers[of];
    var oCount=0,oVal=0,rPost=0,rApp=0,eVal=0,vCount=0;
    for (var oi=0;oi<ALL.orders.length;oi++){ if(ALL.orders[oi].officer===off.username){ oCount++; oVal+=(ALL.orders[oi].total||0); } }
    for (var ri=0;ri<ALL.recoveries.length;ri++){ if(ALL.recoveries[ri].officer===off.username){ if(ALL.recoveries[ri].adminStatus!=='rejected') rPost+=(ALL.recoveries[ri].amount||0); if(ALL.recoveries[ri].adminStatus==='approved') rApp+=(ALL.recoveries[ri].amount||0); } }
    for (var ei=0;ei<ALL.expenses.length;ei++){ if(ALL.expenses[ei].officer===off.username && ALL.expenses[ei].status==='approved') eVal+=(ALL.expenses[ei].amount||0); }
    for (var vi=0;vi<ALL.visits.length;vi++){ if(ALL.visits[vi].officer===off.username) vCount++; }
    sumRows.push([off.name,off.region,oCount,oVal,rPost,rApp,eVal,vCount]);
  }
  sheets['Summary']=sumRows;
  return sheets;
}

function exportAllData() {
  var statusEl=document.getElementById('export-status');
  if (statusEl) statusEl.textContent='Preparing Excel...';
  loadSheetJS(function(ok){
    if (!ok){ showToast('Could not load Excel writer','error'); return; }
    var sheets=buildExportRows();
    var wb=XLSX.utils.book_new();
    for (var name in sheets){ if(sheets.hasOwnProperty(name)){ var ws=XLSX.utils.aoa_to_sheet(sheets[name]); XLSX.utils.book_append_sheet(wb, ws, name); } }
    var fname='Biorise_Full_Backup_'+today()+'.xlsx';
    XLSX.writeFile(wb, fname);
    localStorage.setItem('br_last_backup', nowISO());
    if (statusEl) statusEl.textContent='Exported: '+fname;
    showToast('Full backup downloaded','success');
    renderDataTools(document.getElementById('main-content'));
  });
}

function exportTodayData() {
  var statusEl=document.getElementById('export-status');
  if (statusEl) statusEl.textContent='Preparing today data...';
  var todayStr=today();
  // Temporarily filter ALL to today
  var orig={};
  var colls=['orders','recoveries','visits','expenses','apps','stock','golive'];
  for (var c=0;c<colls.length;c++){
    orig[colls[c]]=ALL[colls[c]];
    var filtered=[];
    for (var i=0;i<ALL[colls[c]].length;i++){ if((ALL[colls[c]][i].date||'').slice(0,10)===todayStr) filtered.push(ALL[colls[c]][i]); }
    ALL[colls[c]]=filtered;
  }
  loadSheetJS(function(ok){
    if (!ok){ for(var r=0;r<colls.length;r++) ALL[colls[r]]=orig[colls[r]]; showToast('Could not load Excel writer','error'); return; }
    var sheets=buildExportRows();
    var wb=XLSX.utils.book_new();
    for (var name in sheets){ if(sheets.hasOwnProperty(name)){ var ws=XLSX.utils.aoa_to_sheet(sheets[name]); XLSX.utils.book_append_sheet(wb, ws, name); } }
    var fname='Biorise_Daily_'+todayStr+'.xlsx';
    XLSX.writeFile(wb, fname);
    // restore
    for (var rr=0;rr<colls.length;rr++) ALL[colls[rr]]=orig[colls[rr]];
    localStorage.setItem('br_last_backup', nowISO());
    if (statusEl) statusEl.textContent='Exported: '+fname;
    showToast('Today backup downloaded','success');
    renderDataTools(document.getElementById('main-content'));
  });
}

// ----- RESTORE -----
function triggerRestore() {
  var f=document.getElementById('restore-file');
  if (f) f.click();
}

function handleRestore(input) {
  if (!input.files || !input.files[0]) return;
  var file=input.files[0];
  var statusEl=document.getElementById('restore-status');
  if (statusEl) statusEl.textContent='Reading backup file...';
  loadSheetJS(function(ok){
    if (!ok){ showToast('Could not load Excel reader','error'); return; }
    var reader=new FileReader();
    reader.onload=function(e){
      try {
        var data=new Uint8Array(e.target.result);
        var wb=XLSX.read(data, {type:'array'});
        restoreFromWorkbook(wb);
      } catch(err){ showToast('Could not read file','error'); if(statusEl) statusEl.textContent='Read failed.'; }
    };
    reader.readAsArrayBuffer(file);
  });
}

function restoreFromWorkbook(wb) {
  var statusEl=document.getElementById('restore-status');
  var mapping=[
    {sheet:'Orders', coll:'orders'},
    {sheet:'Recoveries', coll:'recoveries'},
    {sheet:'Visits', coll:'visits'},
    {sheet:'Expenses', coll:'expenses'},
    {sheet:'Applications', coll:'apps'},
    {sheet:'Stock Requests', coll:'stock'},
    {sheet:'Odometer', coll:'golive'}
  ];
  var totalToRestore=0; var restored=0;
  var queue=[];
  for (var m=0;m<mapping.length;m++){
    var map=mapping[m];
    var ws=wb.Sheets[map.sheet];
    if (!ws) continue;
    var rows=XLSX.utils.sheet_to_json(ws, {header:1});
    if (rows.length<2) continue;
    for (var r=1;r<rows.length;r++){
      var rec=rowToRecord(map.coll, rows[r]);
      if (rec){ queue.push({coll:map.coll, rec:rec}); totalToRestore++; }
    }
  }
  if (totalToRestore===0){ showToast('No records found in file','error'); if(statusEl) statusEl.textContent='Nothing to restore.'; return; }
  if (statusEl) statusEl.textContent='Restoring '+totalToRestore+' records...';
  // Push sequentially in small batches
  for (var q=0;q<queue.length;q++){
    (function(item){
      fbCreate(item.coll, item.rec, function(){
        restored++;
        if (statusEl) statusEl.textContent='Restored '+restored+' of '+totalToRestore+'...';
        if (restored>=totalToRestore){
          if (statusEl) statusEl.textContent='Restore complete: '+restored+' records. Reloading...';
          showToast('Restore complete','success');
          setTimeout(function(){ loadAllCompanyData(function(){ buildSidebar(); renderDataTools(document.getElementById('main-content')); }); }, 1000);
        }
      });
    })(queue[q]);
  }
}

function rowToRecord(coll, row) {
  if (!row || row.length<3) return null;
  var base={ id: genId(), createdAt: nowISO(), _restored: true };
  if (coll==='orders'){ return {id:base.id, date:parseDate(row[0]), createdAt:base.createdAt, officerName:row[2]||'', officer:unameFor(row[2]), region:row[3]||'', customerName:row[4]||'', total:parseFloat(row[6])||0, status:row[7]||'pending', remarks:row[8]||''}; }
  if (coll==='recoveries'){ return {id:base.id, date:parseDate(row[0]), createdAt:base.createdAt, officerName:row[2]||'', officer:unameFor(row[2]), region:row[3]||'', customerName:row[4]||'', amount:parseFloat(row[5])||0, payMethod:row[6]||'', ref:row[7]||'', adminStatus:row[8]||'pending', remarks:row[9]||''}; }
  if (coll==='visits'){ return {id:base.id, date:parseDate(row[0]), createdAt:base.createdAt, officerName:row[2]||'', officer:unameFor(row[2]), region:row[3]||'', customerName:row[4]||'', purpose:row[5]||'', hasPhoto:row[8]==='Yes', remarks:row[9]||''}; }
  if (coll==='expenses'){ return {id:base.id, date:parseDate(row[0]), createdAt:base.createdAt, officerName:row[1]||'', officer:unameFor(row[1]), region:row[2]||'', category:row[3]||'', amount:parseFloat(row[4])||0, km:parseFloat(row[5])||0, receipt:row[6]||'', status:row[7]||'pending', description:row[8]||''}; }
  if (coll==='apps'){ return {id:base.id, date:parseDate(row[0]), createdAt:base.createdAt, officerName:row[1]||'', officer:unameFor(row[1]), region:row[2]||'', appType:row[3]||'', subject:row[4]||'', body:row[5]||'', productName:row[6]||'', batchNo:row[7]||'', status:row[8]||'pending'}; }
  if (coll==='stock'){ return {id:base.id, date:parseDate(row[0]), createdAt:base.createdAt, officerName:row[1]||'', officer:unameFor(row[1]), region:row[2]||'', productName:row[3]||'', qty:parseFloat(row[4])||0, purpose:row[5]||'', status:row[6]||'pending', remarks:row[7]||''}; }
  if (coll==='golive'){ return {id:base.id, date:parseDate(row[0]), createdAt:base.createdAt, officerName:row[1]||'', officer:unameFor(row[1]), region:row[2]||'', startOdo:parseFloat(row[3])||0, endOdo:parseFloat(row[4])||0, kmTravelled:parseFloat(row[5])||0, ended:true}; }
  return null;
}

function unameFor(name) {
  if (!name) return '';
  var all=getOfficers().concat(getManagers());
  for (var i=0;i<all.length;i++){ if(all[i].name===name) return all[i].username; }
  return '';
}

function parseDate(d) {
  if (!d) return today();
  // Try to parse "12 Jan 2026" or ISO
  var dt=new Date(d);
  if (!isNaN(dt.getTime())) return dt.toISOString().slice(0,10);
  return today();
}

// ----- DELETE -----
function confirmDeleteData() {
  var h=[];
  h.push('<div class="modal-title" style="color:var(--red)">Delete All Transaction Data</div>');
  h.push('<div style="margin-bottom:14px">This permanently deletes all orders, recoveries, visits, expenses, applications, stock requests, and odometer records.<br><br>Users, customers, products, and targets are kept.<br><br><strong>This cannot be undone.</strong> Make sure you exported a backup first.</div>');
  h.push('<div class="form-group"><div class="form-label">Type RESET to confirm</div><input class="form-input" id="del-confirm" placeholder="RESET"></div>');
  h.push('<div class="action-btns"><button class="btn btn-danger btn-block" onclick="runDeleteData()">Delete Permanently</button><button class="btn btn-secondary btn-block" onclick="closeModal()">Cancel</button></div>');
  openModal(h.join(''));
}

function runDeleteData() {
  var conf=document.getElementById('del-confirm');
  if (!conf || conf.value.trim().toUpperCase()!=='RESET'){ showToast('Type RESET to confirm','error'); return; }
  closeModal();
  var statusEl=document.getElementById('delete-status');
  var colls=['orders','recoveries','visits','expenses','apps','stock','golive'];
  var toDelete=[];
  for (var c=0;c<colls.length;c++){
    for (var i=0;i<ALL[colls[c]].length;i++){ if(ALL[colls[c]][i]._docName) toDelete.push(ALL[colls[c]][i]._docName); }
  }
  if (toDelete.length===0){
    // nothing in firebase, just clear local
    for (var x=0;x<colls.length;x++) ALL[colls[x]]=[];
    if (statusEl) statusEl.textContent='No cloud records found. Local cleared.';
    buildSidebar(); showToast('Data cleared','success'); return;
  }
  var total=toDelete.length; var done=0;
  if (statusEl) statusEl.textContent='Deleting '+total+' records...';
  for (var d=0;d<toDelete.length;d++){
    fbDelete(toDelete[d], function(){
      done++;
      if (statusEl) statusEl.textContent='Deleted '+done+' of '+total+'...';
      if (done>=total){
        for (var z=0;z<colls.length;z++) ALL[colls[z]]=[];
        if (statusEl) statusEl.textContent='Done. All transaction data deleted. Officers now start from zero.';
        buildSidebar();
        showToast('All transaction data deleted','success');
      }
    });
  }
}

// ----- MORNING BACKUP POPUP -----
function checkMorningBackup() {
  var lastBackup=localStorage.getItem('br_last_backup');
  var todayStr=today();
  var lastDate=lastBackup?lastBackup.slice(0,10):'';
  if (lastDate===todayStr) return; // already backed up today
  // Only show if there is data to back up
  var hasData=ALL.orders.length>0||ALL.recoveries.length>0||ALL.visits.length>0||ALL.expenses.length>0;
  if (!hasData) return;
  var h=[];
  h.push('<div class="modal-title">Daily Backup Reminder</div>');
  h.push('<div style="margin-bottom:16px">Good morning! You have not backed up today. Download yesterday data now to keep your records safe. This takes one click.</div>');
  h.push('<div class="action-btns"><button class="btn btn-success btn-block" onclick="closeModal();navTo(\\u0027datatools\\u0027);exportAllData()">Download Backup Now</button><button class="btn btn-secondary btn-block" onclick="closeModal()">Later</button></div>');
  openModal(h.join(''));
}

function doMorningBackup() {
  closeModal();
  navTo('datatools');
  setTimeout(function(){ exportAllData(); }, 300);
}
