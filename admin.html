<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<title>Biorise SFA - Admin Console</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a1628;--navy2:#0f2040;--navy3:#162a52;--blue:#1a3a6b;
  --accent:#e8a020;--accent2:#f5b942;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --text:#e8edf5;--text2:#a0aec0;--card:#0f2040;--border:#1e3a6e;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{background:var(--navy);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#0a1628 0%,#0f2040 50%,#0a1628 100%)}
.login-logo-wrap img{width:90px;height:90px;border-radius:50%;border:3px solid var(--accent);box-shadow:0 0 32px rgba(232,160,32,0.3)}
.login-brand{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:1px;margin:8px 0 2px}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:28px;letter-spacing:2px;text-transform:uppercase}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}
.field-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase}
.field-input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:16px}
.field-input:focus{border-color:var(--accent)}
.btn-login{width:100%;background:var(--accent);color:#0a1628;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:800;cursor:pointer}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
#app-shell{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:38px;height:38px;border-radius:50%;border:2px solid var(--accent)}
.topbar-title{font-size:16px;font-weight:800;color:var(--accent)}
.topbar-sub{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.offline{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:210px;background:var(--navy2);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto;flex-shrink:0}
.side-section{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding:12px 20px 6px;font-weight:700}
.side-item{padding:11px 20px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;transition:all 0.15s}
.side-item:hover{background:var(--navy3);color:var(--text)}
.side-item.active{background:var(--navy3);color:var(--accent);border-left-color:var(--accent);font-weight:700}
.side-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px}
.main{flex:1;padding:20px;overflow-y:auto;max-width:1100px}
.mobile-nav{display:none}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.card-title{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.page-title{font-size:20px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--text2);margin-bottom:18px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:linear-gradient(135deg,var(--navy3),var(--blue));border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi-val{font-size:22px;font-weight:800;color:var(--accent)}
.kpi-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:6px}
.btn{border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:transform 0.1s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#0a1628}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--blue);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-block{width:100%}
.btn-gold{background:var(--accent);color:#0a1628}
.btn-whatsapp{background:#25d366;color:#fff}
.btn-pdf{background:var(--red);color:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy3);color:var(--text2);padding:10px 12px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-pending{background:rgba(232,160,32,0.15);color:var(--accent)}
.badge-approved{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-rejected{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-flag{background:rgba(239,68,68,0.15);color:var(--red)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase}
.form-input,.form-select,.form-textarea{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:14px;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select option{background:var(--navy2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--navy3);color:var(--text2);text-transform:uppercase}
.pill.active{background:var(--accent);color:#0a1628;border-color:var(--accent)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state-icon{font-size:40px;margin-bottom:12px}
.action-btns{display:flex;gap:6px}
.insight{background:rgba(232,160,32,0.06);border-left:3px solid var(--accent);border-radius:6px;padding:12px 14px;margin-bottom:10px;font-size:13px}
.insight.warn{background:rgba(239,68,68,0.06);border-left-color:var(--red)}
.insight.good{background:rgba(34,197,94,0.06);border-left-color:var(--green)}
.insight-title{font-weight:700;margin-bottom:3px}
.insight-body{color:var(--text2);font-size:12px}
.prog-track{background:var(--navy3);border-radius:99px;height:8px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.aging-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;margin:8px 0}
.aging-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.tabs-row{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:var(--radius);padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:var(--accent);margin-bottom:16px}
.spinner{width:40px;height:40px;border:4px solid var(--navy3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy2);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);z-index:9999;opacity:0;pointer-events:none;transition:all 0.3s;border:1px solid var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-success{border-color:var(--green);color:var(--green)}
#toast.toast-error{border-color:var(--red);color:var(--red)}
@media(max-width:768px){
  .sidebar{display:none}
  .mobile-nav{display:flex;background:var(--navy2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
  .mobile-nav::-webkit-scrollbar{display:none}
  .mobile-nav-item{flex:none;padding:11px 14px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase}
  .mobile-nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
  .main{padding:14px}
  .form-row{grid-template-columns:1fr}
  .page-title{font-size:18px}
  table{font-size:12px}
  th,td{padding:8px 8px}
}
</style>
</head>

<script>
// ============================================================
// BIORISE ADMIN CONSOLE - ENGINE
// ============================================================
var USERS = []; var PRODUCTS = []; var CUSTOMERS = [];
var CU = null; var CURRENT_PAGE = 'dashboard';
var SESSION_KEY = 'br_admin_s'; var LOGO_SRC = '';
var SESSION_TTL_MS = 1000*60*60*12;
var DATA_LOADED = false;

// Default vehicle types with average mileage (km per litre). Admin can edit/add in Settings.
var DEFAULT_VEHICLES = [
  {name:'Bike', kmpl:45},
  {name:'Mehran', kmpl:14},
  {name:'Alto', kmpl:16},
  {name:'Cultus', kmpl:13},
  {name:'Yaris', kmpl:15}
];

// All company data (every officer's records)
var ALL = { orders:[], recoveries:[], visits:[], expenses:[], apps:[], stock:[], golive:[], announcements:[], samples:[] };

var FIREBASE_PROJECT = 'biorise-sfa';
var FIREBASE_API_KEY = 'AIzaSyCKy-BH2UrvBN3tpBuHlrt0MTWd0Wxg8O0';
var FB_BASE = 'https://firestore.googleapis.com/v1/projects/' + FIREBASE_PROJECT + '/databases/(default)/documents/';

var SIDEBAR = [
  {sec:'Overview'},
  {id:'dashboard', label:'Dashboard', icon:'&#9632;'},
  {id:'insights', label:'CFO Insights', icon:'&#9733;'},
  {sec:'Approvals'},
  {id:'orders', label:'Orders', icon:'&#128230;'},
  {id:'recoveries', label:'Recovery', icon:'&#128176;'},

  {id:'datatools', label:'Data & Backup', icon:'&#128190;'},
  {id:'settings', label:'Settings', icon:'&#9881;'}
];

// ============================================================
// BOOT
// ============================================================
function bootApp() {
  var pEl = document.getElementById('d-products');
  var cEl = document.getElementById('d-customers');
  var uEl = document.getElementById('d-users');
  if (pEl) { try { PRODUCTS = JSON.parse(pEl.textContent); } catch(e) {} }
  if (cEl) { try { CUSTOMERS = JSON.parse(cEl.textContent); } catch(e) {} }
  if (uEl) { try { USERS = JSON.parse(uEl.textContent); } catch(e) {} }
  LOGO_SRC = document.getElementById('logo-img').src;
  document.getElementById('login-logo-img').src = LOGO_SRC;
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && CU && DATA_LOADED) renderPage(CURRENT_PAGE);
  });
  loadMasterDataFromFirebase(function() { checkSession(); });
}

function loadMasterDataFromFirebase(done) {
  if (typeof fetch === 'undefined') { done(); return; }
  var pending = 3;
  function step(){ pending--; if (pending<=0) done(); }
  fetch(FB_BASE + 'users?key=' + FIREBASE_API_KEY + '&pageSize=300')
    .then(function(r){ return r.json(); })
    .then(function(resp){
      if (resp && resp.documents && resp.documents.length>0) {
        var arr=[]; for (var i=0;i<resp.documents.length;i++){ var o=parseFirestoreDoc(resp.documents[i]); if(o&&o.username) arr.push(o); }
        if (arr.length>0) USERS=arr;
      }
      step();
    }).catch(function(){ step(); });
  fetch(FB_BASE + 'customers?key=' + FIREBASE_API_KEY + '&pageSize=400')
    .then(function(r){ return r.json(); })
    .then(function(resp){
      if (resp && resp.documents && resp.documents.length>0) {
        var arr=[]; for (var i=0;i<resp.documents.length;i++){ var o=parseFirestoreDoc(resp.documents[i]); if(o&&o.name) arr.push(o); }
        if (arr.length>0) CUSTOMERS=arr;
      }
      step();
    }).catch(function(){ step(); });
  fetch(FB_BASE + 'products?key=' + FIREBASE_API_KEY + '&pageSize=400')
    .then(function(r){ return r.json(); })
    .then(function(resp){
      if (resp && resp.documents && resp.documents.length>0) {
        var arr=[]; for (var i=0;i<resp.documents.length;i++){ var o=parseFirestoreDoc(resp.documents[i]); if(o&&o.name) arr.push(o); }
        if (arr.length>0) PRODUCTS=arr;
      }
      step();
    }).catch(function(){ step(); });
}

// ============================================================
// AUTH -- admin only
// ============================================================
function doLogin() {
  var u = (document.getElementById('login-user').value||'').trim().toLowerCase();
  var p = (document.getElementById('login-pass').value||'').trim();
  var errEl = document.getElementById('login-err');
  errEl.textContent='';
  if (!u||!p){ errEl.textContent='Enter username and password.'; return; }
  var found=null;
  for (var i=0;i<USERS.length;i++){
    if (USERS[i].username===u && USERS[i].password===p && USERS[i].role==='admin'){ found=USERS[i]; break; }
  }
  if (!found){ errEl.textContent='Invalid credentials or not an admin account.'; return; }
  CU=found;
  saveSession(CU);
  launchApp();
}

function saveSession(user){
  var payload={ u:user.username, exp:(Date.now()+SESSION_TTL_MS) };
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(payload)); } catch(e){}
}

function doLogout() {
  try { localStorage.removeItem(SESSION_KEY); } catch(e){}
  CU=null; DATA_LOADED=false;
  ALL={ orders:[], recoveries:[], visits:[], expenses:[], apps:[], stock:[], golive:[], announcements:[], samples:[] };
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-shell').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').textContent='';
  CURRENT_PAGE='dashboard';
}

function checkSession() {
  var raw=null;
  try { raw = localStorage.getItem(SESSION_KEY); } catch(e){}
  if (raw){
    try {
      var s=JSON.parse(raw);
      if (s && s.exp && s.exp>Date.now() && s.u){
        var valid=false; var matched=null;
        for (var i=0;i<USERS.length;i++){ if(USERS[i].username===s.u && USERS[i].role==='admin'){ valid=true; matched=USERS[i]; break; } }
        if (valid){ CU=matched; saveSession(CU); launchApp(); return; }
      } else {
        try { localStorage.removeItem(SESSION_KEY); } catch(e2){}
      }
    } catch(e){}
  }
}

function launchApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  document.getElementById('topbar-name').textContent=CU.name;
  document.getElementById('app-logo-img').src=LOGO_SRC;
  buildSidebar();
  var el=document.getElementById('main-content');
  el.innerHTML='<div class="empty-state"><div class="spinner"></div><div style="margin-top:14px">Loading company data from cloud...</div></div>';
  loadAllCompanyData(function(){ DATA_LOADED=true; setSyncDot('ok'); renderPage('dashboard'); setTimeout(function(){ checkMorningBackup(); }, 1500); });
}

function setSyncDot(state){
  var dot=document.getElementById('sync-dot'); if(!dot) return;
  if (state==='syncing') dot.className='sync-dot syncing';
  else if (state==='offline') dot.className='sync-dot offline';
  else dot.className='sync-dot';
}

// ============================================================
// LOAD ALL COMPANY DATA
// ============================================================
function loadAllCompanyData(done) {
  if (typeof fetch==='undefined'){ done(); return; }
  setSyncDot('syncing');
  var colls=['orders','recoveries','visits','expenses','apps','stock','golive','announcements','samples'];
  var pending=colls.length; var anyErr=false;
  function check(){ pending--; if(pending<=0){ setSyncDot(anyErr?'offline':'ok'); done(); } }
  for (var i=0;i<colls.length;i++){
    (function(coll){
      fetch(FB_BASE + coll + '?key=' + FIREBASE_API_KEY + '&pageSize=1000')
        .then(function(r){ return r.json(); })
        .then(function(resp){
          var arr=[];
          if (resp && resp.documents){
            for (var d=0;d<resp.documents.length;d++){ var o=parseFirestoreDoc(resp.documents[d]); if(o) arr.push(o); }
          }
          arr.sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
          ALL[coll]=arr;
          check();
        }).catch(function(){ anyErr=true; check(); });
    })(colls[i]);
  }
}

function parseFirestoreDoc(doc) {
  if (!doc||!doc.fields) return null;
  var obj={}; obj._docName=doc.name;
  for (var key in doc.fields){
    if (!doc.fields.hasOwnProperty(key)) continue;
    var f=doc.fields[key];
    if (f.stringValue!==undefined) obj[key]=f.stringValue;
    else if (f.doubleValue!==undefined) obj[key]=f.doubleValue;
    else if (f.integerValue!==undefined) obj[key]=parseFloat(f.integerValue);
    else if (f.booleanValue!==undefined) obj[key]=f.booleanValue;
    else if (f.nullValue!==undefined) obj[key]=null;
    else obj[key]='';
  }
  if (obj.items && typeof obj.items==='string'){ try{ obj.items=JSON.parse(obj.items); }catch(e){ obj.items=[]; } }
  if (obj.gps && typeof obj.gps==='string'){ try{ obj.gps=JSON.parse(obj.gps); }catch(e){ obj.gps=null; } }
  return obj;
}

function toFirestoreFields(data){
  var fields={};
  for (var key in data){
    if (!data.hasOwnProperty(key)) continue;
    if (key==='_docName') continue;
    var val=data[key];
    if (typeof val==='string') fields[key]={stringValue:val};
    else if (typeof val==='number') fields[key]={doubleValue:val};
    else if (typeof val==='boolean') fields[key]={booleanValue:val};
    else if (val===null||val===undefined) fields[key]={nullValue:null};
    else fields[key]={stringValue:JSON.stringify(val)};
  }
  return fields;
}

// Create new doc in collection
function fbCreate(coll, record, done){
  if (typeof fetch==='undefined'){ if(done) done(false); return; }
  setSyncDot('syncing');
  fetch(FB_BASE + coll + '?key=' + FIREBASE_API_KEY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toFirestoreFields(record)})})
    .then(function(r){ return r.json(); })
    .then(function(resp){ if(resp&&resp.name) record._docName=resp.name; setSyncDot('ok'); if(done) done(true); })
    .catch(function(){ setSyncDot('offline'); if(done) done(false); });
}

// Update existing doc (by _docName full path) using field paths
function fbUpdate(record, fieldsToUpdate, done){
  if (typeof fetch==='undefined' || !record._docName){ if(done) done(false); return; }
  setSyncDot('syncing');
  var mask='';
  for (var k in fieldsToUpdate){ if(fieldsToUpdate.hasOwnProperty(k)){ mask += (mask?'&':'') + 'updateMask.fieldPaths=' + k; } }
  var url='https://firestore.googleapis.com/v1/' + record._docName + '?key=' + FIREBASE_API_KEY + '&' + mask;
  fetch(url, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toFirestoreFields(fieldsToUpdate)})})
    .then(function(r){ return r.json(); })
    .then(function(){ setSyncDot('ok'); if(done) done(true); })
    .catch(function(){ setSyncDot('offline'); if(done) done(false); });
}

// Delete doc by _docName
function fbDelete(docName, done){
  if (typeof fetch==='undefined' || !docName){ if(done) done(false); return; }
  setSyncDot('syncing');
  fetch('https://firestore.googleapis.com/v1/' + docName + '?key=' + FIREBASE_API_KEY, {method:'DELETE'})
    .then(function(){ setSyncDot('ok'); if(done) done(true); })
    .catch(function(){ setSyncDot('offline'); if(done) done(false); });
}

// Set a settings doc (named document)
function fbSetSetting(key, value, done){
  if (typeof fetch==='undefined'){ if(done) done(false); return; }

}

function fbSetSettingStr(key, value, done){

// HELPERS
// ============================================================
function fmtPKR(n){ var num=parseFloat(n)||0; return 'PKR ' + num.toLocaleString('en-PK',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtNum(n){ var num=parseFloat(n)||0; return num.toLocaleString('en-PK'); }
function fmtDate(d){ if(!d) return ''; var dt=new Date(d); return dt.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(d){ if(!d) return ''; var dt=new Date(d); return dt.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'}); }
function today(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function daysBetween(d1,d2){ var a=new Date(d1); var b=new Date(d2); return Math.floor((b-a)/(1000*60*60*24)); }

var toastTimer=null;
function showToast(msg,type){
  var el=document.getElementById('toast'); el.textContent=msg;
  el.className='show'+(type?' toast-'+type:'');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.className=''; },3000);
}

function openModal(html){ document.getElementById('modal-box').innerHTML=html; document.getElementById('modal-overlay').className='modal-overlay show'; }
function closeModal(){ document.getElementById('modal-overlay').className='modal-overlay'; }

function getOfficers(){ var o=[]; for(var i=0;i<USERS.length;i++){ if(USERS[i].role==='officer') o.push(USERS[i]); } return o; }
function getManagers(){ var o=[]; for(var i=0;i<USERS.length;i++){ if(USERS[i].role==='manager') o.push(USERS[i]); } return o; }
function getAdmins(){ var o=[]; for(var i=0;i<USERS.length;i++){ if(USERS[i].role==='admin') o.push(USERS[i]); } return o; }

function getTargetFor(username){
  var raw=localStorage.getItem('br_target_'+username);

}

// ============================================================
// CFO INSIGHTS -- automated analysis
// ============================================================
function renderInsights(el) {
  var officers=getOfficers();
  var insights=[];
  var regions=['South Punjab','Upper Punjab','Sindh','MD Direct'];

  // Company-wide aggregates
  var totalTarget=0, totalRecPosted=0, totalRecApproved=0, totalOrderVal=0, totalExpApproved=0, totalFuel=0;
  for (var oo=0;oo<officers.length;oo++) totalTarget+=getTargetFor(officers[oo].username);
  for (var i=0;i<ALL.recoveries.length;i++){
    var rc=ALL.recoveries[i];
    if (rc.adminStatus!=='rejected') totalRecPosted+=(rc.amount||0);
    if (rc.adminStatus==='approved') totalRecApproved+=(rc.amount||0);
  }
  for (var j=0;j<ALL.orders.length;j++){ if((ALL.orders[j].status||'')!=='rejected') totalOrderVal+=(ALL.orders[j].total||0); }
  for (var k=0;k<ALL.expenses.length;k++){
    var ex=ALL.expenses[k];
    var amt=(ex.approvedAmount!==undefined&&ex.approvedAmount!==null)?ex.approvedAmount:ex.amount;
    if (ex.status==='approved'){ totalExpApproved+=(amt||0); if(ex.category==='Travel/Fuel') totalFuel+=(amt||0); }
  }

  // 1. Overall target attainment with run-rate projection
  if (totalTarget>0){
    var attain=totalRecPosted/totalTarget*100;
    var gap=totalTarget-totalRecPosted;
    if (attain<60){
      insights.push({type:'warn',title:'Quarterly recovery attainment at '+attain.toFixed(0)+'% -- collection shortfall of '+fmtPKR(gap),
        body:'Posted recovery '+fmtPKR(totalRecPosted)+' against a combined target of '+fmtPKR(totalTarget)+'. At the current pace the quarter closes below plan. Prioritise the top 10 overdue accounts and convert pending orders to dispatched invoices to accelerate cash conversion.'});
    } else if (attain>=100){
      insights.push({type:'good',title:'Target exceeded at '+attain.toFixed(0)+'% -- surplus of '+fmtPKR(Math.abs(gap)),
        body:'Recovery of '+fmtPKR(totalRecPosted)+' has cleared the '+fmtPKR(totalTarget)+' target. Lock in the gain: push next-quarter targets upward and protect margin by holding discount discipline rather than chasing further volume.'});
    } else {
      insights.push({type:'good',title:'On track at '+attain.toFixed(0)+'% of target',
        body:'Recovery '+fmtPKR(totalRecPosted)+' vs target '+fmtPKR(totalTarget)+'. A remaining '+fmtPKR(gap)+' is bridgeable this quarter if weekly collection run-rate holds.'});
    }
  }

  // 2. Approval drag (posted vs admin-approved) -- working-capital quality
  if (totalRecPosted>0){
    var approvalRate=totalRecApproved/totalRecPosted*100;
    if (approvalRate<70){
      insights.push({type:'warn',title:'Only '+approvalRate.toFixed(0)+'% of posted recovery is admin-verified',
        body:fmtPKR(totalRecPosted-totalRecApproved)+' sits posted but unverified. Until it clears your approval, it is not bankable cash. A verification backlog distorts officer scorecards and overstates real collection -- clear it weekly.'});
    }
  }

  // 3. Aging receivables -- DSO proxy
  var bucket0=0,bucket8=0,bucket31=0,oldCount=0;
  for (var a=0;a<ALL.recoveries.length;a++){
    var r2=ALL.recoveries[a];
    if ((r2.adminStatus||'pending')==='pending'){
      var age=daysBetween(r2.date, today());
      if (age<=7) bucket0+=(r2.amount||0);
      else if (age<=30){ bucket8+=(r2.amount||0); oldCount++; }
      else { bucket31+=(r2.amount||0); oldCount++; }
    }
  }
  if (bucket31>0){
    insights.push({type:'warn',title:fmtPKR(bucket31)+' in recovery pending over 30 days',
      body:'Receivables aging beyond 30 days carry the highest default risk and quietly inflate working-capital needs. Every rupee stuck here is a rupee financed from your own cash. Escalate these accounts to the regional manager with a firm collection deadline.'});
  } else if (bucket8>0){
    insights.push({type:'warn',title:fmtPKR(bucket8)+' pending verification in the 8-30 day window',
      body:'Still healthy, but drifting. Verify within the week to keep Days Sales Outstanding tight and officer incentives accurate.'});
  }

  // 4. Expense-to-recovery ratio -- field cost efficiency
  if (totalExpApproved>0 && totalRecApproved>0){
    var costRatio=totalExpApproved/totalRecApproved*100;
    if (costRatio>15){
      insights.push({type:'warn',title:'Field cost ratio elevated at '+costRatio.toFixed(1)+'% of approved recovery',
        body:'Approved expenses '+fmtPKR(totalExpApproved)+' consume '+costRatio.toFixed(1)+' paisa of every rupee recovered. Above roughly 15% the field operation erodes contribution margin. Audit fuel claims against vehicle mileage and tighten low-yield routes.'});
    } else {
      insights.push({type:'good',title:'Field cost ratio healthy at '+costRatio.toFixed(1)+'%',
        body:'Expenses '+fmtPKR(totalExpApproved)+' against recovery '+fmtPKR(totalRecApproved)+'. The field force is converting spend into collection efficiently -- protect this ratio as you scale headcount.'});
    }
  }

  // 5. Fuel intensity specifically
  if (totalFuel>0 && totalRecApproved>0){
    var fuelRatio=totalRecApproved/totalFuel;
    if (fuelRatio<10){
      insights.push({type:'warn',title:'Low fuel productivity: PKR '+fuelRatio.toFixed(1)+' recovered per PKR of fuel',
        body:'Route density is weak. Cluster customer visits geographically and pair low-recovery territories with adjacent strong ones to lift kilometres-to-cash yield.'});
    }
  }

  // 6. Regional concentration / single-region dependence
  var regRecMap={}; var regSum=0;
  for (var rr=0;rr<ALL.recoveries.length;rr++){ var rec3=ALL.recoveries[rr]; if(rec3.adminStatus!=='rejected'){ regRecMap[rec3.region]=(regRecMap[rec3.region]||0)+(rec3.amount||0); regSum+=(rec3.amount||0); } }
  if (regSum>0){
    var topReg='', topRegAmt=0;
    for (var rk in regRecMap){ if(regRecMap.hasOwnProperty(rk) && regRecMap[rk]>topRegAmt){ topRegAmt=regRecMap[rk]; topReg=rk; } }
    var conc=topRegAmt/regSum*100;
    if (conc>50){
      insights.push({type:'warn',title:topReg+' carries '+conc.toFixed(0)+'% of total recovery -- concentration risk',
        body:'Over half of collection depends on one region. A single manager change, distributor dispute, or seasonal dip there would swing the whole company. Diversify by setting stretch targets in the weaker regions.'});
    }
  }

  // 7. Idle officers -- activation gap
  var activeOfficers={};
  for (var q=0;q<ALL.recoveries.length;q++) activeOfficers[ALL.recoveries[q].officer]=true;
  var idle=[];
  for (var io=0;io<officers.length;io++){ if(!activeOfficers[officers[io].username]) idle.push(officers[io].name); }
  if (idle.length>0){
    insights.push({type:'warn',title:idle.length+' of '+officers.length+' officers posted zero recovery',
      body:'Inactive: '+idle.slice(0,5).join(', ')+(idle.length>5?' and '+(idle.length-5)+' more':'')+'. Each idle officer still carries fixed salary cost with no collection offset. Confirm they are trained on the app and assigned live accounts before the quarter slips further.'});
  }

  // 8. Sample cost discipline
  var sampleVal=0;
  for (var sv=0;sv<ALL.samples.length;sv++){ sampleVal+=(parseFloat(ALL.samples[sv].price)||0)*(parseFloat(ALL.samples[sv].qty)||0); }
  if (sampleVal>0 && totalRecApproved>0){
    var sampleRatio=sampleVal/totalRecApproved*100;
    if (sampleRatio>5){
      insights.push({type:'warn',title:'Sample value is '+sampleRatio.toFixed(1)+'% of approved recovery',
        body:'Samples worth '+fmtPKR(sampleVal)+' have been issued. Free goods are a marketing investment, not a cost to ignore -- tie sample allocation to subsequent orders from the same customer to confirm they generate real conversion.'});
    }
  }

  // 9. Top performer recognition
  var perfMap={};
  for (var p=0;p<ALL.recoveries.length;p++){

  }
  var topName='', topAmt=0;
  for (var key in perfMap){ if(perfMap.hasOwnProperty(key) && perfMap[key].amt>topAmt){ topAmt=perfMap[key].amt; topName=perfMap[key].name; } }
  if (topName) insights.push({type:'good',title:'Top performer: '+topName+' -- '+fmtPKR(topAmt),
    body:'Leading the field on recovery. Document what this officer does differently on route planning and follow-up cadence, then turn it into a one-page playbook for the rest of the team.'});

  var h=[];
  h.push('<div class="page-title">CFO Insights</div>');
  h.push('<div class="page-sub">Financially-grounded analysis of recovery, working capital, and field cost efficiency</div>');
  if (insights.length===0){
    h.push('<div class="card"><div class="empty-state"><div class="empty-state-icon">&#9733;</div><div>Not enough data yet. Insights appear as officers post recoveries, orders, and expenses.</div></div></div>');
  } else {
    h.push('<div class="card">');
    for (var ins=0;ins<insights.length;ins++){
      var it=insights[ins];
      h.push('<div class="insight '+it.type+'"><div class="insight-title">'+it.title+'</div><div class="insight-body">'+it.body+'</div></div>');
    }
    h.push('</div>');
  }
  el.innerHTML=h.join('');
}

var ORD_FILTER='pending';
var REVIEW_ORDER_ID=null;
var REVIEW_QTYS={};
function renderOrders(el) {

  }

  for (var i=0;i<ALL.orders.length;i++){

      h.push('<td>'+(o.officerName||'-')+'</td><td>'+(o.customerName||'-')+'</td><td><span style="cursor:pointer;color:var(--accent)" data-id="'+o.id+'" onclick="openOrderReview(this)">'+items+'</span></td>');
      var amtDisplay=fmtPKR(o.total);
      if (o.status==='approved' && o.approvedTotal!==undefined && o.approvedTotal!==o.total){ amtDisplay=fmtPKR(o.approvedTotal)+'<br><span style="font-size:10px;color:var(--text2);text-decoration:line-through">'+fmtPKR(o.total)+'</span>'; }
      h.push('<td><strong>'+amtDisplay+'</strong></td><td><span class="badge badge-'+badge+'">'+st2+'</span></td>');

        h.push('<button class="btn btn-sm btn-danger" data-id="'+o.id+'" onclick="rejectOrder(this)">Reject</button>');

        h.push('<span style="font-size:11px;color:var(--text2)">'+(o.adminAction||'-')+'</span>');

function setOrdFilter(elm){ ORD_FILTER=elm.getAttribute('data-f'); renderOrders(document.getElementById('main-content')); }
function findOrder(id){ for(var i=0;i<ALL.orders.length;i++){ if(ALL.orders[i].id===id) return ALL.orders[i]; } return null; }
function openOrderReview(elm){
  var o=findOrder(elm.getAttribute('data-id')); if(!o||!o.items) return;
  REVIEW_ORDER_ID=o.id;
  // Initialize approved quantities from current (original if not yet set)
  REVIEW_QTYS={};
  for (var i=0;i<o.items.length;i++){
    var it=o.items[i];
    var approvedQ = (it.approvedQty!==undefined && it.approvedQty!==null) ? it.approvedQty : it.qty;
    REVIEW_QTYS[i]=approvedQ;
  }
  renderOrderReviewModal(o);
}

function renderOrderReviewModal(o){
  var h=[];
  h.push('<div class="modal-title">Review Order</div>');
  h.push('<div style="font-size:12px;color:var(--text2);margin-bottom:4px"><strong>'+(o.customerName||'')+'</strong></div>');
  h.push('<div style="font-size:11px;color:var(--text2);margin-bottom:12px">'+(o.officerName||'')+' &middot; '+(o.region||'')+' &middot; '+fmtDate(o.date)+'</div>');
  h.push('<div style="max-height:320px;overflow-y:auto">');
  h.push('<table><thead><tr><th>Product</th><th>Ordered</th><th>Approve Qty</th><th>Line Total</th></tr></thead><tbody>');
  for (var i=0;i<o.items.length;i++){
    var it=o.items[i];
    var aq=REVIEW_QTYS[i];
    h.push('<tr><td style="font-size:12px">'+it.name+'<br><span style="font-size:10px;color:var(--text2)">'+fmtPKR(it.price)+' each</span></td>');
    h.push('<td style="text-align:center">'+it.qty+'</td>');
    h.push('<td><input class="form-input" type="number" min="0" value="'+aq+'" data-idx="'+i+'" oninput="onReviewQtyChange(this)" style="width:70px;padding:6px;text-align:center"></td>');
    h.push('<td id="review-line-'+i+'" style="font-weight:700;color:var(--accent)">'+fmtPKR(aq*it.price)+'</td></tr>');
  }
  h.push('</tbody></table></div>');
  // Totals
  var origTotal=o.total||0;
  var apprTotal=0;
  for (var t=0;t<o.items.length;t++) apprTotal+=REVIEW_QTYS[t]*o.items[t].price;
  h.push('<div style="background:var(--navy3);border-radius:8px;padding:12px;margin:12px 0">');
  h.push('<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>Ordered Total</span><span>'+fmtPKR(origTotal)+'</span></div>');
  h.push('<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;color:var(--accent)"><span>Approved Total</span><span id="review-appr-total">'+fmtPKR(apprTotal)+'</span></div>');
  h.push('</div>');
  h.push('<div class="action-btns" style="flex-wrap:wrap">');
  h.push('<button class="btn btn-success" onclick="approveOrderAsIs()">Approve As-Is</button>');
  h.push('<button class="btn btn-primary" onclick="approveOrderModified()">Approve With Changes</button>');
  h.push('</div>');
  h.push('<div class="action-btns" style="margin-top:8px">');
  h.push('<button class="btn btn-danger" onclick="rejectOrderFromReview()">Reject</button>');
  h.push('<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>');
  h.push('</div>');
  openModal(h.join(''));
}

function onReviewQtyChange(inp){
  var idx=parseInt(inp.getAttribute('data-idx'));
  var q=parseInt(inp.value); if(isNaN(q)||q<0) q=0;
  REVIEW_QTYS[idx]=q;
  var o=findOrder(REVIEW_ORDER_ID); if(!o) return;
  var lineEl=document.getElementById('review-line-'+idx);
  if (lineEl) lineEl.textContent=fmtPKR(q*o.items[idx].price);
  var apprTotal=0;
  for (var t=0;t<o.items.length;t++) apprTotal+=REVIEW_QTYS[t]*o.items[t].price;
  var totEl=document.getElementById('review-appr-total');
  if (totEl) totEl.textContent=fmtPKR(apprTotal);
}

function approveOrderAsIs(){
  var o=findOrder(REVIEW_ORDER_ID); if(!o) return;
  // Approved qty = ordered qty for all
  for (var i=0;i<o.items.length;i++){ o.items[i].approvedQty=o.items[i].qty; }
  finalizeOrderApproval(o, o.total, false);
}

function approveOrderModified(){
  var o=findOrder(REVIEW_ORDER_ID); if(!o) return;
  var apprTotal=0; var changed=false;
  for (var i=0;i<o.items.length;i++){
    var aq=REVIEW_QTYS[i];
    o.items[i].approvedQty=aq;
    apprTotal+=aq*o.items[i].price;
    if (aq!==o.items[i].qty) changed=true;
  }
  finalizeOrderApproval(o, apprTotal, changed);
}

function finalizeOrderApproval(o, apprTotal, changed){
  // Optimistic: update UI instantly, sync in background
  o.status='approved';
  o.approvedTotal=apprTotal;
  o.originalTotal=o.total;
  o.adminAction=(changed?'Approved with changes by ':'Approved by ')+CU.name;
  o.adminActionAt=nowISO();
  closeModal();
  renderOrders(document.getElementById('main-content'));
  buildSidebar();
  showToast(changed?'Order approved with changes':'Order approved','success');
  fbUpdate(o, {status:'approved', approvedTotal:apprTotal, originalTotal:o.total, items:o.items, adminAction:o.adminAction, adminActionAt:o.adminActionAt}, null);
}

function rejectOrderFromReview(){
  var o=findOrder(REVIEW_ORDER_ID); if(!o) return;
  o.status='rejected'; o.adminAction='Rejected by '+CU.name; o.adminActionAt=nowISO();
  closeModal();
  renderOrders(document.getElementById('main-content'));
  buildSidebar();
  showToast('Order rejected','success');
  fbUpdate(o, {status:'rejected', adminAction:o.adminAction, adminActionAt:o.adminActionAt}, null);
}

// Optimistic quick approve/reject (from table buttons)
function approveOrder(elm){
  var o=findOrder(elm.getAttribute('data-id')); if(!o) return;
  for (var i=0;i<o.items.length;i++){ o.items[i].approvedQty=o.items[i].qty; }
  o.status='approved'; o.approvedTotal=o.total; o.originalTotal=o.total;
  o.adminAction='Approved by '+CU.name; o.adminActionAt=nowISO();
  renderOrders(document.getElementById('main-content')); buildSidebar();
  showToast('Order approved','success');
  fbUpdate(o, {status:'approved', approvedTotal:o.total, originalTotal:o.total, items:o.items, adminAction:o.adminAction, adminActionAt:o.adminActionAt}, null);
}
function rejectOrder(elm){
  var o=findOrder(elm.getAttribute('data-id')); if(!o) return;
  o.status='rejected'; o.adminAction='Rejected by '+CU.name; o.adminActionAt=nowISO();
  renderOrders(document.getElementById('main-content')); buildSidebar();
  showToast('Order rejected','success');
  fbUpdate(o, {status:'rejected', adminAction:o.adminAction, adminActionAt:o.adminActionAt}, null);
}

    h.push('<div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="exp-choice" value="claim" onchange="onExpChoice()"> B. Officer claimed: <span style="color:var(--text);font-weight:700">'+fmtPKR(e.amount)+'</span></label></div>');
    h.push('<div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="exp-choice" value="custom" onchange="onExpChoice()"> C. Custom amount</label>');
    h.push('<input class="form-input" type="number" min="0" id="exp-custom" placeholder="Enter amount" value="'+(e.amount||0)+'" oninput="onExpCustomInput()" style="margin-top:6px"></div>');
  } else {
    h.push('<div style="background:var(--navy3);border-radius:8px;padding:12px;margin:12px 0;font-size:13px">');
    h.push('<div style="display:flex;justify-content:space-between"><span>Officer claimed</span><span style="font-weight:700;color:var(--accent)">'+fmtPKR(e.amount)+'</span></div>');
    h.push('</div>');
    h.push('<div class="form-group"><div class="form-label">Amount to approve</div>');
    h.push('<input class="form-input" type="number" min="0" id="exp-custom" value="'+(e.amount||0)+'"></div>');
  }
  h.push('<div style="background:rgba(232,160,32,0.08);border-radius:8px;padding:10px;margin:8px 0 14px;display:flex;justify-content:space-between;font-weight:800;color:var(--accent)"><span>Will approve</span><span id="exp-final">'+fmtPKR(e.amount)+'</span></div>');
  h.push('<div class="action-btns" style="flex-wrap:wrap">');
  h.push('<button class="btn btn-success" onclick="confirmExpenseApproval()">Approve</button>');
  h.push('<button class="btn btn-danger" onclick="rejectExpFromReview()">Reject</button>');
  h.push('<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>');
  h.push('</div>');
  openModal(h.join(''));
  if (isFuel) onExpVehChange();
  else { var fEl=document.getElementById('exp-final'); var cEl=document.getElementById('exp-custom'); if(cEl){ cEl.oninput=function(){ var val=parseFloat(cEl.value)||0; if(fEl) fEl.textContent=fmtPKR(val); }; } }
}
function expEstimate(){
  var e=findExp(REVIEW_EXP_ID); if(!e) return 0;
  var petrolRate=parseFloat(localStorage.getItem('br_petrol_rate')||'375');
  var perkm=parseFloat(localStorage.getItem('br_perkm')||(petrolRate*0.02));
  var sel=document.getElementById('exp-veh');
  var vname=sel?sel.value:'Bike';
  var km=e.km||0;
  if (vname==='Bike'){ return km*perkm; }
  var kmpl=getVehicleKmpl(vname);
  if (kmpl<=0) return km*perkm;
  return (km/kmpl)*petrolRate;
}
function onExpVehChange(){
  var est=expEstimate();
  var lbl=document.getElementById('exp-est-val'); if(lbl) lbl.textContent=fmtPKR(est);
  var rl=document.getElementById('exp-radio-est'); if(rl) rl.textContent='('+fmtPKR(est)+')';
  onExpChoice();
}
function onExpChoice(){
  var e=findExp(REVIEW_EXP_ID); if(!e) return;
  var choice=getExpChoice();
  var fEl=document.getElementById('exp-final');
  var val=0;
  if (choice==='est') val=expEstimate();
  else if (choice==='claim') val=e.amount||0;
  else { val=parseFloat((document.getElementById('exp-custom')||{}).value)||0; }
  if (fEl) fEl.textContent=fmtPKR(val);
}
function onExpCustomInput(){
  var radios=document.getElementsByName('exp-choice');
  for (var i=0;i<radios.length;i++){ if(radios[i].value==='custom') radios[i].checked=true; }
  onExpChoice();
}
function getExpChoice(){
  var radios=document.getElementsByName('exp-choice');
  for (var i=0;i<radios.length;i++){ if(radios[i].checked) return radios[i].value; }
  return 'custom';
}
function confirmExpenseApproval(){
  var e=findExp(REVIEW_EXP_ID); if(!e) return;
  var isFuel=(e.category==='Travel/Fuel');
  var approvedAmt;
  if (isFuel){
    var choice=getExpChoice();
    if (choice==='est') approvedAmt=expEstimate();
    else if (choice==='claim') approvedAmt=e.amount||0;
    else approvedAmt=parseFloat((document.getElementById('exp-custom')||{}).value)||0;
    var selV=document.getElementById('exp-veh'); if(selV) e.vehicleUsed=selV.value;
  } else {
    approvedAmt=parseFloat((document.getElementById('exp-custom')||{}).value);
    if (isNaN(approvedAmt)||approvedAmt<0) approvedAmt=e.amount||0;
  }
  approvedAmt=Math.round(approvedAmt);
  e.status='approved';
  e.claimedAmount=e.amount;
  e.approvedAmount=approvedAmt;
  e.adminAction=(approvedAmt!==e.amount?'Approved (adjusted) by ':'Approved by ')+CU.name;
  e.adminActionAt=nowISO();
  closeModal();
  renderExpenses(document.getElementById('main-content')); buildSidebar();
  showToast(approvedAmt!==e.amount?'Expense approved with adjustment':'Expense approved','success');
  fbUpdate(e, {status:'approved', claimedAmount:e.amount, approvedAmount:approvedAmt, vehicleUsed:e.vehicleUsed||'', adminAction:e.adminAction, adminActionAt:e.adminActionAt}, null);
}
function rejectExpFromReview(){
  var e=findExp(REVIEW_EXP_ID); if(!e) return;
  e.status='rejected'; e.adminAction='Rejected by '+CU.name; e.adminActionAt=nowISO();
  closeModal();
  renderExpenses(document.getElementById('main-content')); buildSidebar();
  showToast('Expense rejected','success');
  fbUpdate(e, {status:'rejected', adminAction:e.adminAction, adminActionAt:e.adminActionAt}, null);
}
function rejectExp(elm){
  var e=findExp(elm.getAttribute('data-id')); if(!e) return;
  e.status='rejected';
  renderExpenses(document.getElementById('main-content')); buildSidebar();
  showToast('Expense rejected','success');
  fbUpdate(e, {status:'rejected'}, null);
}

// Receipt viewer -- fetches the image on demand (kept in a separate collection to stay light)
function viewReceipt(elm){
  var rid=elm.getAttribute('data-rid'); if(!rid) return;
  openModal('<div class="modal-title">Receipt</div><div style="text-align:center"><div class="spinner"></div><div style="margin-top:10px;font-size:12px;color:var(--text2)">Loading receipt...</div></div>');
  if (typeof fetch==='undefined'){ return; }
  fetch(FB_BASE + 'receipts/' + rid + '?key=' + FIREBASE_API_KEY)
    .then(function(r){ return r.json(); })
    .then(function(resp){
      var img='';
      if (resp && resp.fields && resp.fields.image && resp.fields.image.stringValue) img=resp.fields.image.stringValue;
      var h=[];
      h.push('<div class="modal-title">Receipt</div>');
      if (img){ h.push('<img src="'+img+'" style="width:100%;border-radius:8px;border:1px solid var(--border)" alt="receipt">'); }
      else { h.push('<div class="empty-state">No receipt image found.</div>'); }
      h.push('<div class="action-btns" style="margin-top:12px"><button class="btn btn-secondary btn-block" onclick="closeModal()">Close</button></div>');
      openModal(h.join(''));
    })
    .catch(function(){
      openModal('<div class="modal-title">Receipt</div><div class="empty-state">Could not load receipt.</div><div class="action-btns" style="margin-top:12px"><button class="btn btn-secondary btn-block" onclick="closeModal()">Close</button></div>');
    });
}

var APP_FILTER='pending';
function renderApplications(el) {
  var h=[];
  h.push('<div class="page-title">Applications & Requests</div>');
  h.push('<div class="page-sub">Leave, complaints, stock requests and more</div>');
  h.push('<div class="filter-row">');
  var filters=[['pending','Pending'],['approved','Approved'],['rejected','Rejected'],['all','All']];
  for (var f=0;f<filters.length;f++){
    var ac=APP_FILTER===filters[f][0]?' active':'';
    h.push('<div class="pill'+ac+'" data-f="'+filters[f][0]+'" onclick="setAppFilter(this)">'+filters[f][1]+'</div>');
  }
  h.push('</div>');
  // Merge apps + stock
  var combined=ALL.apps.concat(ALL.stock);
  combined.sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
  var list=[];
  for (var i=0;i<combined.length;i++){
    var st=combined[i].status||'pending';
    if (APP_FILTER==='all'||APP_FILTER===st) list.push(combined[i]);
  }
  h.push('<div class="card">');
  if (list.length===0){
    h.push('<div class="empty-state"><div class="empty-state-icon">&#128196;</div><div>No '+APP_FILTER+' applications</div></div>');
  } else {
    for (var j=0;j<list.length;j++){
      var a=list[j]; var st2=a.status||'pending';
      var badge=st2==='approved'?'approved':(st2==='rejected'?'rejected':'pending');
      var kind=a.appType||(a.productName?'Stock Request':'Request');
      h.push('<div style="background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px">');
      h.push('<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">');
      h.push('<div><strong>'+kind+'</strong> <span style="font-size:11px;color:var(--text2)">by '+(a.officerName||'-')+'</span></div>');
      h.push('<span class="badge badge-'+badge+'">'+st2+'</span></div>');
      if (a.subject) h.push('<div style="font-size:13px;margin-bottom:4px">'+a.subject+'</div>');
      if (a.body) h.push('<div style="font-size:12px;color:var(--text2);margin-bottom:4px">'+a.body+'</div>');
      if (a.productName) h.push('<div style="font-size:12px;color:var(--accent)">Product: '+a.productName+(a.qty?' (Qty: '+a.qty+')':'')+(a.batchNo?' | Batch: '+a.batchNo:'')+'</div>');
      h.push('<div style="font-size:11px;color:var(--text2);margin-top:4px">'+fmtDate(a.date)+'</div>');
      if (st2==='pending'){
        h.push('<div class="action-btns" style="margin-top:8px">');
        h.push('<button class="btn btn-sm btn-success" data-id="'+a.id+'" data-coll="'+(a.appType?'apps':'stock')+'" onclick="approveApp(this)">Approve</button>');
        h.push('<button class="btn btn-sm btn-danger" data-id="'+a.id+'" data-coll="'+(a.appType?'apps':'stock')+'" onclick="rejectApp(this)">Reject</button>');
        h.push('</div>');
      }
      h.push('</div>');
    }
  }
  h.push('</div>');
  el.innerHTML=h.join('');
}
function setAppFilter(elm){ APP_FILTER=elm.getAttribute('data-f'); renderApplications(document.getElementById('main-content')); }
function findApp(id, coll){ var src=coll==='stock'?ALL.stock:ALL.apps; for(var i=0;i<src.length;i++){ if(src[i].id===id) return src[i]; } return null; }
function approveApp(elm){
  var a=findApp(elm.getAttribute('data-id'), elm.getAttribute('data-coll')); if(!a) return;
  a.status='approved';
  renderApplications(document.getElementById('main-content')); buildSidebar();
  showToast('Approved','success');
  fbUpdate(a, {status:'approved'}, null);
}
function rejectApp(elm){
  var a=findApp(elm.getAttribute('data-id'), elm.getAttribute('data-coll')); if(!a) return;
  a.status='rejected';
  renderApplications(document.getElementById('main-content')); buildSidebar();
  showToast('Rejected','success');
  fbUpdate(a, {status:'rejected'}, null);
}

function renderLeaderboard(el) {
  var officers=getOfficers();
  var rows=[];
  for (var i=0;i<officers.length;i++){
    var off=officers[i];
    var posted=0, approved=0, orders=0, visits=0;
    for (var j=0;j<ALL.recoveries.length;j++){
      if (ALL.recoveries[j].officer===off.username && ALL.recoveries[j].adminStatus!=='rejected') posted+=(ALL.recoveries[j].amount||0);
      if (ALL.recoveries[j].officer===off.username && ALL.recoveries[j].adminStatus==='approved') approved+=(ALL.recoveries[j].amount||0);
    }
    for (var k=0;k<ALL.orders.length;k++){ if(ALL.orders[k].officer===off.username) orders++; }
    for (var m=0;m<ALL.visits.length;m++){ if(ALL.visits[m].officer===off.username) visits++; }
    var target=getTargetFor(off.username);
    var pct=target>0?(posted/target*100):0;
    rows.push({name:off.name, region:off.region, posted:posted, approved:approved, target:target, pct:pct, orders:orders, visits:visits});
  }
  rows.sort(function(a,b){ return b.pct-a.pct; });
  var h=[];
  h.push('<div class="page-title">Officer Leaderboard</div>');
  h.push('<div class="page-sub">Ranked by recovery target achievement</div>');
  h.push('<div class="card"><table><thead><tr><th>#</th><th>Officer</th><th>Region</th><th>Posted</th><th>Approved</th><th>Target</th><th>Achievement</th><th>Orders</th><th>Visits</th></tr></thead><tbody>');
  for (var r=0;r<rows.length;r++){
    var row=rows[r];
    var rankColor=r===0?'var(--accent)':(r<3?'var(--accent2)':'var(--text2)');
    var pctColor=row.pct>=90?'var(--green)':(row.pct<50?'var(--red)':'var(--accent)');
    h.push('<tr><td style="color:'+rankColor+';font-weight:800">'+(r+1)+'</td>');
    h.push('<td><strong>'+row.name+'</strong></td><td style="font-size:11px">'+row.region+'</td>');
    h.push('<td>'+fmtPKR(row.posted)+'</td><td>'+fmtPKR(row.approved)+'</td><td>'+fmtPKR(row.target)+'</td>');
    h.push('<td><div style="color:'+pctColor+';font-weight:800">'+row.pct.toFixed(1)+'%</div><div class="prog-track"><div class="prog-fill" style="width:'+Math.min(100,row.pct)+'%"></div></div></td>');
    h.push('<td>'+row.orders+'</td><td>'+row.visits+'</td></tr>');
  }
  h.push('</tbody></table></div>');
  h.push('<div class="action-btns"><button class="btn btn-pdf" onclick="exportLeaderboardPDF()">Export PDF</button></div>');
  el.innerHTML=h.join('');
}

// ============================================================
// RECOVERY AGING
// ============================================================
function renderAging(el) {
  // Aging based on pending recoveries (days since posted, not yet admin-approved)
  var buckets={b1:0,b2:0,b3:0,b4:0};
  var bucketCount={b1:0,b2:0,b3:0,b4:0};
  var details=[];
  for (var i=0;i<ALL.recoveries.length;i++){
    var r=ALL.recoveries[i];
    if ((r.adminStatus||'pending')!=='pending') continue;
    var age=daysBetween(r.date, today());
    var bucket;
    if (age<=30){ buckets.b1+=(r.amount||0); bucketCount.b1++; bucket='0-30'; }
    else if (age<=60){ buckets.b2+=(r.amount||0); bucketCount.b2++; bucket='31-60'; }
    else if (age<=90){ buckets.b3+=(r.amount||0); bucketCount.b3++; bucket='61-90'; }
    else { buckets.b4+=(r.amount||0); bucketCount.b4++; bucket='90+'; }
    details.push({officer:r.officerName, customer:r.customerName, amount:r.amount, age:age, bucket:bucket});
  }
  var totalAging=buckets.b1+buckets.b2+buckets.b3+buckets.b4;
  details.sort(function(a,b){ return b.age-a.age; });
  var h=[];
  h.push('<div class="page-title">Recovery Aging Analysis</div>');
  h.push('<div class="page-sub">Pending (unverified) recoveries bucketed by age. The CFO cash-tracking view.</div>');
  h.push('<div class="kpi-grid">');
  h.push('<div class="kpi-card"><div class="kpi-val" style="color:var(--green)">'+fmtPKR(buckets.b1)+'</div><div class="kpi-lbl">0-30 Days</div><div class="kpi-sub">'+bucketCount.b1+' entries</div></div>');
  h.push('<div class="kpi-card"><div class="kpi-val" style="color:var(--accent)">'+fmtPKR(buckets.b2)+'</div><div class="kpi-lbl">31-60 Days</div><div class="kpi-sub">'+bucketCount.b2+' entries</div></div>');
  h.push('<div class="kpi-card"><div class="kpi-val" style="color:var(--amber)">'+fmtPKR(buckets.b3)+'</div><div class="kpi-lbl">61-90 Days</div><div class="kpi-sub">'+bucketCount.b3+' entries</div></div>');
  h.push('<div class="kpi-card"><div class="kpi-val" style="color:var(--red)">'+fmtPKR(buckets.b4)+'</div><div class="kpi-lbl">90+ Days</div><div class="kpi-sub">'+bucketCount.b4+' entries</div></div>');
  h.push('</div>');
  if (totalAging>0){
    h.push('<div class="card"><div class="card-title">Aging Distribution</div><div class="aging-bar">');
    var segs=[['b1','var(--green)'],['b2','var(--accent)'],['b3','var(--amber)'],['b4','var(--red)']];
    for (var s=0;s<segs.length;s++){
      var w=buckets[segs[s][0]]/totalAging*100;
      if (w>0) h.push('<div class="aging-seg" style="width:'+w+'%;background:'+segs[s][1]+'">'+w.toFixed(0)+'%</div>');
    }
    h.push('</div><div style="text-align:center;font-size:12px;color:var(--text2)">Total pending: '+fmtPKR(totalAging)+'</div></div>');
  }
  h.push('<div class="card"><div class="card-title">Aging Detail (oldest first)</div>');
  if (details.length===0){
    h.push('<div class="empty-state"><div class="empty-state-icon">&#9203;</div><div>No pending recoveries</div></div>');
  } else {
    h.push('<table><thead><tr><th>Officer</th><th>Customer</th><th>Amount</th><th>Age (days)</th><th>Bucket</th></tr></thead><tbody>');
    for (var d=0;d<details.length;d++){
      var dt=details[d];
      var bcolor=dt.bucket==='90+'?'var(--red)':(dt.bucket==='61-90'?'var(--amber)':'var(--text2)');
      h.push('<tr><td>'+dt.officer+'</td><td>'+dt.customer+'</td><td><strong>'+fmtPKR(dt.amount)+'</strong></td><td>'+dt.age+'</td><td style="color:'+bcolor+';font-weight:700">'+dt.bucket+'</td></tr>');
    }
    h.push('</tbody></table>');
  }
  h.push('</div>');
  el.innerHTML=h.join('');
}

// ============================================================
// ODOMETER / KM VARIANCE REPORT
// ============================================================
var ODO_PERIOD='month';
function renderOdometer(el) {
  var h=[];
  h.push('<div class="page-title">KM / Odometer Report</div>');
  h.push('<div class="page-sub">Odometer KM vs GPS distance. Variance over 15% is flagged.</div>');
  h.push('<div class="filter-row">');
  var periods=[['today','Daily'],['week','Weekly'],['month','Monthly'],['quarter','Quarterly']];
  for (var p=0;p<periods.length;p++){
    var ac=ODO_PERIOD===periods[p][0]?' active':'';
    h.push('<div class="pill'+ac+'" data-p="'+periods[p][0]+'" onclick="setOdoPeriod(this)">'+periods[p][1]+'</div>');
  }
  h.push('</div>');
  var range=getDateRange(ODO_PERIOD);
  // Build per-officer odometer summary from golive records
  var officers=getOfficers();
  var rows=[];
  for (var i=0;i<officers.length;i++){
    var off=officers[i];
    var odoKM=0; var days=0;
    for (var g=0;g<ALL.golive.length;g++){
      var gl=ALL.golive[g];
      if (gl.officer===off.username && gl.ended){
        var d=(gl.date||'').slice(0,10);
        if (d>=range.from && d<=range.to){ odoKM+=(gl.kmTravelled||0); days++; }
      }
    }
    // GPS distance from visits in range
    var offVisits=[];
    for (var v=0;v<ALL.visits.length;v++){
      if (ALL.visits[v].officer===off.username){
        var vd=(ALL.visits[v].date||'').slice(0,10);
        if (vd>=range.from && vd<=range.to) offVisits.push(ALL.visits[v]);
      }
    }
    var gpsKM=calcGPSDistance(offVisits);
    if (odoKM===0 && gpsKM===0) continue;
    var variance=odoKM>0?Math.abs(odoKM-gpsKM)/odoKM*100:0;
    rows.push({name:off.name, region:off.region, odoKM:odoKM, gpsKM:gpsKM, variance:variance, days:days, flag:variance>15});
  }
  h.push('<div class="card">');
  if (rows.length===0){
    h.push('<div class="empty-state"><div class="empty-state-icon">&#128663;</div><div>No odometer data for this period</div></div>');
  } else {
    h.push('<table><thead><tr><th>Officer</th><th>Region</th><th>Odometer KM</th><th>GPS KM (x1.1)</th><th>Variance</th><th>Days</th><th>Flag</th></tr></thead><tbody>');
    for (var r=0;r<rows.length;r++){
      var row=rows[r];
      var vColor=row.flag?'var(--red)':'var(--green)';
      h.push('<tr><td><strong>'+row.name+'</strong></td><td style="font-size:11px">'+row.region+'</td>');
      h.push('<td>'+row.odoKM.toFixed(0)+'</td><td>'+row.gpsKM.toFixed(1)+'</td>');
      h.push('<td style="color:'+vColor+';font-weight:700">'+row.variance.toFixed(0)+'%</td><td>'+row.days+'</td>');
      h.push('<td>'+(row.flag?'<span class="badge badge-flag">Flagged</span>':'<span class="badge badge-approved">OK</span>')+'</td></tr>');
    }
    h.push('</tbody></table>');
  }
  h.push('</div>');
  el.innerHTML=h.join('');
}
function setOdoPeriod(elm){ ODO_PERIOD=elm.getAttribute('data-p'); renderOdometer(document.getElementById('main-content')); }
function calcGPSDistance(visitList){
  var sorted=visitList.slice().sort(function(a,b){ return (a.createdAt||'').localeCompare(b.createdAt||''); });
  var straight=0; var prev=null;
  for (var i=0;i<sorted.length;i++){
    var v=sorted[i];
    if (v.gps && v.gps.lat && v.gps.lng){
      if (prev) straight+=haversineKM(prev.lat, prev.lng, v.gps.lat, v.gps.lng);
      prev=v.gps;
    }
  }
  return straight*1.1;
}
function haversineKM(lat1,lng1,lat2,lng2){
  var R=6371; var dLat=(lat2-lat1)*Math.PI/180; var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getDateRange(period){
  var now=new Date(); var todayStr=now.toISOString().slice(0,10);
  if (period==='today') return {from:todayStr,to:todayStr};
  if (period==='week'){ var day=now.getDay(); var diff=now.getDate()-day+(day===0?-6:1); var mon=new Date(new Date().setDate(diff)); return {from:mon.toISOString().slice(0,10),to:todayStr}; }
  if (period==='month'){ var yr=now.getFullYear(); var mo=now.getMonth(); return {from:yr+'-'+('0'+(mo+1)).slice(-2)+'-01',to:todayStr}; }
  if (period==='quarter'){ var qs=[0,3,6,9]; var qStart=qs[Math.floor(now.getMonth()/3)]; return {from:now.getFullYear()+'-'+('0'+(qStart+1)).slice(-2)+'-01',to:todayStr}; }
  return {from:'2000-01-01',to:todayStr};
}

    r+='<td><select class="form-select" id="ovh-'+off.username+'" style="max-width:130px">';

function handleTargetImport(input) {
  if (!input.files || !input.files[0]) return;
  var file=input.files[0];
  var name=file.name.toLowerCase();
  var statusEl=document.getElementById('import-status');
  if (name.indexOf('.csv')!==-1){
    var reader=new FileReader();
    reader.onload=function(e){ parseTargetCSV(e.target.result); };
    reader.readAsText(file);
  } else {
    // xlsx/xls -- load SheetJS dynamically
    if (statusEl) statusEl.textContent='Reading Excel file...';
    loadSheetJS(function(ok){
      if (!ok){ showToast('Could not load Excel reader. Use CSV instead.','error'); return; }
      var reader=new FileReader();
      reader.onload=function(e){
        try {
          var data=new Uint8Array(e.target.result);
          var wb=XLSX.read(data, {type:'array'});
          var sheet=wb.Sheets[wb.SheetNames[0]];
          var rows=XLSX.utils.sheet_to_json(sheet, {header:1});
          parseTargetRows(rows);
        } catch(err){ showToast('Could not read Excel file','error'); }
      };
      reader.readAsArrayBuffer(file);
    });
  }
}
function parseTargetCSV(text) {
  var lines=text.split(/\r?\n/);
  var rows=[];
  for (var i=0;i<lines.length;i++){
    if (!lines[i].trim()) continue;
    rows.push(lines[i].split(','));
  }
  parseTargetRows(rows);
}
function parseTargetRows(rows) {
  var statusEl=document.getElementById('import-status');
  var matched=0; var unmatched=[]; var blanks=0;
  // Detect header row
  var start=0;
  if (rows.length>0 && rows[0].length>=2){
    var c0=(''+rows[0][0]).toLowerCase();
    if (c0.indexOf('user')!==-1||c0.indexOf('name')!==-1) start=1;
  }
  // Clear any previous highlight marks
  IMPORT_FILE_VALS={};
  for (var i=start;i<rows.length;i++){
    var row=rows[i];
    if (!row || row.length<1) continue;
    var uname=(''+(row[0]||'')).trim().toLowerCase();
    if (!uname) continue;
    var rawCell=(row.length>1 && row[1]!==undefined && row[1]!==null) ? (''+row[1]).trim() : '';
    var tgt;
    if (rawCell===''){ tgt=0; blanks++; }            // BLANK = explicit zero
    else {
      tgt=parseFloat(rawCell.replace(/[^0-9.]/g,''));
      if (isNaN(tgt)) tgt=0;
    }
    var inp=document.getElementById('tgt-'+uname);
    if (inp){ inp.value=tgt; IMPORT_FILE_VALS[uname]=tgt; matched++; }
    else unmatched.push(uname);
  }
  applyTargetHighlights();
  if (statusEl){
    var msg=matched+' row(s) loaded ('+blanks+' blank = zero). Green = matches file, Amber = you edited it. Review and click Save All Targets.';
    if (unmatched.length>0) msg+=' ('+unmatched.length+' username(s) not found: '+unmatched.slice(0,3).join(', ')+(unmatched.length>3?'...':'')+')';
    statusEl.textContent=msg;
  }
  showToast(matched+' targets imported -- review then Save All', 'success');
}

// Compare each input against the value read from the uploaded file
function applyTargetHighlights(){
  var officers=getOfficers();
  for (var i=0;i<officers.length;i++){
    var uname=officers[i].username;
    var inp=document.getElementById('tgt-'+uname);
    if (!inp) continue;
    if (IMPORT_FILE_VALS.hasOwnProperty(uname)){
      var fileVal=IMPORT_FILE_VALS[uname];
      var cur=parseFloat(inp.value); if(isNaN(cur)) cur=0;
      if (cur===fileVal){ inp.style.borderColor='var(--green)'; inp.style.background='rgba(34,197,94,0.10)'; }
      else { inp.style.borderColor='var(--amber)'; inp.style.background='rgba(245,158,11,0.10)'; }
    } else {
      inp.style.borderColor=''; inp.style.background='';
    }
  }
}

// Live re-check when admin edits a cell after import
function onTargetCellEdit(inp){
  var uname=inp.getAttribute('data-uname');
  if (!uname) return;
  if (IMPORT_FILE_VALS.hasOwnProperty(uname)){
    var fileVal=IMPORT_FILE_VALS[uname];
    var cur=parseFloat(inp.value); if(isNaN(cur)) cur=0;
    if (cur===fileVal){ inp.style.borderColor='var(--green)'; inp.style.background='rgba(34,197,94,0.10)'; }
    else { inp.style.borderColor='var(--amber)'; inp.style.background='rgba(245,158,11,0.10)'; }
  }
}
function loadSheetJS(callback) {
  if (typeof XLSX!=='undefined'){ callback(true); return; }
  var script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload=function(){ callback(true); };
  script.onerror=function(){ callback(false); };
  document.head.appendChild(script);
}


function confirmSeed() {
  var h=[];
  h.push('<div class="modal-title">Initialize Database</div>');
  h.push('<div style="margin-bottom:16px">This will push '+USERS.length+' users, '+CUSTOMERS.length+' customers, and '+PRODUCTS.length+' products to Firebase. Run only once. Continue?</div>');
  h.push('<div class="action-btns"><button class="btn btn-success btn-block" onclick="runSeed()">Yes, Initialize</button><button class="btn btn-secondary btn-block" onclick="closeModal()">Cancel</button></div>');

}

function runSeed() {
  closeModal();
  var prog=document.getElementById('seed-progress');
  var total=USERS.length+CUSTOMERS.length+PRODUCTS.length;
  var done=0;
  function tick(label){ done++; if(prog) prog.textContent='Seeding... '+done+'/'+total+' ('+label+')'; if(done>=total && prog) prog.textContent='Database initialized! '+total+' records seeded. System is now fully dynamic.'; }
  // Seed users
  for (var i=0;i<USERS.length;i++){ (function(u){ if(!u._docName){ fbCreate('users', u, function(){ tick('users'); }); } else { tick('users'); } })(USERS[i]); }
  // Seed customers
  for (var j=0;j<CUSTOMERS.length;j++){ (function(c){ if(!c._docName){ fbCreate('customers', c, function(){ tick('customers'); }); } else { tick('customers'); } })(CUSTOMERS[j]); }
  // Seed products
  for (var k=0;k<PRODUCTS.length;k++){ (function(p){ if(!p._docName){ fbCreate('products', p, function(){ tick('products'); }); } else { tick('products'); } })(PRODUCTS[k]); }
  showToast('Seeding started -- watch progress below', 'success');
}

  h.push('<div class="form-group"><div class="form-label">Officer</div><select class="form-select" id="smp-officer">');
  for (var i=0;i<officers.length;i++){ h.push('<option value="'+officers[i].username+'">'+officers[i].name+' ('+officers[i].region+')</option>'); }
  h.push('</select></div>');
  h.push('<div class="form-group"><div class="form-label">Date</div><input class="form-input" type="date" id="smp-date" value="'+today()+'"></div>');
  h.push('</div>');
  h.push('<div class="form-group"><div class="form-label">Product</div><select class="form-select" id="smp-product">');
  h.push('<option value="">-- Select product --</option>');
  for (var p=0;p<PRODUCTS.length;p++){ h.push('<option value="'+p+'">'+PRODUCTS[p].name+'</option>'); }
  h.push('</select></div>');
  h.push('<div class="form-row">');
  h.push('<div class="form-group"><div class="form-label">Quantity (units)</div><input class="form-input" type="number" min="1" id="smp-qty" value="1"></div>');
  h.push('<div class="form-group"><div class="form-label">Purpose / Notes</div><input class="form-input" type="text" id="smp-note" placeholder="e.g. farmer demo"></div>');
  h.push('</div>');
  h.push('<button class="btn btn-primary" onclick="addSample()">Add Sample Record</button>');
  h.push('</div>');

  // Filters
  h.push('<div class="card"><div class="card-title">Sample History</div>');
  h.push('<div class="filter-row">');
  var periods=[['month','This Month'],['quarter','This Quarter'],['year','This Year'],['all','All Time']];
  for (var pf=0;pf<periods.length;pf++){
    var pac=SAMPLE_PERIOD===periods[pf][0]?' active':'';
    h.push('<div class="pill'+pac+'" data-sp="'+periods[pf][0]+'" onclick="setSamplePeriod(this)">'+periods[pf][1]+'</div>');
  }
  h.push('</div>');
  h.push('<div class="form-group"><div class="form-label">Filter by officer</div><select class="form-select" id="smp-filter-officer" onchange="setSampleOfficer(this)" style="max-width:280px">');
  h.push('<option value="all"'+(SAMPLE_OFFICER==='all'?' selected':'')+'>All officers</option>');
  for (var fo=0;fo<officers.length;fo++){ h.push('<option value="'+officers[fo].username+'"'+(SAMPLE_OFFICER===officers[fo].username?' selected':'')+'>'+officers[fo].name+'</option>'); }
  h.push('</select></div>');

  // Filtered list + per-officer totals
  var range=getSampleRange(SAMPLE_PERIOD);
  var list=[]; var totalsByOff={}; var totalUnits=0; var totalValue=0;
  for (var s=0;s<ALL.samples.length;s++){
    var rec=ALL.samples[s];
    if (range && (rec.date<range.start || rec.date>range.end)) continue;
    if (SAMPLE_OFFICER!=='all' && rec.officer!==SAMPLE_OFFICER) continue;
    list.push(rec);
    var u=parseFloat(rec.qty)||0; var val=(parseFloat(rec.price)||0)*u;
    if (!totalsByOff[rec.officer]) totalsByOff[rec.officer]={name:rec.officerName||rec.officer, units:0, value:0};
    totalsByOff[rec.officer].units+=u; totalsByOff[rec.officer].value+=val;
    totalUnits+=u; totalValue+=val;
  }
  list.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });

  // KPI summary
  h.push('<div class="kpi-grid">');
  h.push('<div class="kpi-card"><div class="kpi-val">'+fmtNum(totalUnits)+'</div><div class="kpi-lbl">Sample Units</div></div>');
  h.push('<div class="kpi-card"><div class="kpi-val">'+fmtPKR(totalValue)+'</div><div class="kpi-lbl">Sample Value (at list price)</div></div>');
  h.push('<div class="kpi-card"><div class="kpi-val">'+list.length+'</div><div class="kpi-lbl">Records</div></div>');
  h.push('</div>');

  // Per-officer rollup
  var offKeys=[]; for (var k in totalsByOff){ if(totalsByOff.hasOwnProperty(k)) offKeys.push(k); }
  if (offKeys.length>0){
    offKeys.sort(function(a,b){ return totalsByOff[b].value-totalsByOff[a].value; });
    h.push('<div style="font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:700;margin:8px 0">By Officer</div>');
    h.push('<table><thead><tr><th>Officer</th><th>Units</th><th>Value</th></tr></thead><tbody>');
    for (var ok=0;ok<offKeys.length;ok++){
      var t=totalsByOff[offKeys[ok]];
      h.push('<tr><td>'+t.name+'</td><td>'+fmtNum(t.units)+'</td><td>'+fmtPKR(t.value)+'</td></tr>');
    }
    h.push('</tbody></table>');
  }

  // Detail list
  h.push('<div style="font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:700;margin:14px 0 8px">Detail</div>');
  if (list.length===0){
    h.push('<div class="empty-state"><div class="empty-state-icon">&#129514;</div><div>No sample records for this period.</div></div>');
  } else {
    h.push('<table><thead><tr><th>Date</th><th>Officer</th><th>Product</th><th>Qty</th><th>Value</th><th>Notes</th><th></th></tr></thead><tbody>');
    for (var d=0;d<list.length;d++){
      var sm=list[d]; var v=(parseFloat(sm.price)||0)*(parseFloat(sm.qty)||0);
      h.push('<tr><td>'+fmtDate(sm.date)+'</td><td>'+(sm.officerName||'')+'</td><td style="font-size:12px">'+(sm.productName||'')+'</td><td>'+(sm.qty||0)+'</td><td>'+fmtPKR(v)+'</td><td style="font-size:11px;color:var(--text2)">'+(sm.note||'')+'</td>');
      h.push('<td><button class="btn btn-sm btn-danger" data-id="'+sm.id+'" onclick="deleteSample(this)">Del</button></td></tr>');
    }
    h.push('</tbody></table>');
  }
  h.push('</div>');
  el.innerHTML=h.join('');
}
function setSamplePeriod(elm){
  SAMPLE_PERIOD=elm.getAttribute('data-sp');
  renderSamples(document.getElementById('main-content'));
}
function setSampleOfficer(sel){
  SAMPLE_OFFICER=sel.value;
  renderSamples(document.getElementById('main-content'));
}
function getSampleRange(period){
  var now=new Date();
  var y=now.getFullYear(); var m=now.getMonth();
  function iso(dt){ return dt.toISOString().slice(0,10); }
  if (period==='month'){ return {start:iso(new Date(y,m,1)), end:iso(new Date(y,m+1,0))}; }
  if (period==='quarter'){
    // Fiscal year Jul-Jun: Q1 Jul-Sep, Q2 Oct-Dec, Q3 Jan-Mar, Q4 Apr-Jun
    var qStartMonth;
    if (m>=6 && m<=8) qStartMonth=6;        // Jul-Sep
    else if (m>=9 && m<=11) qStartMonth=9;  // Oct-Dec
    else if (m>=0 && m<=2) qStartMonth=0;   // Jan-Mar
    else qStartMonth=3;                     // Apr-Jun
    var qYear=y;
    return {start:iso(new Date(qYear,qStartMonth,1)), end:iso(new Date(qYear,qStartMonth+3,0))};
  }
  if (period==='year'){
    // Fiscal year Jul 1 - Jun 30
    var fyStart=(m>=6)?new Date(y,6,1):new Date(y-1,6,1);
    var fyEnd=(m>=6)?new Date(y+1,5,30):new Date(y,5,30);
    return {start:iso(fyStart), end:iso(fyEnd)};
  }
  return null;
}
function addSample(){
  var offSel=document.getElementById('smp-officer');
  var prodSel=document.getElementById('smp-product');
  var qty=parseFloat(document.getElementById('smp-qty').value);
  var date=document.getElementById('smp-date').value;
  var note=(document.getElementById('smp-note').value||'').trim();
  if (!offSel.value){ showToast('Select an officer','error'); return; }
  if (prodSel.value===''){ showToast('Select a product','error'); return; }
  if (isNaN(qty)||qty<=0){ showToast('Enter a valid quantity','error'); return; }
  if (!date){ showToast('Select a date','error'); return; }
  var off=null; for (var i=0;i<USERS.length;i++){ if(USERS[i].username===offSel.value){ off=USERS[i]; break; } }
  var prod=PRODUCTS[parseFloat(prodSel.value)];
  var rec={
    id:genId(), officer:offSel.value, officerName:off?off.name:'', region:off?off.region:'',
    productSku:prod?prod.sku:'', productName:prod?prod.name:'', price:prod?prod.price:0,
    qty:qty, date:date, note:note, createdAt:nowISO(), createdBy:CU.name
  };
  ALL.samples.unshift(rec);
  renderSamples(document.getElementById('main-content'));
  showToast('Sample record added','success');
  fbCreate('samples', rec, null);
}
function deleteSample(elm){
  var id=elm.getAttribute('data-id');
  var idx=-1, rec=null;
  for (var i=0;i<ALL.samples.length;i++){ if(ALL.samples[i].id===id){ idx=i; rec=ALL.samples[i]; break; } }
  if (idx<0) return;
  ALL.samples.splice(idx,1);
  renderSamples(document.getElementById('main-content'));
  showToast('Sample record deleted','success');
  if (rec && rec._docName) fbDelete(rec._docName, null);
}
